<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw - 祖龙对话</title>
    <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* === App Wrapper: 控制整体布局与分屏 === */
        .app-wrapper {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            display: flex;
            gap: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-wrapper.split-mode {
            width: 98%;
            max-width: 100%;
            height: 96vh;
            gap: 12px;
        }

        .chat-container {
            flex: 1;
            min-width: 0;
            height: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: flex 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-wrapper.split-mode .chat-container {
            flex: 0 0 30%;
            max-width: 30%;
            border-radius: 16px;
        }

        /* === 图谱 Tab 切换 === */
        .graph-tabs {
            display: flex;
            gap: 0;
            margin-right: auto;
        }
        .graph-tab-btn {
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            background: none;
            border: 1px solid #e2e8f0;
            border-bottom: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .graph-tab-btn:first-child { border-radius: 6px 0 0 0; }
        .graph-tab-btn:last-child { border-radius: 0 6px 0 0; }
        .graph-tab-btn.active {
            color: #1e293b;
            background: #fff;
            border-bottom: 2px solid #3b82f6;
        }
        .graph-tab-btn:hover:not(.active) { color: #3b82f6; background: #f1f5f9; }

        /* 视图容器 */
        .graph-view-task {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }
        .graph-view-task.hidden { display: none; }
        .graph-view-memory {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            background: #0f172a;
        }
        .graph-view-memory.active { display: flex; }

        .mg-content-row {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 记忆图谱内部样式 */
        .mg-toolbar {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #334155;
            background: #1e293b;
            flex-shrink: 0;
        }
        .mg-stats {
            font-size: 11px;
            color: #94a3b8;
        }
        .mg-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .mg-body svg {
            width: 100%;
            height: 100%;
        }
        .mg-legend {
            padding: 6px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid #334155;
            background: #1e293b;
            flex-shrink: 0;
        }
        .mg-leg {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #94a3b8;
        }
        .mg-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .mg-node-label {
            font-size: 9px;
            fill: #94a3b8;
            pointer-events: none;
        }
        .mg-link {
            stroke-opacity: 0.5;
        }

        /* 记忆图谱节点详情面板 */
        .mg-detail-panel {
            width: 320px;
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
            transition: width 0.3s ease;
        }
        .mg-detail-panel.collapsed {
            width: 0;
            border-left: none;
        }
        .mg-detail-header {
            padding: 10px 14px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .mg-detail-header h3 {
            font-size: 13px;
            font-weight: 700;
            color: #e2e8f0;
            margin: 0;
        }
        .mg-detail-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .mg-detail-close:hover { color: #e2e8f0; background: #334155; }
        .mg-detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
        }
        .mg-detail-placeholder {
            color: #64748b;
            font-size: 12px;
            text-align: center;
            padding: 40px 20px;
            line-height: 1.8;
        }
        .mg-detail-field {
            margin-bottom: 12px;
        }
        .mg-detail-field-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .mg-detail-field-value {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.6;
            word-break: break-all;
        }
        .mg-detail-content-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            color: #e2e8f0;
            line-height: 1.7;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .mg-detail-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }
        .mg-detail-neighbors {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .mg-detail-neighbors li {
            padding: 6px 8px;
            border-bottom: 1px solid #1e293b;
            font-size: 11px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .mg-detail-neighbors li:hover {
            background: #334155;
            color: #e2e8f0;
        }
        .mg-neighbor-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        /* 记忆图谱 - 文件卡片 */
        .mg-detail-file-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color .2s;
        }
        .mg-detail-file-card:hover {
            border-color: #3b82f6;
            background: #1e293b;
        }
        .mg-detail-file-name {
            font-size: 12px;
            color: #3b82f6;
            font-weight: 600;
        }
        .mg-detail-file-path {
            font-size: 10px;
            color: #64748b;
            word-break: break-all;
            margin-top: 2px;
        }
        .mg-detail-img-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            border: 1px solid #334155;
            margin-top: 8px;
            overflow: hidden;
        }
        .mg-detail-img-preview img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            display: block;
        }
        .mg-detail-file-btn {
            padding: 4px 10px;
            font-size: 10px;
            border-radius: 4px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
        }
        .mg-detail-file-btn:hover {
            background: #334155;
            color: #e2e8f0;
        }

        /* === 图谱面板 === */
        .graph-panel {
            display: none;
            flex: 1;
            min-width: 0;
            height: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            flex-direction: column;
            overflow: hidden;
            animation: graphSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-wrapper.split-mode .graph-panel {
            display: flex;
        }

        @keyframes graphSlideIn {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* 图谱面板内部结构 */
        .graph-header {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .graph-header h2 {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }
        .graph-header h2 .accent { color: #3b82f6; }
        .graph-progress { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #64748b; }
        .graph-progress-bar { width: 140px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .graph-progress-fill { height: 100%; background: linear-gradient(90deg,#22c55e,#16a34a); border-radius: 3px; transition: width .4s; }
        .graph-body { flex: 1; display: flex; overflow: hidden; }
        .graph-svg-area { flex: 1; overflow: hidden; background: #f8fafc; position: relative; cursor: grab; }
        .graph-svg-area.panning { cursor: grabbing; }
        .graph-svg-area svg { display: block; transform-origin: 0 0; }

        /* 图谱节点 */
        .graph-panel .gnode { cursor: pointer; }
        .graph-panel .gnode .card { fill: #fff; stroke: #e2e8f0; stroke-width: 1.5; }
        .graph-panel .gnode:hover .card { stroke: #3b82f6; filter: drop-shadow(0 2px 8px rgba(59,130,246,.18)); }
        .graph-panel .gnode.selected .card { stroke: #3b82f6; stroke-width: 2.5; filter: drop-shadow(0 3px 12px rgba(59,130,246,.25)); }
        .graph-panel .gnode .title { font-size: 11.5px; font-weight: 600; fill: #1e293b; }
        .graph-panel .gnode .subtitle { font-size: 10px; fill: #64748b; }
        .graph-panel .gnode.dimmed { opacity: .18; transition: opacity .3s; }
        .graph-panel .gnode { transition: opacity .3s; }

        /* 图谱边 */
        .graph-panel .edge-hier { fill: none; stroke: #cbd5e1; stroke-width: 1.4; }
        .graph-panel .edge-hier.dimmed { opacity: .1; }
        .graph-panel .dep-group { transition: opacity .3s; }
        .graph-panel .dep-group .dep-line { fill: none; stroke-width: 2; stroke-dasharray: 7 4; }
        .graph-panel .dep-group .dep-label { font-size: 9.5px; font-weight: 600; }
        .graph-panel .dep-group.satisfied .dep-line { stroke: #22c55e; }
        .graph-panel .dep-group.unsatisfied .dep-line { stroke: #ef4444; }
        .graph-panel .dep-group.satisfied .dep-label { fill: #16a34a; }
        .graph-panel .dep-group.unsatisfied .dep-label { fill: #dc2626; }
        .graph-panel .dep-group.dimmed { opacity: .08; }
        .graph-panel .dep-group.highlighted .dep-line { stroke-width: 3; filter: drop-shadow(0 0 4px rgba(239,68,68,.4)); }
        .graph-panel .dep-group.highlighted.satisfied .dep-line { filter: drop-shadow(0 0 4px rgba(34,197,94,.4)); }
        @keyframes dash { to { stroke-dashoffset: -22; } }
        .graph-panel .dep-group .dep-line { animation: dash .8s linear infinite; }

        /* 图谱右侧详情面板 */
        .graph-detail-panel {
            width: 320px;
            background: #fff;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .gp-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #f8fafc; flex-shrink: 0; }
        .gp-tab {
            flex: 1; padding: 8px 4px; font-size: 11.5px; font-weight: 600;
            color: #94a3b8; background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s;
        }
        .gp-tab:hover { color: #3b82f6; }
        .gp-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; background: #fff; }
        .gp-tab-body { flex: 1; overflow-y: auto; padding: 14px; }
        .gp-tab-body.hidden { display: none; }
        .gp-tab-body h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .gp-field { margin-bottom: 10px; }
        .gp-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #94a3b8; letter-spacing: .5px; margin-bottom: 2px; }
        .gp-field-value { font-size: 12px; color: #334155; line-height: 1.6; }
        .gp-dep-card {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
            padding: 8px; margin-bottom: 5px;
        }
        .gp-dep-card .dep-id { font-size: 11px; font-weight: 700; }
        .gp-dep-card .dep-id.in { color: #dc2626; }
        .gp-dep-card .dep-id.out { color: #3b82f6; }
        .gp-dep-card .dep-via { font-size: 10px; color: #64748b; margin-top: 2px; }
        .gp-dep-card .dep-result { font-size: 11px; color: #334155; margin-top: 4px; padding-top: 4px; border-top: 1px dashed #e2e8f0; }
        .gp-llm-box {
            background: #1e293b; color: #e2e8f0; font-family: Consolas, Monaco, Menlo, monospace;
            font-size: 11px; line-height: 1.6; padding: 12px; border-radius: 8px;
            white-space: pre-wrap; word-break: break-all;
        }
        .gp-placeholder { text-align: center; color: #94a3b8; padding: 30px 14px; font-size: 12px; line-height: 1.8; }

        /* 图谱底部图例 */
        .graph-legend {
            display: flex; gap: 14px; padding: 6px 16px; background: #fff;
            border-top: 1px solid #e2e8f0; font-size: 11px; color: #64748b;
            flex-shrink: 0; align-items: center; flex-wrap: wrap;
        }
        .graph-legend .gl-item { display: flex; align-items: center; gap: 4px; }
        .graph-legend .gl-line { width: 18px; height: 0; border-top: 2px solid; }
        .graph-legend .gl-dash { width: 18px; height: 0; border-top: 2px dashed; }
        .graph-legend .gl-dot { width: 8px; height: 8px; border-radius: 2px; }

        /* 图谱关闭按钮 */
        .graph-close-btn {
            background: none; border: 1px solid #e2e8f0; border-radius: 6px;
            padding: 4px 12px; font-size: 12px; color: #64748b; cursor: pointer;
            transition: all 0.2s;
        }
        .graph-close-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

        /* 对话框里的图谱开关按钮 */
        .graph-toggle-btn {
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 8px;
            padding: 5px 12px; color: white; cursor: pointer;
            font-size: 13px; font-weight: 600;
            transition: background 0.3s;
            position: absolute; top: 10px; right: 120px;
        }
        .graph-toggle-btn:hover { background: rgba(255,255,255,0.35); }

        /* === 会话列表 === */
        .session-list {
            background: #f8f8fc;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            max-height: 180px;
            overflow: hidden;
        }
        .session-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            flex-shrink: 0;
        }
        .session-list-header span {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .new-session-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .new-session-btn:hover { opacity: 0.85; }
        .session-items {
            flex: 1;
            overflow-y: auto;
            padding: 0 6px 6px;
        }
        .session-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #475569;
            transition: background 0.15s;
            position: relative;
        }
        .session-item:hover { background: #eef2ff; }
        .session-item.active {
            background: linear-gradient(135deg, rgba(102,126,234,0.12), rgba(118,75,162,0.1));
            color: #4338ca;
            font-weight: 600;
        }
        .session-item .session-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .session-item .session-title-input {
            flex: 1;
            min-width: 0;
            border: 1px solid #667eea;
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 13px;
            outline: none;
            background: white;
        }
        .session-item .session-delete {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #94a3b8;
            padding: 0 2px;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .session-item:hover .session-delete { display: block; }
        .session-item .session-delete:hover { color: #ef4444; }

        /* === 图谱列表（类似会话列表） === */
        .graph-list {
            background: #f8f8fc;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            max-height: 150px;
            overflow: hidden;
        }
        .graph-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            flex-shrink: 0;
        }
        .graph-list-header span {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .graph-list-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: #94a3b8;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .graph-list-toggle:hover { background: #e2e8f0; color: #475569; }
        .graph-items {
            flex: 1;
            overflow-y: auto;
            padding: 0 6px 6px;
        }
        .graph-list.collapsed .graph-items { display: none; }
        .graph-list.collapsed { max-height: none; }
        .graph-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #475569;
            transition: background 0.15s;
            position: relative;
        }
        .graph-item:hover { background: #eef2ff; }
        .graph-item.active {
            background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(6,182,212,0.1));
            color: #1d4ed8;
            font-weight: 600;
        }
        .graph-item .graph-item-icon {
            flex-shrink: 0;
            font-size: 11px;
        }
        .graph-item .graph-item-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .graph-item .graph-item-status {
            flex-shrink: 0;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            background: #f1f5f9;
            color: #64748b;
        }
        .graph-item .graph-item-delete {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: #94a3b8;
            padding: 0 2px;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .graph-item:hover .graph-item-delete { display: block; }
        .graph-item .graph-item-delete:hover { color: #ef4444; }

        /* === 详情面板收起 === */
        .graph-detail-panel {
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
            position: relative;
        }
        .graph-detail-panel.collapsed {
            width: 0 !important;
            padding: 0;
            opacity: 0;
            overflow: hidden;
            border-left: none;
        }
        .detail-toggle-btn {
            position: absolute;
            left: -14px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 48px;
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
            border-right: none;
            border-radius: 6px 0 0 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #64748b;
            z-index: 5;
            transition: background 0.2s;
        }
        .detail-toggle-btn:hover { background: #cbd5e1; }
        .detail-toggle-btn.outside {
            position: absolute;
            right: 0;
            top: 50%;
            left: auto;
            border-radius: 0 6px 6px 0;
            border: 1px solid #cbd5e1;
            border-left: none;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        
        .message {

        .graph-context-menu {

        .connection-status {

        .clear-history-btn {

            font-size: 16px;

        .clear-history-btn:hover {

        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 记忆图谱活跃节点脉冲动画 */
        @keyframes mg-active-glow {
            0%, 100% {
                filter: drop-shadow(0 0 3px var(--glow-color, #f59e0b));

                filter: drop-shadow(0 0 12px var(--glow-color, #f59e0b));

        .tv-link {

        .tv-reopen-btn {

        .tv-reopen-btn:hover { color: #f1f5f9; background: #475569; }
        
        .typing-indicator {

        .typing-indicator span {

        .typing-indicator span:nth-child(3) {

        }
        
        /* ===== 思考过程面板样式 ===== */
        .thinking-panel {
            margin-top: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            background: #fafafa;
            font-size: 13px;
        }
        
        .thinking-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            padding: 8px 12px;
            border: none;
            background: #f0f0f5;

            transition: background 0.2s;
        }
        
        .thinking-toggle:hover {

        .thinking-toggle .arrow {

        }
        
        .thinking-toggle .arrow.expanded {

        .thinking-toggle .step-count {

        .thinking-content {

        .thinking-step {

        .thinking-step.tool_call {

        .thinking-step.tool_result {

        .thinking-step.inference_complete {

        .thinking-step .step-icon {

        @keyframes thinking-pulse {

        .thinking-panel.active .thinking-toggle {

<body>
    <div class="app-wrapper" id="appWrapper">
    <div class="chat-container">
        <div class="chat-header">
            <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()" title="暗夜模式">🌙</button>
            <span class="status-indicator disconnected" id="statusIndicator"></span>
            祖龙
            <button class="graph-toggle-btn" id="graphToggleBtn" onclick="toggleTaskGraph()" title="任务图谱">📊 图谱</button>
            <div class="connection-status" id="connectionStatus">连接中...</div>
        </div>
        
        <div class="session-list">
            <div class="session-list-header">
                <span>会话列表</span>
                <button class="new-session-btn" onclick="createNewSession()">+ 新会话</button>
            </div>
            <div class="session-items" id="sessionItems">
                <!-- 会话列表项将动态渲染 -->
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- 消息将动态添加到这里 -->
        </div>
        
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="输入消息..."
                autocomplete="off"
            />
            <button class="send-button" id="sendButton">发送</button>
        </div>
    </div><!-- chat-container end -->

    <!-- ===== 图谱面板（Tab 切换：记忆图谱 / 任务图谱） ===== -->
    <div class="graph-panel" id="graphPanel">
        <div class="graph-header">
            <div class="graph-tabs">
                <button class="graph-tab-btn active" data-view="task" onclick="switchGraphTab('task')">任务图谱</button>
                <button class="graph-tab-btn" data-view="memory" onclick="switchGraphTab('memory')">记忆图谱</button>
            </div>
            <div class="graph-progress" id="graphProgressBar">
                <span id="gp-ptext">0/0</span>

    <!-- 图谱节点右键菜单 -->

    <!-- ===== 思维可视化浮动窗口 ===== -->
    <div class="thought-view-window" id="thoughtViewWindow">
        <div class="tv-header" id="tvHeader">
            <span class="tv-title">思维视图</span>
            <span class="tv-node-count" id="tvNodeCount">(0)</span>
            <button class="tv-btn" onclick="toggleTvMinimize()" title="最小化">&#x2500;</button>
            <button class="tv-btn" onclick="toggleTvVisible(false)" title="关闭">&#x2715;</button>
        </div>
        <div class="tv-body" id="tvBody">
            <svg id="thoughtViewSvg"></svg>
            <div class="tv-empty-hint" id="tvEmptyHint">暂无活跃思维节点</div>

    <script>
        // WebSocket 连接
        let ws = null;
        const reconnectDelay = 3000; // 3 秒后重连
        
        // DOM 元素
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const statusIndicator = document.getElementById('statusIndicator');
        const connectionStatus = document.getElementById('connectionStatus');
        
        // ===== 多会话管理 =====
        const STORAGE_KEY = 'zulong_sessions';
        let currentSessionId = null;
        
        // 思考过程面板管理
        let currentRequestId = null;
        const thinkingPanelMap = {};
        const pendingThinkingSteps = {};
        
        // 生成唯一 ID
        function generateId() {
            if (crypto && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }
        
        // 读取全部会话数据
        function loadSessionStore() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {
                console.error('[Session] 加载失败:', e);
            }
            return { activeSessionId: null, sessions: [] };
        }
        
        // 写入全部会话数据
        function saveSessionStore(store) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
            } catch (e) {
                console.error('[Session] 保存失败:', e);
            }
        }
        
        // 获取当前会话对象
        function getCurrentSession() {
            const store = loadSessionStore();
            return store.sessions.find(s => s.id === currentSessionId) || null;
        }
        
        // 创建新会话
        function createNewSession() {
            const store = loadSessionStore();
            const newSession = {
                id: generateId(),
                title: '新会话',
                messages: [],
                createdAt: Date.now()
            };
            store.sessions.unshift(newSession);
            store.activeSessionId = newSession.id;
            saveSessionStore(store);
            switchToSession(newSession.id);
        }
        
        // 切换到指定会话
        function switchToSession(sessionId) {
            currentSessionId = sessionId;
            const store = loadSessionStore();
            store.activeSessionId = sessionId;
            saveSessionStore(store);
            
            // 清空当前聊天区
            chatMessages.innerHTML = '';
            
            // 恢复该会话的消息
            const session = store.sessions.find(s => s.id === sessionId);
            if (session && session.messages) {
                session.messages.forEach(msg => {
                    addMessage(msg.text, msg.sender, false);
                });
            }
            
            renderSessionList();
            
            // 如果图谱面板已打开，刷新图谱列表
            refreshGraphListIfVisible();
            
            console.log('[Session] 切换到会话:', sessionId);
        }
        
        // 删除会话（仅Web端，不删系统端记忆）
        function deleteSession(sessionId, ev) {
            if (ev) ev.stopPropagation();
            const store = loadSessionStore();
            store.sessions = store.sessions.filter(s => s.id !== sessionId);
            
            if (currentSessionId === sessionId) {
                // 删的是当前会话，切到第一个或创建新的
                if (store.sessions.length > 0) {
                    store.activeSessionId = store.sessions[0].id;
                    saveSessionStore(store);
                    switchToSession(store.sessions[0].id);
                } else {
                    saveSessionStore(store);
                    createNewSession();
                }
            } else {
                saveSessionStore(store);
                renderSessionList();
            }
            console.log('[Session] 已删除会话:', sessionId);
        }
        
        // 开始重命名会话
        function startRenameSession(sessionId, ev) {
            if (ev) ev.stopPropagation();
            const item = document.querySelector(`.session-item[data-sid="${sessionId}"]`);
            if (!item) return;
            
            const titleEl = item.querySelector('.session-title');
            const currentTitle = titleEl.textContent;
            
            // 替换为输入框
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'session-title-input';
            input.value = currentTitle;
            titleEl.replaceWith(input);
            input.focus();
            input.select();
            
            function finishRename() {
                const newTitle = input.value.trim() || currentTitle;
                const store = loadSessionStore();
                const session = store.sessions.find(s => s.id === sessionId);
                if (session) {
                    session.title = newTitle;
                    saveSessionStore(store);
                }
                renderSessionList();
            }
            
            input.addEventListener('blur', finishRename);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { input.blur(); }
                if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
            });
        }
        
        // 渲染会话列表
        function renderSessionList() {
            const store = loadSessionStore();
            const container = document.getElementById('sessionItems');
            container.innerHTML = '';
            
            store.sessions.forEach(s => {
                const div = document.createElement('div');
                div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                div.setAttribute('data-sid', s.id);
                div.onclick = function() { switchToSession(s.id); };
                
                const title = document.createElement('span');
                title.className = 'session-title';
                title.textContent = s.title;
                title.ondblclick = function(e) { startRenameSession(s.id, e); };
                
                const del = document.createElement('button');
                del.className = 'session-delete';
                del.textContent = '✕';
                del.title = '删除会话（仅删除Web端记录）';
                del.onclick = function(e) { deleteSession(s.id, e); };
                
                div.appendChild(title);
                div.appendChild(del);
                container.appendChild(div);
            });
        }
        
        // 保存消息到当前会话
        function saveMessageToSession(message) {
            const store = loadSessionStore();
            const session = store.sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            session.messages.push(message);
            
            // 自动标题：用第一条用户消息
            if (session.title === '新会话' && message.sender === 'user') {
                const text = message.text;
                session.title = text.length > 20 ? text.substring(0, 20) + '...' : text;
                renderSessionList();
            }
            
            // 限制每个会话最多100条消息
            if (session.messages.length > 100) {
                session.messages.shift();
            }
            
            saveSessionStore(store);
        }
        
        // 初始化会话系统
        function initSessionManager() {
            const store = loadSessionStore();
            
            // 检查 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            const sessionIdFromUrl = urlParams.get('session_id');
            
            if (sessionIdFromUrl && store.sessions.find(s => s.id === sessionIdFromUrl)) {
                switchToSession(sessionIdFromUrl);
            } else if (store.activeSessionId && store.sessions.find(s => s.id === store.activeSessionId)) {
                switchToSession(store.activeSessionId);
            } else if (store.sessions.length > 0) {
                switchToSession(store.sessions[0].id);
            } else {
                createNewSession();
            }
        }
        
        // 兼容旧代码的函数
        function clearChatHistory() {
            if (currentSessionId) {
                deleteSession(currentSessionId);
            }
        }
        
        // 连接 WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            console.log('[WebSocket] 正在连接到:', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('[WebSocket] ✅ 连接成功');
                updateStatus(true);
            };
            
            ws.onclose = () => {
                console.log('[WebSocket] ❌ 连接关闭');
                updateStatus(false);
                setTimeout(connect, reconnectDelay);
            };
            
            ws.onerror = (error) => {
                console.error('[WebSocket] 错误:', error);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }
        
        // 更新连接状态
        function updateStatus(connected) {
            if (connected) {
                statusIndicator.className = 'status-indicator connected';
                connectionStatus.textContent = '已连接';
                sendButton.disabled = false;
            } else {
                statusIndicator.className = 'status-indicator disconnected';
                connectionStatus.textContent = '断开连接';
                sendButton.disabled = true;
            }
        }
        
        // 处理收到的消息
        function handleMessage(data) {
            console.log('[WebSocket] 收到消息:', data.type);
            
            switch (data.type) {
                case 'WELCOME':
                    console.log('[WebSocket] 欢迎消息:', data.message);
                    break;
                
                case 'THINKING_STEP':
                    handleThinkingStep(data);
                    break;
                
                case 'CHAT_RESPONSE':
                    removeTypingIndicator();
                    // 如果有流式消息在进行中，将其定稿为最终消息
                    finalizeStreamingMessage(data.text, data.request_id);
                    switchToSendMode();
                    break;
                
                case 'STREAMING_RESPONSE':
                    removeTypingIndicator();
                    updateStreamingMessage(data.text, data.chunk, data.request_id);
                    break;
                
                case 'MEMORY_GRAPH_UPDATE':
                    handleMemoryGraphUpdate(data);
                    break;

                case 'MEMORY_GRAPH_EXPAND_RESULT':
                    handleMemoryGraphExpandResult(data);
                    break;

                case 'USER_MESSAGE':
                    // 来自 API/测试脚本的用户消息，添加到聊天窗口
                    addMessage(data.text, 'user');
                    break;

                default:
                    console.log('[WebSocket] 未知消息类型:', data.type);
            }
        }
        
        // 添加消息到聊天窗口
        function addMessage(text, sender, shouldSave = true, requestId = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            // 为 assistant 消息附加思考过程面板
            if (sender === 'assistant') {
                const rid = requestId || currentRequestId;
                if (rid && pendingThinkingSteps[rid] && pendingThinkingSteps[rid].length > 0) {
                    const panel = createThinkingPanel(rid);
                    // 将缓存的步骤渲染到面板
                    const steps = pendingThinkingSteps[rid];
                    steps.forEach(function(step) {
                        appendStepToPanel(panel, step);
                    });
                    // 标记面板为已完成（移除活跃脉动）
                    panel.classList.remove('active');
                    contentDiv.appendChild(panel);
                    thinkingPanelMap[rid] = panel;
                    delete pendingThinkingSteps[rid];
                }
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // 保存到当前会话
            if (shouldSave) {
                saveMessageToSession({
                    id: generateId(),
                    text: text,
                    sender: sender,
                    timestamp: Date.now()
                });
            }
        }
        
        // 显示打字指示器
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'typing-indicator';
            
            for (let i = 0; i < 3; i++) {
                const span = document.createElement('span');
                indicatorDiv.appendChild(span);
            }
            
            typingDiv.appendChild(indicatorDiv);
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 移除打字指示器
        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        
        // 更新流式消息
        function updateStreamingMessage(text, chunk, requestId) {
            let streamingMessage = document.getElementById('streamingMessage');
            
            if (!streamingMessage) {
                // 创建流式消息容器
                streamingMessage = document.createElement('div');
                streamingMessage.className = 'message assistant';
                streamingMessage.id = 'streamingMessage';
                if (requestId) {
                    streamingMessage.setAttribute('data-request-id', requestId);
                }
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = text;
                
                streamingMessage.appendChild(contentDiv);
                chatMessages.appendChild(streamingMessage);
            } else {
                // 更新现有流式消息
                const contentDiv = streamingMessage.querySelector('.message-content');
                if (contentDiv) {
                    contentDiv.textContent = text;
                }
            }
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 将流式消息定稿为最终消息（附加思考面板 + 保存历史）
        function finalizeStreamingMessage(text, requestId) {
            let streamingMessage = document.getElementById('streamingMessage');
            
            if (streamingMessage) {
                // 流式消息已存在，直接更新文本并定稿
                const contentDiv = streamingMessage.querySelector('.message-content');
                if (contentDiv) {
                    contentDiv.textContent = text;
                }
                
                // 附加思考面板
                const rid = requestId || currentRequestId;
                if (rid && pendingThinkingSteps[rid] && pendingThinkingSteps[rid].length > 0) {
                    const panel = createThinkingPanel(rid);
                    pendingThinkingSteps[rid].forEach(function(step) {
                        appendStepToPanel(panel, step);
                    });
                    panel.classList.remove('active');
                    contentDiv.appendChild(panel);
                    thinkingPanelMap[rid] = panel;
                    delete pendingThinkingSteps[rid];
                }
                
                // 移除 streaming ID，防止后续流式消息干扰
                streamingMessage.removeAttribute('id');
                
                // 保存到当前会话
                saveMessageToSession({
                    id: generateId(),
                    text: text,
                    sender: 'assistant',
                    timestamp: Date.now()
                });
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } else {
                // 没有流式消息（直接出最终结果），走正常添加路径
                addMessage(text, 'assistant', true, requestId);
            }
        }
        
        // 发送消息
        function sendMessage() {
            const text = chatInput.value.trim();
            
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }
            
            // 移除现有的流式消息容器
            const streamingMessage = document.getElementById('streamingMessage');
            if (streamingMessage) {
                streamingMessage.remove();
            }
            
            // 添加到聊天窗口
            addMessage(text, 'user');
            
            // 发送到服务器（包含测试信息）
            const requestId = generateId();
            currentRequestId = requestId;
            
            // 解析引用标记 @[名称#地址]（地址即节点完整路径，可用于模型定位）
            var refPattern = /@\[(.+?)#(.+?)\]/g;
            var match, referencedNodes = [];
            while ((match = refPattern.exec(text)) !== null) {
                referencedNodes.push({label: match[1], address: match[2]});
            }

            const messageData = {
                type: 'CHAT_MESSAGE',
                text: text,
                session_id: currentSessionId,  // 会话 ID
                request_id: requestId,          // 请求 ID（关联思考过程）
                referenced_nodes: referencedNodes  // 引用的节点 {label, address} 列表
            };
            
            console.log('[WebSocket] 📤 发送消息:', messageData);
            ws.send(JSON.stringify(messageData));
            
            // 清空输入框
            chatInput.value = '';
            
            // 显示打字指示器
            showTypingIndicator();

            // 切换到停止模式
            switchToStopMode();
        }

        // 停止/发送按钮模式切换
        var _currentSendMode = 'send'; // 'send' | 'stop'

        function switchToStopMode() {
            _currentSendMode = 'stop';
            sendButton.textContent = '停止';
            sendButton.classList.add('stop-mode');
        }

        function switchToSendMode() {
            _currentSendMode = 'send';
            sendButton.textContent = '发送';
            sendButton.classList.remove('stop-mode');
        }

        function stopGeneration() {
            if (ws && ws.readyState === WebSocket.OPEN && currentRequestId) {
                ws.send(JSON.stringify({
                    type: 'STOP_GENERATION',
                    request_id: currentRequestId
                }));
                console.log('[WebSocket] 📤 发送停止请求:', currentRequestId);
            }
            removeTypingIndicator();
            switchToSendMode();
        }

        // ===== 右键菜单功能 =====
        var _ctxMenuNodeId = null, _ctxMenuNodeLabel = null, _ctxMenuNodeAddr = null;

        function showGraphContextMenu(x, y, nodeId, nodeLabel, nodeAddress) {
            _ctxMenuNodeId = nodeId;
            _ctxMenuNodeLabel = nodeLabel;
            _ctxMenuNodeAddr = nodeAddress || nodeId;
            var menu = document.getElementById('graphContextMenu');
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        // 全局点击隐藏菜单
        document.addEventListener('click', function() {
            document.getElementById('graphContextMenu').style.display = 'none';
        });

        // 菜单项点击处理
        document.getElementById('graphContextMenu').addEventListener('click', function(ev) {
            var action = ev.target.getAttribute('data-action');
            if (action === 'reference') {
                var tag = '@[' + _ctxMenuNodeLabel + '#' + _ctxMenuNodeAddr + '] ';
                chatInput.value += tag;
                chatInput.focus();
            } else if (action === 'detail') {
                onGraphSelect(_ctxMenuNodeId);
            }
            document.getElementById('graphContextMenu').style.display = 'none';
        });
        
        // ===== 思考过程面板功能 =====
        
        // 处理思考步骤消息
        function handleThinkingStep(data) {
            var rid = data.request_id;
            if (!rid) return;
            
            var stepData = {
                step_type: data.step_type || 'unknown',
                iteration: data.iteration || 0,
                timestamp: data.timestamp || 0,
                data: data.data || {}
            };
            
            // 🔥 流水线事件拦截：pipeline.* 类型的事件同时更新图谱
            if (stepData.step_type.indexOf('pipeline.') === 0) {
                handlePipelineEvent(stepData);
            }
            
            // 检查是否已有面板（已嵌入消息中）
            var panel = thinkingPanelMap[rid];
            if (panel) {
                appendStepToPanel(panel, stepData);
            } else {
                // 面板尚未创建（消息还没到），缓存步骤
                if (!pendingThinkingSteps[rid]) {
                    pendingThinkingSteps[rid] = [];
                }
                pendingThinkingSteps[rid].push(stepData);
                
                // 在打字指示器旁显示实时思考预览
                updateTypingThinkingPreview(rid, stepData);
            }
        }
        
        // 处理流水线事件（更新任务图谱）
        function handlePipelineEvent(stepData) {
            var pipelineType = stepData.step_type.replace('pipeline.', '');
            var eventData = stepData.data || {};
            
            switch (pipelineType) {
                case 'pipeline_start':
                    // Gatekeeper 发布的初始图谱事件
                    if (eventData.graph) {
                        addTaskGraph(eventData.graph);
                        var wrapper0 = document.getElementById('appWrapper');
                        if (wrapper0 && !wrapper0.classList.contains('split-mode')) {
                            toggleTaskGraph();
                        }
                        console.log('[Pipeline] 初始图谱已创建:', eventData.graph.title);
                    }
                    break;

                case 'agent_start':
                    // Agent启动 → 通过 addTaskGraph 做 backendId 匹配
                    if (eventData.graph) {
                        addTaskGraph(eventData.graph);
                        // 自动打开图谱面板
                        var wrapper = document.getElementById('appWrapper');
                        if (wrapper && !wrapper.classList.contains('split-mode')) {
                            toggleTaskGraph();
                        }
                        console.log('[Agent] 图谱已创建/更新:', eventData.graph.title, '工具数:', eventData.tool_count);
                    }
                    break;

                case 'agent_tool_call':
                    // Agent工具调用 → 通过 addTaskGraph 做 backendId 匹配
                    // addTaskGraph 会自动：backendId 匹配则更新，不匹配则创建新条目
                    if (eventData.graph) {
                        addTaskGraph(eventData.graph);
                    }
                    console.log('[Agent] Turn', eventData.turn, '调用工具:', eventData.tool);
                    break;

                case 'agent_done':
                    // Agent完成 → 最终图谱同步
                    if (eventData.graph) {
                        addTaskGraph(eventData.graph);
                    }
                    console.log('[Agent] 完成, 耗时:', eventData.duration, 's, 轮次:', eventData.turns);
                    break;

                case 'agent_error':
                    console.error('[Agent] 异常:', eventData.error);
                    break;

                case 'supervisor_inject':
                    console.log('[Agent] Supervisor 注入消息:', eventData.message);
                    break;

                case 'graph_update':
                    // 单节点更新
                    if (eventData.data && eventData.data.node_id) {
                        updateGraphNode(
                            eventData.data.node_id,
                            eventData.data.status,
                            eventData.data.result
                        );
                    }
                    break;
            }
        }

        // 确保图谱已创建（如果错过了 agent_start 事件）
        function ensureGraphExists(graphData) {
            if (!activeGraphId) {
                addTaskGraph(graphData);
                var wrapper = document.getElementById('appWrapper');
                if (wrapper && !wrapper.classList.contains('split-mode')) {
                    toggleTaskGraph();
                }
                console.log('[Agent] 补创建图谱:', graphData.title);
            }
        }
        
        // 🔥 更新活跃图谱的完整数据
        function updateActiveGraph(graphData) {
            if (!activeGraphId) return;
            var graphs = getSessionGraphs();
            for (var i = 0; i < graphs.length; i++) {
                if (graphs[i].id === activeGraphId) {
                    graphs[i].nodes = graphData.nodes || graphs[i].nodes;
                    graphs[i].hEdges = graphData.hEdges || graphs[i].hEdges;
                    graphs[i].dEdges = graphData.dEdges || graphs[i].dEdges;
                    if (graphData.graphAddress) graphs[i].graphAddress = graphData.graphAddress;
                    break;
                }
            }
            saveSessionGraphs(graphs);
            renderGraphById(activeGraphId);
        }
        
        // 🔥 更新图谱中单个节点的状态
        function updateGraphNode(nodeId, status, result) {
            if (!activeGraphId) return;
            var graphs = getSessionGraphs();
            for (var i = 0; i < graphs.length; i++) {
                if (graphs[i].id === activeGraphId) {
                    var nodes = graphs[i].nodes || [];
                    for (var j = 0; j < nodes.length; j++) {
                        if (nodes[j].id === nodeId) {
                            nodes[j].status = status;
                            if (result !== undefined && result !== null) {
                                nodes[j].result = result;
                            }
                            break;
                        }
                    }
                    break;
                }
            }
            saveSessionGraphs(graphs);
            renderGraphById(activeGraphId);
        }
        
        // 创建思考过程面板 DOM
        function createThinkingPanel(requestId) {
            var panel = document.createElement('div');
            panel.className = 'thinking-panel';
            panel.setAttribute('data-request-id', requestId);
            
            var toggle = document.createElement('button');
            toggle.className = 'thinking-toggle';
            toggle.innerHTML = '<span class="arrow expanded">&#9654;</span> 思考过程 <span class="step-count">0 步</span>';
            toggle.onclick = function() {
                var content = panel.querySelector('.thinking-content');
                var arrow = toggle.querySelector('.arrow');
                if (content.classList.contains('expanded')) {
                    content.classList.remove('expanded');
                    arrow.classList.remove('expanded');
                } else {
                    content.classList.add('expanded');
                    arrow.classList.add('expanded');
                }
            };
            
            var content = document.createElement('div');
            content.className = 'thinking-content expanded';
            
            var steps = document.createElement('div');
            steps.className = 'thinking-steps';
            
            content.appendChild(steps);
            panel.appendChild(toggle);
            panel.appendChild(content);
            
            return panel;
        }
        
        // 向面板追加一个步骤
        function appendStepToPanel(panel, stepData) {
            var stepsContainer = panel.querySelector('.thinking-steps');
            if (!stepsContainer) return;
            
            var stepEl = document.createElement('div');
            stepEl.className = 'thinking-step ' + stepData.step_type;
            
            var icon = getStepIcon(stepData.step_type);
            var label = getStepLabel(stepData.step_type, stepData.data);
            var detail = getStepDetail(stepData.step_type, stepData.data);
            
            var html = '<span class="step-icon">' + icon + '</span><div class="step-body">';
            html += '<span class="step-label">' + label + '</span>';
            if (detail) {
                html += '<div class="step-detail">' + detail + '</div>';
            }
            html += '</div>';
            
            if (stepData.iteration > 0) {
                html += '<span class="step-time">iter ' + stepData.iteration + '</span>';
            }
            
            stepEl.innerHTML = html;
            stepsContainer.appendChild(stepEl);
            
            // 更新步骤计数
            var countEl = panel.querySelector('.step-count');
            var totalSteps = stepsContainer.children.length;
            if (countEl) {
                countEl.textContent = totalSteps + ' 步';
            }
        }
        
        // 获取步骤图标
        function getStepIcon(stepType) {
            var icons = {
                'iteration_start': '🔄',
                'model_call': '🤖',
                'tool_call': '🔧',
                'tool_result': '📋',
                'cb_evaluation': '⚡',
                'inference_complete': '✅',
                'search_link': '🔗',
                'pipeline.graph_update': '📊',
                'pipeline.agent_start': '🚀',
                'pipeline.agent_tool_call': '🔧',
                'pipeline.agent_done': '🏁',
                'pipeline.agent_error': '❌',
                'pipeline.supervisor_inject': '👁️'
            };
            return icons[stepType] || '📌';
        }
        
        // 获取步骤标签
        function getStepLabel(stepType, data) {
            switch (stepType) {
                case 'iteration_start':
                    return '第 ' + (data.iteration_number || '?') + ' 轮推理';
                case 'model_call':
                    return '调用模型';
                case 'tool_call':
                    return '调用工具: ' + (data.tool_name || '未知');
                case 'tool_result':
                    var dur = data.duration ? ' (' + data.duration.toFixed(1) + 's)' : '';
                    return '工具返回: ' + (data.tool_name || '未知') + dur;
                case 'cb_evaluation':
                    return 'CB 评估: ' + (data.result || '');
                case 'inference_complete':
                    return '推理完成';
                case 'search_link':
                    return '搜索链接';
                case 'pipeline.graph_update':
                    return '图谱更新';
                case 'pipeline.agent_start':
                    return 'Agent 启动 (工具: ' + (data.tool_count || '?') + ')';
                case 'pipeline.agent_tool_call':
                    return 'Turn ' + (data.turn || '?') + ': ' + (data.tool || '未知工具');
                case 'pipeline.agent_done':
                    var ad = data.duration ? (' (' + data.duration + 's)') : '';
                    return 'Agent 完成' + ad + ' (' + (data.turns || '?') + ' 轮)';
                case 'pipeline.agent_error':
                    return 'Agent 异常: ' + (data.error || '');
                case 'pipeline.supervisor_inject':
                    return 'Supervisor: ' + (data.message || '').substring(0, 80);
                default:
                    return stepType;
            }
        }
        
        // 获取步骤详情 HTML
        function getStepDetail(stepType, data) {
            switch (stepType) {
                case 'iteration_start':
                    var maxIter = data.max_iterations || '?';
                    return '最大迭代: ' + maxIter;
                case 'model_call':
                    if (data.prompt_length) {
                        return 'Prompt 长度: ' + data.prompt_length;
                    }
                    return '';
                case 'tool_call':
                    if (data.arguments) {
                        var argStr = typeof data.arguments === 'string' ? data.arguments : JSON.stringify(data.arguments);
                        if (argStr.length > 120) argStr = argStr.substring(0, 120) + '...';
                        return '参数: ' + escapeHtml(argStr);
                    }
                    return '';
                case 'tool_result':
                    if (data.summary) {
                        var summary = data.summary;
                        if (summary.length > 150) summary = summary.substring(0, 150) + '...';
                        return escapeHtml(summary);
                    }
                    return '';
                case 'cb_evaluation':
                    if (data.detail) {
                        return escapeHtml(data.detail);
                    }
                    return '';
                case 'inference_complete':
                    var parts = [];
                    if (data.total_iterations) parts.push('共 ' + data.total_iterations + ' 轮');
                    if (data.total_duration) parts.push('耗时 ' + data.total_duration.toFixed(1) + 's');
                    return parts.join(' | ');
                case 'search_link':
                    if (data.urls && data.urls.length > 0) {
                        return data.urls.map(function(url) {
                            return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(url) + '</a>';
                        }).join('<br>');
                    }
                    if (data.url) {
                        return '<a href="' + escapeHtml(data.url) + '" target="_blank" rel="noopener">' + escapeHtml(data.url) + '</a>';
                    }
                    return '';
                default:
                    return '';
            }
        }
        
        // HTML 转义
        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
        
        // 在打字指示器位置显示实时思考预览
        function updateTypingThinkingPreview(requestId, stepData) {
            var indicator = document.getElementById('typingIndicator');
            if (!indicator) return;

        // ================================================================
        //  任务图谱模块
        // ================================================================

        let graphInitialized = false;

        // ===== 图谱列表管理 =====
        const GRAPH_STORAGE_KEY = 'zulong_task_graphs';
        let activeGraphId = null;

        // 获取当前会话的图谱列表
        function loadGraphStore() {
            try {
                const raw = localStorage.getItem(GRAPH_STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) { console.error('[Graph] 加载失败:', e); }
            return {};
        }

        function saveGraphStore(store) {
            try {
                localStorage.setItem(GRAPH_STORAGE_KEY, JSON.stringify(store));
            } catch (e) { console.error('[Graph] 保存失败:', e); }
        }

        // 获取当前会话的图谱列表
        function getSessionGraphs() {
            if (!currentSessionId) return [];
            const store = loadGraphStore();
            return store[currentSessionId] || [];
        }

        // 保存当前会话的图谱列表
        function saveSessionGraphs(graphs) {
            if (!currentSessionId) return;
            const store = loadGraphStore();
            store[currentSessionId] = graphs;
            saveGraphStore(store);
        }

        // 添加新图谱（由后端推送或演示时调用）
        function addTaskGraph(graphData) {
            const graphs = getSessionGraphs();
            // 去重：仅用后端图谱 ID (backendId) 精确匹配
            // 不同任务即使同名也各自独立，同一任务多次推送事件只保留一条
            var backendId = graphData.id || '';
            var backendTitle = graphData.title || '';
            var graphAddress = graphData.graphAddress || '';
            var existingIdx = -1;
            if (backendId) {
                for (var i = 0; i < graphs.length; i++) {
                    if (graphs[i].backendId === backendId) {
                        existingIdx = i;
                        break;
                    }
                }
            }
            if (existingIdx >= 0) {
                // 同一后端图谱 → 更新数据，不新建条目
                graphs[existingIdx].nodes = graphData.nodes || graphs[existingIdx].nodes;
                graphs[existingIdx].hEdges = graphData.hEdges || graphs[existingIdx].hEdges;
                graphs[existingIdx].dEdges = graphData.dEdges || graphs[existingIdx].dEdges;
                graphs[existingIdx].title = backendTitle || graphs[existingIdx].title;
                if (graphAddress) graphs[existingIdx].graphAddress = graphAddress;
                saveSessionGraphs(graphs);
                activeGraphId = graphs[existingIdx].id;
                renderGraphList();
                renderGraphById(activeGraphId);
                return graphs[existingIdx].id;
            }
            const newGraph = {
                id: generateId(),
                backendId: backendId,
                graphAddress: graphAddress,
                title: backendTitle || '任务图谱 ' + (graphs.length + 1),
                createdAt: Date.now(),
                nodes: graphData.nodes || [],
                hEdges: graphData.hEdges || [],
                dEdges: graphData.dEdges || []
            };
            graphs.unshift(newGraph);
            saveSessionGraphs(graphs);
            activeGraphId = newGraph.id;
            renderGraphList();
            renderGraphById(newGraph.id);
            return newGraph.id;
        }

        // 切换到指定图谱
        function switchToGraph(graphId) {
            activeGraphId = graphId;
            renderGraphList();
            renderGraphById(graphId);

            // 通知后端：用户激活了此图谱（接口预留，后端处理待讨论后实现）
            if (ws && ws.readyState === WebSocket.OPEN) {
                var graphs = getSessionGraphs();
                var graph = graphs.find(function(g) { return g.id === graphId; });
                if (graph) {
                    ws.send(JSON.stringify({
                        type: 'ACTIVATE_TASK_GRAPH',
                        graphId: graphId,
                        graphData: {
                            title: graph.title,
                            nodes: graph.nodes,
                            hEdges: graph.hEdges,
                            dEdges: graph.dEdges
                        }
                    }));
                    console.log('[WebSocket] 📤 激活图谱:', graphId);
                }
            }
        }

        // 删除图谱
        function deleteGraph(graphId, ev) {
            if (ev) ev.stopPropagation();
            const graphs = getSessionGraphs();
            const filtered = graphs.filter(g => g.id !== graphId);
            saveSessionGraphs(filtered);

            if (activeGraphId === graphId) {
                if (filtered.length > 0) {
                    activeGraphId = filtered[0].id;
                    renderGraphList();
                    renderGraphById(filtered[0].id);
                } else {
                    activeGraphId = null;
                    renderGraphList();
                    clearGraphSvg();
                }
            } else {
                renderGraphList();
            }
        }

        // 展开/收起图谱列表
        function toggleGraphList() {
            const list = document.getElementById('graphList');
            const btn = document.getElementById('graphListToggle');
            const collapsed = list.classList.toggle('collapsed');
            btn.textContent = collapsed ? '▶' : '▼';
        }

        // 渲染图谱列表
        function renderGraphList() {
            const container = document.getElementById('graphItems');
            if (!container) return;
            container.innerHTML = '';
            const graphs = getSessionGraphs();

            if (graphs.length === 0) {
                container.innerHTML = '<div style="padding:8px 10px;font-size:11px;color:#94a3b8;text-align:center;">暂无图谱</div>';
                return;
            }

            graphs.forEach(function(g) {
                const div = document.createElement('div');
                div.className = 'graph-item' + (g.id === activeGraphId ? ' active' : '');
                div.onclick = function() { switchToGraph(g.id); };

                const icon = document.createElement('span');
                icon.className = 'graph-item-icon';
                icon.textContent = '📊';

                const title = document.createElement('span');
                title.className = 'graph-item-title';
                title.textContent = g.title;

                const nodeCount = g.nodes ? g.nodes.length : 0;
                const doneCount = g.nodes ? g.nodes.filter(function(n) { return n.status === 'completed' || n.status === 'skipped'; }).length : 0;
                const status = document.createElement('span');
                status.className = 'graph-item-status';
                status.textContent = doneCount + '/' + nodeCount;

                const del = document.createElement('button');
                del.className = 'graph-item-delete';
                del.textContent = '\u2715';
                del.title = '删除图谱';
                del.onclick = function(e) { deleteGraph(g.id, e); };

                div.appendChild(icon);
                div.appendChild(title);
                div.appendChild(status);
                div.appendChild(del);
                container.appendChild(div);
            });
        }

        // 清空图谱SVG
        function clearGraphSvg() {
            const gsvg = document.getElementById('graphSvg');
            if (gsvg) { gsvg.innerHTML = ''; gsvg.removeAttribute('width'); gsvg.removeAttribute('height'); }
            document.getElementById('gp-ptext').textContent = '0/0';

                document.getElementById('gp-llm').innerHTML = '<div class="gp-placeholder">暂无图谱数据</div>';
            }
            if (document.getElementById('gp-fullText')) {
                document.getElementById('gp-fullText').textContent = '';
            }
        }

        // 根据ID渲染图谱
        function renderGraphById(graphId) {
            const graphs = getSessionGraphs();
            const graph = graphs.find(function(g) { return g.id === graphId; });
