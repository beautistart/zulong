        // ===== 思考过程面板功能 =====
        
        // 处理思考步骤消息
        function handleThinkingStep(data) {
            var rid = data.request_id;
            if (!rid) return;
            
            var stepData = {
                step_type: data.step_type || 'unknown',
                iteration: data.iteration || 0,
                timestamp: data.timestamp || 0,
                data: data.data || {}
            };
            
            // 🔥 流水线事件拦截：pipeline.* 类型的事件同时更新图谱
            if (stepData.step_type.indexOf('pipeline.') === 0) {
                handlePipelineEvent(stepData);
            }
            
            // 检查是否已有面板（已嵌入消息中）
            var panel = thinkingPanelMap[rid];
            if (panel) {
                appendStepToPanel(panel, stepData);
            } else {
                // 面板尚未创建（消息还没到），缓存步骤
                if (!pendingThinkingSteps[rid]) {
                    pendingThinkingSteps[rid] = [];
                }
                pendingThinkingSteps[rid].push(stepData);
                
                // 在打字指示器旁显示实时思考预览
                updateTypingThinkingPreview(rid, stepData);
            }
        }
        
        // 处理流水线事件（更新任务图谱）
        function handlePipelineEvent(stepData) {
            var pipelineType = stepData.step_type.replace('pipeline.', '');
            var eventData = stepData.data || {};
            
            switch (pipelineType) {
                case 'pipeline_start':
                    // Gatekeeper 发布的初始图谱事件
                    if (eventData.graph) {
                        var result0 = addTaskGraph(eventData.graph);
                        // 仅在首次创建新图谱时才自动展开面板（避免旧图重复推送触发展开）
                        if (result0.isNew) {
                            var wrapper0 = document.getElementById('appWrapper');
                            if (wrapper0 && !wrapper0.classList.contains('split-mode')) {
                                toggleTaskGraph();
                            }
                        }
                        console.log('[Pipeline] 图谱事件:', eventData.graph.title, result0.isNew ? '(新建)' : '(更新)');
                    }
                    break;

                case 'agent_start':
                    // Agent启动 → 通过 addTaskGraph 做 backendId 匹配
                    if (eventData.graph) {
                        var result1 = addTaskGraph(eventData.graph);
                        // 仅新建时自动打开图谱面板
                        if (result1.isNew) {
                            var wrapper = document.getElementById('appWrapper');
                            if (wrapper && !wrapper.classList.contains('split-mode')) {
                                toggleTaskGraph();
                            }
                        }
                        console.log('[Agent] 图谱事件:', eventData.graph.title, '工具数:', eventData.tool_count, result1.isNew ? '(新建)' : '(更新)');
                    }
                    break;

                case 'agent_tool_call':
                    // Agent工具调用 → 通过 addTaskGraph 做 backendId 匹配
                    // addTaskGraph 会自动：backendId 匹配则更新，不匹配则创建新条目
                    if (eventData.graph) {
                        addTaskGraph(eventData.graph);
                    }
                    console.log('[Agent] Turn', eventData.turn, '调用工具:', eventData.tool);
                    break;

                case 'agent_done':
                    // Agent完成 → 最终图谱同步
                    if (eventData.graph) {
                        addTaskGraph(eventData.graph);
                    }
                    console.log('[Agent] 完成, 耗时:', eventData.duration, 's, 轮次:', eventData.turns);
                    break;

                case 'agent_error':
                    console.error('[Agent] 异常:', eventData.error);
                    break;

                case 'supervisor_inject':
                    console.log('[Agent] Supervisor 注入消息:', eventData.message);
                    break;

                case 'graph_update':
                    // 单节点更新
                    if (eventData.data && eventData.data.node_id) {
                        updateGraphNode(
                            eventData.data.node_id,
                            eventData.data.status,
                            eventData.data.result
                        );
                    }
                    break;
            }
        }

        // 确保图谱已创建（如果错过了 agent_start 事件）
        function ensureGraphExists(graphData) {
            if (!activeGraphId) {
                var result = addTaskGraph(graphData);
                if (result.isNew) {
                    var wrapper = document.getElementById('appWrapper');
                    if (wrapper && !wrapper.classList.contains('split-mode')) {
                        toggleTaskGraph();
                    }
                }
                console.log('[Agent] 补创建图谱:', graphData.title);
            }
        }
        
        // 🔥 更新活跃图谱的完整数据
        function updateActiveGraph(graphData) {
            if (!activeGraphId) return;
            var graphs = getSessionGraphs();
            for (var i = 0; i < graphs.length; i++) {
                if (graphs[i].id === activeGraphId) {
                    graphs[i].nodes = graphData.nodes || graphs[i].nodes;
                    graphs[i].hEdges = graphData.hEdges || graphs[i].hEdges;
                    graphs[i].dEdges = graphData.dEdges || graphs[i].dEdges;
                    if (graphData.graphAddress) graphs[i].graphAddress = graphData.graphAddress;
                    break;
                }
            }
            saveSessionGraphs(graphs);
            renderGraphById(activeGraphId);
        }
        
        // 🔥 更新图谱中单个节点的状态
        function updateGraphNode(nodeId, status, result) {
            if (!activeGraphId) return;
            var graphs = getSessionGraphs();
            for (var i = 0; i < graphs.length; i++) {
                if (graphs[i].id === activeGraphId) {
                    var nodes = graphs[i].nodes || [];
                    for (var j = 0; j < nodes.length; j++) {
                        if (nodes[j].id === nodeId) {
                            nodes[j].status = status;
                            if (result !== undefined && result !== null) {
                                nodes[j].result = result;
                            }
                            break;
                        }
                    }
                    break;
                }
            }
            saveSessionGraphs(graphs);
            renderGraphById(activeGraphId);
        }
        
        // 创建思考过程面板 DOM
        function createThinkingPanel(requestId) {

        // 获取步骤图标
        function getStepIcon(stepType) {
            var icons = {
                'iteration_start': '🔄',
                'model_call': '🤖',
                'tool_call': '🔧',
                'tool_result': '📋',
                'cb_evaluation': '⚡',
                'inference_complete': '✅',
                'search_link': '🔗',
                'pipeline.graph_update': '📊',
                'pipeline.agent_start': '🚀',
                'pipeline.agent_tool_call': '🔧',
                'pipeline.agent_done': '🏁',
                'pipeline.agent_error': '❌',
                'pipeline.supervisor_inject': '👁️'
            };
            return icons[stepType] || '📌';
        }
        
        // 获取步骤标签
        function getStepLabel(stepType, data) {
            switch (stepType) {
                case 'iteration_start':
                    return '第 ' + (data.iteration_number || '?') + ' 轮推理';
                case 'model_call':
                    return '调用模型';
                case 'tool_call':
                    return '调用工具: ' + (data.tool_name || '未知');
                case 'tool_result':
                    var dur = data.duration ? ' (' + data.duration.toFixed(1) + 's)' : '';
                    return '工具返回: ' + (data.tool_name || '未知') + dur;
                case 'cb_evaluation':
                    return 'CB 评估: ' + (data.result || '');
                case 'inference_complete':
                    return '推理完成';
                case 'search_link':
                    return '搜索链接';
                case 'pipeline.graph_update':
                    return '图谱更新';
                case 'pipeline.agent_start':
                    return 'Agent 启动 (工具: ' + (data.tool_count || '?') + ')';
                case 'pipeline.agent_tool_call':
                    return 'Turn ' + (data.turn || '?') + ': ' + (data.tool || '未知工具');
                case 'pipeline.agent_done':
                    var ad = data.duration ? (' (' + data.duration + 's)') : '';
                    return 'Agent 完成' + ad + ' (' + (data.turns || '?') + ' 轮)';
                case 'pipeline.agent_error':
                    return 'Agent 异常: ' + (data.error || '');
                case 'pipeline.supervisor_inject':
                    return 'Supervisor: ' + (data.message || '').substring(0, 80);
                default:
                    return stepType;
            }
        }
        
        // 获取步骤详情 HTML
        function getStepDetail(stepType, data) {
            switch (stepType) {
                case 'iteration_start':
                    var maxIter = data.max_iterations || '?';
                    return '最大迭代: ' + maxIter;
                case 'model_call':
                    if (data.prompt_length) {
                        return 'Prompt 长度: ' + data.prompt_length;
                    }
                    return '';
                case 'tool_call':
                    if (data.arguments) {
                        var argStr = typeof data.arguments === 'string' ? data.arguments : JSON.stringify(data.arguments);
                        if (argStr.length > 120) argStr = argStr.substring(0, 120) + '...';
                        return '参数: ' + escapeHtml(argStr);
                    }
                    return '';
                case 'tool_result':
                    if (data.summary) {
                        var summary = data.summary;
                        if (summary.length > 150) summary = summary.substring(0, 150) + '...';
                        return escapeHtml(summary);
                    }
                    return '';
                case 'cb_evaluation':
                    if (data.detail) {
                        return escapeHtml(data.detail);
                    }
                    return '';
                case 'inference_complete':
                    var parts = [];
                    if (data.total_iterations) parts.push('共 ' + data.total_iterations + ' 轮');
                    if (data.total_duration) parts.push('耗时 ' + data.total_duration.toFixed(1) + 's');
                    return parts.join(' | ');
                case 'search_link':
                    if (data.urls && data.urls.length > 0) {
                        return data.urls.map(function(url) {
                            return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(url) + '</a>';
                        }).join('<br>');
                    }
                    if (data.url) {
                        return '<a href="' + escapeHtml(data.url) + '" target="_blank" rel="noopener">' + escapeHtml(data.url) + '</a>';
                    }
                    return '';
                default:
                    return '';
            }
        }
        
        // HTML 转义
        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        let _modulePollTimer = null;

        function toggleModulePanel() {

                fetchModuleStatus();
                if (!_modulePollTimer) {

        async function fetchModuleStatus() {
            try {
                const resp = await fetch('/api/status');
                if (!resp.ok) return;
                const data = await resp.json();
                renderModulePanel(data);
            } catch (e) {
                console.warn('[ModulePanel] 获取状态失败:', e);
            }
        }

        function renderModulePanel(data) {
            const modeEl = document.getElementById('mpMode');
            modeEl.textContent = data.mode ? (data.mode === 'full' ? 'Full 模式' : 'IDE 模式') : '--';

            const body = document.getElementById('modulePanelBody');
            if (!data.modules) { body.innerHTML = '<div style="color:#64748b;font-size:12px;text-align:center;padding:30px;">暂无模块信息</div>'; return; }

            const modules = Object.values(data.modules);
            const core = modules.filter(m => !m.optional);
            const optional = modules.filter(m => m.optional);

            let html = '';
            if (core.length > 0) {
                html += '<div class="module-section-title">核心模块</div>';
                core.forEach(m => { html += _renderModuleCard(m, false); });
            }
            if (optional.length > 0) {
                html += '<div class="module-section-title">可选模块</div>';
                optional.forEach(m => { html += _renderModuleCard(m, true); });
            }
            body.innerHTML = html;

            // 绑定开关事件
            body.querySelectorAll('.mc-switch input').forEach(input => {
                input.addEventListener('change', async function() {
                    const name = this.dataset.module;
                    const action = this.checked ? 'start' : 'stop';
                    this.disabled = true;
                    try {
                        const r = await fetch('/api/module/' + name + '/' + action, { method: 'POST' });
                        const result = await r.json();
                        if (result.error) { alert(result.error); }
                    } catch(e) { alert('操作失败: ' + e.message); }
                    setTimeout(fetchModuleStatus, 500);
                });
            });
        }

        function _renderModuleCard(m, switchable) {

            const stateLabel = { running: '运行中', starting: '启动中', stopped: '已停止', stopping: '停止中', error: '出错', unloaded: '未加载' }[stateClass] || stateClass;
            const isRunning = stateClass === 'running';
            const switchHtml = switchable
                ? '<label class="mc-switch"><input type="checkbox" data-module="' + m.name + '"' + (isRunning ? ' checked' : '') + '><span class="slider"></span></label>'
                : '';
            return '<div class="module-card">'
                + '<div class="mc-indicator ' + stateClass + '"></div>'
                + '<div class="mc-info"><div class="mc-name">' + (m.display_name || m.name) + '</div><div class="mc-state">' + stateLabel + (m.error ? ' - ' + m.error : '') + '</div></div>'
                + switchHtml
                + '</div>';
        }

        function renderLayerCard(layer) {
            const statusClass = layer.status || 'unloaded';
            const statusLabel = { running: '运行中', stopped: '已停止', unloaded: '未加载', error: '出错' }[statusClass] || statusClass;
            let summary = '';
            let bodyHtml = '';

            if (layer.type === 'rule') {
                summary = '规则驱动';
                bodyHtml = '<div style="color:#64748b;font-size:11px;padding:8px 0;">该层无独立模型配置</div>';
            } else if (layer.type === 'cloud') {
                const cfg = layer.config || {};
                summary = (_backendDisplayNames[cfg.backend] || cfg.backend || '') + ' / ' + ((cfg.model_id || '').split('/').pop() || '');
                bodyHtml = _renderCloudFields(layer);
            } else if (layer.type === 'local') {
                const cfg = layer.config || {};
                summary = (cfg.model_path || '').split('/').pop() + ' · ' + (cfg.device || '');
                bodyHtml = _renderLocalFields(layer);
            } else if (layer.type === 'vision') {
                const cfg = layer.config || {};
                summary = (cfg.model_path || '').split('/').pop() + ' · ' + (cfg.device || '');
                bodyHtml = _renderVisionFields(layer);
            } else if (layer.type === 'audio') {
                const cfg = layer.config || {};
                summary = (cfg.backend || '') + ' · ' + (cfg.voice || '');
                bodyHtml = _renderAudioFields(layer);
            } else if (layer.type === 'expert') {
                const experts = (layer.config || {}).experts || [];
                summary = experts.length + ' 个专家模型';
                bodyHtml = _renderExpertFields(layer);
            }

            return '<div class="layer-card" data-layer-id="' + layer.id + '">'
                + '<div class="layer-card-header">'
                + '<div class="layer-card-indicator ' + statusClass + '"></div>'
                + '<span class="layer-card-title">' + layer.name + '</span>'
                + '<span class="layer-card-summary">' + summary + '</span>'
                + '<span class="layer-card-expand">&#9660;</span>'
                + '</div>'
                + '<div class="layer-card-body">' + bodyHtml + '</div>'
                + '</div>';
        }

        function _renderCloudFields(layer) {
            const cfg = layer.config || {};
            let opts = '';
            _availableBackends.forEach(function(b) {
                opts += '<option value="' + b + '"' + (b === cfg.backend ? ' selected' : '') + '>' + (_backendDisplayNames[b] || b) + '</option>';
            });
            return '<div class="layer-field"><label>后端</label><select data-field="backend">' + opts + '</select></div>'
                + '<div class="layer-field"><label>模型</label><input data-field="model_id" type="text" value="' + (cfg.model_id || '') + '" placeholder="model_id" /></div>'
                + '<div class="layer-field"><label>URL</label><input data-field="base_url" type="text" value="' + (cfg.base_url || '') + '" placeholder="base_url" /></div>'
                + '<div class="layer-field"><label>Key</label><input data-field="api_key" type="password" value="" placeholder="' + (cfg.api_key ? '(已配置)' : 'api_key') + '" /></div>'
                + _renderCtxWindowControl(layer.id, cfg.num_ctx || 131072)
                + '<div class="layer-card-actions"><button class="layer-save-btn" onclick="saveLayerConfig(\'' + layer.id + '\')">应用</button></div>';
        }

        // ── 上下文窗口控件 ──────────────────────────────────
        var _CTX_PRESETS = [4096, 8192, 16384, 32768, 65536, 131072, 262144, 524288, 1048576];

        function _formatCtxSize(tokens) {
            if (tokens >= 1048576) return (tokens / 1048576).toFixed(tokens % 1048576 === 0 ? 0 : 1) + 'M';
            if (tokens >= 1024) return (tokens / 1024).toFixed(tokens % 1024 === 0 ? 0 : 1) + 'K';
            return tokens.toString();
        }

        function _valueToSliderIndex(value) {
            for (var i = _CTX_PRESETS.length - 1; i >= 0; i--) {
                if (value >= _CTX_PRESETS[i]) return i;
            }
            return 0;
        }

        function _renderCtxWindowControl(layerId, currentValue) {
            var sliderIdx = _valueToSliderIndex(currentValue);
            var presetBtns = '';
            _CTX_PRESETS.forEach(function(p, i) {
                var active = (i === sliderIdx && _CTX_PRESETS[i] === currentValue) ? ' active' : '';
                presetBtns += '<button class="ctx-preset-btn' + active + '" onclick="onCtxPresetClick(\'' + layerId + '\',' + p + ')">' + _formatCtxSize(p) + '</button>';
            });
            return '<div class="ctx-window-control">'
                + '<div class="ctx-window-label">'
                + '<span>上下文窗口</span>'
                + '<span class="ctx-window-value" id="ctxVal_' + layerId + '" onclick="onCtxValueClick(\'' + layerId + '\')">' + _formatCtxSize(currentValue) + '</span>'
                + '</div>'
                + '<input type="range" class="ctx-window-slider" id="ctxSlider_' + layerId + '" min="0" max="' + (_CTX_PRESETS.length - 1) + '" value="' + sliderIdx + '" oninput="onCtxSliderChange(\'' + layerId + '\')" />'
                + '<input type="hidden" data-field="num_ctx" id="ctxHidden_' + layerId + '" value="' + currentValue + '" />'
                + '<div class="ctx-window-presets">' + presetBtns + '</div>'
                + '</div>';
        }

        function onCtxSliderChange(layerId) {
            var slider = document.getElementById('ctxSlider_' + layerId);
            var idx = parseInt(slider.value);
            var value = _CTX_PRESETS[idx];
            document.getElementById('ctxHidden_' + layerId).value = value;
            var valEl = document.getElementById('ctxVal_' + layerId);
            valEl.textContent = _formatCtxSize(value);
            // 更新预设按钮高亮
            var card = slider.closest('.layer-card');
            card.querySelectorAll('.ctx-preset-btn').forEach(function(btn, i) {
                btn.classList.toggle('active', i === idx);
            });
        }

        function onCtxPresetClick(layerId, presetValue) {
            var idx = _CTX_PRESETS.indexOf(presetValue);
            if (idx < 0) return;
            var slider = document.getElementById('ctxSlider_' + layerId);
            slider.value = idx;
            onCtxSliderChange(layerId);
        }

        function onCtxValueClick(layerId) {
            var valEl = document.getElementById('ctxVal_' + layerId);
            var hidden = document.getElementById('ctxHidden_' + layerId);
            var currentVal = parseInt(hidden.value) || 131072;
            // 替换显示文本为输入框
            var input = document.createElement('input');
            input.type = 'number';
            input.className = 'ctx-window-input';
            input.value = currentVal;
            input.min = 1024;
            input.max = 2097152;
            input.step = 1024;
            valEl.replaceWith(input);
            input.focus();
            input.select();

            function commit() {
                var v = parseInt(input.value);
                if (!v || v < 1024) v = 1024;
                if (v > 2097152) v = 2097152;
                hidden.value = v;
                // 恢复显示
                var span = document.createElement('span');
                span.className = 'ctx-window-value';
                span.id = 'ctxVal_' + layerId;
                span.textContent = _formatCtxSize(v);
                span.onclick = function() { onCtxValueClick(layerId); };
                input.replaceWith(span);
                // 同步滑块位置
                var slider = document.getElementById('ctxSlider_' + layerId);
                slider.value = _valueToSliderIndex(v);
                // 更新预设按钮
                var card = slider.closest('.layer-card');
                card.querySelectorAll('.ctx-preset-btn').forEach(function(btn, i) {
                    btn.classList.toggle('active', _CTX_PRESETS[i] === v);
                });
            }

            input.addEventListener('blur', commit);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); commit(); }
                if (e.key === 'Escape') {
                    input.value = currentVal;
                    commit();
                }
            });
        }

        function _renderLocalFields(layer) {
            const cfg = layer.config || {};

        async function saveLayerConfig(layerId) {
            const card = document.querySelector('.layer-card[data-layer-id="' + layerId + '"]');
            if (!card) return;
            const config = {};
            card.querySelectorAll('[data-field]').forEach(function(el) {
                const key = el.dataset.field;
                let val = el.value.trim();
                if (val === 'true') val = true;
                else if (val === 'false') val = false;
                if (val !== '' && val !== false) config[key] = val;
            });

            try {
                const resp = await fetch('/api/models/layers/' + layerId + '/update', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({config: config}),
                });
                const result = await resp.json();
                if (result.status === 'ok') {
                    showToast(result.message, 'success');
                    loadModelLayers();  // 刷新
                } else {
                    showToast(result.message || '更新失败', 'error');
                }
            } catch (e) {
                showToast('请求失败: ' + e.message, 'error');
            }
        }

        function deleteChatMessage(msgId, msgEl, deleteBelow) {
            if (!currentSessionId) return;
            const store = loadSessionStore();
            const session = store.sessions.find(s => s.id === currentSessionId);
            if (!session) return;

            // 通过 ID 查找；如果找不到则通过 DOM 索引回退
            let msgIndex = session.messages.findIndex(m => m.id === msgId);
            if (msgIndex < 0 && msgEl) {
                // 回退：通过 DOM 顺序确定在消息数组中的位置
                const allMsgEls = chatMessages.querySelectorAll('.message');
                const domIdx = Array.from(allMsgEls).indexOf(msgEl);
                if (domIdx >= 0 && domIdx < session.messages.length) {
                    msgIndex = domIdx;
                }
            }
            if (msgIndex < 0) return;

            // 收集要删除的消息 ID（后端批量删除）
            let removedIds = [];
            if (deleteBelow) {
                removedIds = session.messages.slice(msgIndex).map(m => m.id);
                session.messages = session.messages.slice(0, msgIndex);
            } else {
                removedIds = [msgId];
                session.messages = session.messages.filter(m => m.id !== msgId);
            }
            saveSessionStore(store);

            // 前端 DOM 移除
            if (deleteBelow) {
                let el = msgEl;
                while (el) {
                    const next = el.nextElementSibling;
                    el.remove();
                    el = next;
                }
            } else {
                msgEl.remove();
            }

            // 后端删除（逐条）
            removedIds.forEach(function(id) {
                fetch('/api/chat/sessions/' + currentSessionId + '/messages/' + id, {
                    method: 'DELETE'
                }).catch(function(e) {
                    console.warn('[Message] 后端删除失败:', e);
                });
            });

            showToast(deleteBelow ? '已删除该消息及以下内容' : '已删除消息', 'success');
        }

        // 获取当前会话的图谱列表
        function loadGraphStore() {
            try {
                const raw = localStorage.getItem(GRAPH_STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) { console.error('[Graph] 加载失败:', e); }
            return {};
        }

        function saveGraphStore(store) {
            try {
                localStorage.setItem(GRAPH_STORAGE_KEY, JSON.stringify(store));
            } catch (e) { console.error('[Graph] 保存失败:', e); }

        // 获取当前会话的图谱列表
        function getSessionGraphs() {
            if (!currentSessionId) return [];
            const store = loadGraphStore();
            return store[currentSessionId] || [];
        }

        // 保存当前会话的图谱列表
        function saveSessionGraphs(graphs) {
            if (!currentSessionId) return;
            const store = loadGraphStore();
            store[currentSessionId] = graphs;
            saveGraphStore(store);
        }

        // 添加新图谱（由后端推送或演示时调用）
        // 返回 { id, isNew } — isNew 为 true 表示首次创建
        // 图谱渲染防抖：同一backendId的更新合并，200ms内只重绘一次
        var _graphUpdateTimers = {};
        var _graphPendingData = {};

        function addTaskGraph(graphData) {
            const graphs = getSessionGraphs();
            var backendId = graphData.id || '';
            var backendTitle = cleanDisplayText(graphData.title || '');
            var graphAddress = graphData.graphAddress || '';
            var existingIdx = -1;
            if (backendId) {
                for (var i = 0; i < graphs.length; i++) {
                    if (graphs[i].backendId === backendId) {
                        existingIdx = i;
                        break;
                    }
                }
            }
            if (existingIdx >= 0) {
                graphs[existingIdx].nodes = graphData.nodes || graphs[existingIdx].nodes;
                graphs[existingIdx].hEdges = graphData.hEdges || graphs[existingIdx].hEdges;
                graphs[existingIdx].dEdges = graphData.dEdges || graphs[existingIdx].dEdges;
                graphs[existingIdx].title = backendTitle || graphs[existingIdx].title;
                if (graphAddress) graphs[existingIdx].graphAddress = graphAddress;
                if (graphData.code_anchors) graphs[existingIdx].code_anchors = graphData.code_anchors;
                activeGraphId = graphs[existingIdx].id;

                // 增量更新：如果当前显示的图谱就是这个，尝试只更新变化的节点
                if (activeGraphId === graphs[existingIdx].id && _tryIncrementalUpdate(graphData)) {
                    // 增量更新成功，延迟写localStorage
                    _graphPendingData[backendId] = graphs;
                    if (!_graphUpdateTimers[backendId]) {
                        _graphUpdateTimers[backendId] = setTimeout(function() {
                            delete _graphUpdateTimers[backendId];
                            var pending = _graphPendingData[backendId];
                            delete _graphPendingData[backendId];
                            if (pending) saveSessionGraphs(pending);
                        }, 500);
                    }
                    renderGraphList();
                    return { id: graphs[existingIdx].id, isNew: false };
                }

                // 增量更新失败（首次渲染或结构变化），立即全量重绘 + 延迟写localStorage
                _graphPendingData[backendId] = graphs;
                if (!_graphUpdateTimers[backendId]) {
                    _graphUpdateTimers[backendId] = setTimeout(function() {
                        delete _graphUpdateTimers[backendId];
                        var pending = _graphPendingData[backendId];
                        delete _graphPendingData[backendId];
                        if (pending) saveSessionGraphs(pending);
                    }, 300);
                }
                renderGraphList();
                renderGraphById(activeGraphId);
                return { id: graphs[existingIdx].id, isNew: false };
            }
            const newGraph = {
                id: generateId(),
                backendId: backendId,
                graphAddress: graphAddress,
                title: backendTitle || '任务图谱 ' + (graphs.length + 1),
                createdAt: Date.now(),
                nodes: graphData.nodes || [],
                hEdges: graphData.hEdges || [],
                dEdges: graphData.dEdges || [],
                code_anchors: graphData.code_anchors || {}
            };
            graphs.unshift(newGraph);
            saveSessionGraphs(graphs);
            activeGraphId = newGraph.id;
            renderGraphList();
            renderGraphById(newGraph.id);
            return { id: newGraph.id, isNew: true };
        }

        // 增量DOM更新：仅更新节点状态（status/class），不重建SVG
        // 返回true表示增量成功，false表示需要全量重绘
        function _tryIncrementalUpdate(graphData) {
            var gsvg = document.getElementById('graphSvg');
            if (!gsvg || !gsvg.children.length) return false;
            var newNodes = graphData.nodes;
            if (!newNodes || !newNodes.length) return false;

            var existingNodes = gsvg.querySelectorAll('.gnode');
            if (existingNodes.length !== newNodes.length) return false;

            var changed = false;
            for (var i = 0; i < newNodes.length; i++) {
                var n = newNodes[i];
                var el = gsvg.querySelector('.gnode[data-id="' + n.id + '"]');
                if (!el) return false;  // 节点ID不匹配，需全量重绘

                var oldClass = el.getAttribute('class');
                var newClass = 'gnode status-' + (n.status || 'pending');
                if (oldClass !== newClass) {
                    el.setAttribute('class', newClass);
                    changed = true;

                    // 更新状态标签文字
                    var tagTexts = el.querySelectorAll('text');
                    var statusLabel = SZH[n.status] || n.status || '';
                    for (var j = tagTexts.length - 1; j >= 0; j--) {
                        var t = tagTexts[j];
                        if (t.textContent && t.textContent.startsWith('[')) {
                            t.textContent = '[' + statusLabel + ']';
                            break;
                        }
                    }
                    // 更新状态图标
                    var icoTexts = el.querySelectorAll('text[font-size="11"]');
                    if (icoTexts.length && SICO[n.status]) {
                        icoTexts[0].textContent = SICO[n.status];
                    }
                    // 更新状态标签背景色
                    var tagRects = el.querySelectorAll('rect');
                    for (var j = tagRects.length - 1; j >= 0; j--) {
                        var r = tagRects[j];
                        if (r.getAttribute('rx') === '4' && r.getAttribute('height') === '16') {
                            r.setAttribute('fill', STBG[n.status] || '#f1f5f9');
                            break;
                        }
                    }
                    // 更新左侧状态条颜色
                    var allRects = el.querySelectorAll('rect');
                    for (var k = 0; k < allRects.length; k++) {
                        var rr = allRects[k];
                        if (rr.getAttribute('width') === '4' && rr.getAttribute('rx') === '2') {
                            rr.setAttribute('fill', SCOLOR[n.status] || '#cbd5e1');
                            break;
                        }
                    }
                    // 更新标签前景色
                    var tagFgTexts = el.querySelectorAll('text[font-weight="700"]');
                    for (var j = tagFgTexts.length - 1; j >= 0; j--) {
                        var t = tagFgTexts[j];
                        if (t.textContent && t.textContent.startsWith('[')) {
                            t.setAttribute('fill', STFG[n.status] || '#64748b');
                            break;
                        }
                    }
                }
            }

            if (changed) {
                // 更新进度条
                var gTot = newNodes.length;
                var gDone = newNodes.filter(function(n){return n.status==='completed'||n.status==='skipped';}).length;
                var gpPtext = document.getElementById('gp-ptext');
                var gpPfill = document.getElementById('gp-pfill');
                if (gpPtext) gpPtext.textContent = gDone+'/'+gTot+' 已完成';
                if (gpPfill) gpPfill.style.width = (gDone/gTot*100).toFixed(0)+'%';
            }

            return true;
        }

        // 切换到指定图谱
        function switchToGraph(graphId) {
            activeGraphId = graphId;
            renderGraphList();
            renderGraphById(graphId);

            // 通知后端：用户激活了此图谱（接口预留，后端处理待讨论后实现）
            if (ws && ws.readyState === WebSocket.OPEN) {
                var graphs = getSessionGraphs();
                var graph = graphs.find(function(g) { return g.id === graphId; });
                if (graph) {
                    ws.send(JSON.stringify({
                        type: 'ACTIVATE_TASK_GRAPH',
                        graphId: graphId,
                        graphData: {
                            title: graph.title,
                            nodes: graph.nodes,
                            hEdges: graph.hEdges,
                            dEdges: graph.dEdges
                        }
                    }));
                    console.log('[WebSocket] 📤 激活图谱:', graphId);
                }
            }
        }

        // 删除图谱（前端 + 后端）
        function deleteGraph(graphId, ev) {
            if (ev) ev.stopPropagation();
            const graphs = getSessionGraphs();
            // 找到要删除的图谱，获取其 backendId
            const target = graphs.find(g => g.id === graphId);
            const backendId = target ? (target.backendId || '') : '';
            const filtered = graphs.filter(g => g.id !== graphId);
            saveSessionGraphs(filtered);

            if (activeGraphId === graphId) {
                if (filtered.length > 0) {
                    activeGraphId = filtered[0].id;
                    renderGraphList();
                    renderGraphById(filtered[0].id);
                } else {
                    activeGraphId = null;
                    renderGraphList();
                    clearGraphSvg();
                }
            } else {
                renderGraphList();
            }

            // 调用后端删除 API（使用 backendId）
            if (backendId) {
                fetch('/api/task-graph/' + encodeURIComponent(backendId), {
                    method: 'DELETE'
                }).then(function(r) { return r.json(); }).then(function(result) {
                    if (result.status === 'ok') {
                        console.log('[TaskGraph] 后端已删除:', backendId,
                            'cleared_active:', result.cleared_active,
                            'deleted_backup:', result.deleted_backup);
                    }
                }).catch(function(e) {
                    console.warn('[TaskGraph] 后端删除失败:', e);
                });
            }
            showToast('图谱已删除', 'success');
        }

        // 渲染图谱列表
        function renderGraphList() {
            const container = document.getElementById('graphItems');
            if (!container) return;
            container.innerHTML = '';
            const graphs = getSessionGraphs();

            if (graphs.length === 0) {
                container.innerHTML = '<div style="padding:8px 10px;font-size:11px;color:#94a3b8;text-align:center;">暂无图谱</div>';
                return;
            }

            graphs.forEach(function(g) {
                const div = document.createElement('div');
                div.className = 'graph-item' + (g.id === activeGraphId ? ' active' : '');
                div.onclick = function() { switchToGraph(g.id); };

                const icon = document.createElement('span');
                icon.className = 'graph-item-icon';
                icon.textContent = '📊';

                const title = document.createElement('span');
                title.className = 'graph-item-title';
                title.textContent = cleanDisplayText(g.title);

                const nodeCount = g.nodes ? g.nodes.length : 0;
                const doneCount = g.nodes ? g.nodes.filter(function(n) { return n.status === 'completed' || n.status === 'skipped'; }).length : 0;
                const status = document.createElement('span');
                status.className = 'graph-item-status';
                status.textContent = doneCount + '/' + nodeCount;

                const del = document.createElement('button');
                del.className = 'graph-item-delete';
                del.textContent = '\u2715';
                del.title = '删除图谱';
                del.onclick = function(e) { deleteGraph(g.id, e); };

                div.appendChild(icon);
                div.appendChild(title);
                div.appendChild(status);
                div.appendChild(del);
                container.appendChild(div);
            });
        }

            var graphPanel = document.getElementById('graphPanel');
            var wrapper = document.getElementById('appWrapper');
            var isDragging = false;

            var startChatWidth = 0;

            handle.addEventListener('mousedown', function(e) {
                if (e.target.classList.contains('graph-collapse-btn')) return; // 不拦截按钮点击
                e.preventDefault();
                isDragging = true;
                startX = e.clientX;
                startChatWidth = chatContainer.getBoundingClientRect().width;
                handle.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                var wrapperWidth = wrapper.getBoundingClientRect().width;
                var dx = e.clientX - startX;
                var newChatWidth = startChatWidth + dx;
                // 限制：chat 最小 200px，最大 wrapperWidth - 300px
                var minChat = 200;
                var maxChat = wrapperWidth - 300;
                newChatWidth = Math.max(minChat, Math.min(maxChat, newChatWidth));
                var chatPct = (newChatWidth / wrapperWidth) * 100;
                chatContainer.style.flex = '0 0 ' + chatPct + '%';
                chatContainer.style.maxWidth = chatPct + '%';
                graphPanel.style.flex = '1';
            });

            document.addEventListener('mouseup', function() {
                if (!isDragging) return;
                isDragging = false;
                handle.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            });

        function gEsc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

                        }

                    this.expanded.set(nodeId, !current);

        // 获取所有子节点（递归）
        function getAllDescendants(nodeId, hEdges, maxDepth) {
            const descendants = [];
            const visited = new Set();
            const queue = [{id: nodeId, depth: 0}];
            
            while (queue.length > 0) {
                const current = queue.shift();
                if (current.depth >= (maxDepth || 100)) continue;
                
                hEdges.forEach(function(e) {
                    if (e[0] === current.id && !visited.has(e[1])) {
                        visited.add(e[1]);
                        descendants.push(e[1]);
                        queue.push({id: e[1], depth: current.depth + 1});
                    }
                });
            }
            
            return descendants;
        }
        
        // 切换节点折叠状态
        function toggleNodeFold(nodeId) {

            if (!graph) return;
            
            // 切换折叠状态
            const currentState = _cyFoldState.get(nodeId) !== false;
            _cyFoldState.set(nodeId, !currentState);
            
            console.log('[Fold] Node', nodeId, '->', !currentState ? 'expanded' : 'collapsed');
            
            // 重新渲染（保持缩放）
            renderGraphData(graph.nodes, graph.hEdges, graph.dEdges, true);
        }
        
        function renderGraphData(G_NODES, G_H_EDGES, G_D_EDGES, skipAutoFit) {
            skipAutoFit = skipAutoFit || false;
            
            if (!G_NODES || G_NODES.length === 0) {
                const cy = getCytoscapeInstance();
                cy.elements().remove();
                return;
            }
            
            console.log('[Cytoscape] Rendering', G_NODES.length, 'nodes');
            const startTime = performance.now();
            
            // 初始化折叠状态
            G_NODES.forEach(function(n) {
                if (!_cyFoldState.has(n.id)) {
                    _cyFoldState.set(n.id, true);  // 默认展开
                }
            });
            
            // 过滤可见节点（考虑折叠状态）
            var visibleNodeIds = new Set();
            var queue = [];
            
            // 找到根节点
            G_NODES.forEach(function(n) {
                const hasParent = G_H_EDGES.some(function(e) { return e[1] === n.id; });
                if (!hasParent) {
                    visibleNodeIds.add(n.id);
                    queue.push(n.id);
                }
            });
            
            // BFS遍历
            while (queue.length > 0) {
                const parentId = queue.shift();
                const isExpanded = _cyFoldState.get(parentId) !== false;
                
                if (isExpanded) {
                    G_H_EDGES.forEach(function(e) {
                        if (e[0] === parentId && !visibleNodeIds.has(e[1])) {
                            visibleNodeIds.add(e[1]);
                            queue.push(e[1]);
                        }
                    });
                }
            }
            
            // 构造Cytoscape元素
            const elements = [];
            
            // 添加节点
            G_NODES.forEach(function(n) {
                if (!visibleNodeIds.has(n.id)) return;
                
                const lines = (n.label || '').split(/[:：]/);
                const displayLabel = lines.length > 1 ? lines[0] + '\n' + lines[1] : n.label;
                
                elements.push({
                    group: 'nodes',
                    data: {
                        id: n.id,
                        label: displayLabel,
                        type: n.type || 'task',
                        status: n.status || 'pending',
                        desc: n.desc || '',
                        files: n.files || [],
                        address: n.address || ''
                    }
                });
            });
            
            // 添加层级边
            G_H_EDGES.forEach(function(e) {
                if (visibleNodeIds.has(e[0]) && visibleNodeIds.has(e[1])) {
                    elements.push({
                        group: 'edges',
                        data: {
                            id: 'h_' + e[0] + '_' + e[1],
                            source: e[0],
                            target: e[1],
                            edgeType: 'hierarchy'
                        }
                    });
                }
            });
            
            // 添加依赖边
            if (G_D_EDGES) {
                G_D_EDGES.forEach(function(e) {
                    if (visibleNodeIds.has(e.s) && visibleNodeIds.has(e.t)) {
                        const srcNode = G_NODES.find(n => n.id === e.s);
                        const satisfied = srcNode && (srcNode.status === 'completed' || srcNode.status === 'skipped');
                        
                        elements.push({
                            group: 'edges',
                            data: {
                                id: 'd_' + e.s + '_' + e.t,
                                source: e.s,
                                target: e.t,
                                edgeType: 'dependency',
                                via: e.via || '',
                                satisfied: satisfied ? 'true' : 'false'
                            }
                        });
                    }
                });
            }
            
            // 获取Cytoscape实例并渲染
            const cy = getCytoscapeInstance();
            if (!cy) {
                console.error('[Cytoscape] Failed to get instance');
                return;
            }
            
            console.log('[Cytoscape] Elements to render:', elements.length, 'items');
            
            // 清空并添加新元素
            cy.elements().remove();
            cy.add(elements);
            
            // 执行布局
            cy.layout({
                name: 'dagre',
                rankDir: 'TB',
                nodeSep: 60,
                rankSep: 80,
                padding: 60,
                animate: false,
                fit: false
            }).run();
            
            // 首次加载时自适应视图
            if (!skipAutoFit) {
                setTimeout(function() {
                    cy.fit(undefined, 20);
                }, 100);
            }
            
            const renderTime = performance.now() - startTime;
            console.log('[Cytoscape] Render completed in', renderTime.toFixed(2), 'ms');
            
            // 更新进度条
            updateGraphProgress(G_NODES);
        }

        function renderGraphDetailView(id, gnodeMap, G_D_EDGES){
            var n=gnodeMap[id]; if(!n)return;
            var inD=G_D_EDGES.filter(function(e){return e.t===id;}), outD=G_D_EDGES.filter(function(e){return e.s===id;});
            var h='<h3>'+SICO[n.status]+' '+n.label+'</h3>';

            if(n.result) h+='<div class="gp-field"><div class="gp-field-label">执行结果</div><div class="gp-field-value">'+gEsc(n.result)+'</div></div>';
            
            // 节点完整地址（直接使用后端计算的层级地址）

        }
        function getFileIcon(path) {

        // ===================================================================
        // 记忆图谱 (Memory Graph) - SVG + d3-force + 分层折叠展开
        // ===================================================================

        let mgSimulation = null;
        let mgInitialized = false;
        var mgPendingFullData = null;

        // 核心状态（分层折叠展开）
        let mgState = {
            nodes: new Map(),        // id -> node data (含 x/y)
            edges: [],               // [{source, target, type, weight, protected}]
            expandedSet: new Set(),  // 已展开的节点 ID
            selectedNodeId: null,
            activeNodeIds: new Set(),
        };

        const MG_COLORS = {
            dialogue: '#8b5cf6', task: '#3b82f6', knowledge: '#22c55e',
            experience: '#f59e0b', episode: '#06b6d4', file: '#64748b',
            concept: '#ec4899', person: '#ef4444', document: '#94a3b8',
            group: '#a78bfa', code_symbol: '#10b981', module: '#0891b2'
        };

        const MG_RADIUS = {
            dialogue: 8, task: 7, knowledge: 5, experience: 5,
            episode: 6, file: 5, concept: 5, person: 7, document: 5,
            group: 14, code_symbol: 4, module: 6
        };

        const MG_EDGE_STYLES = {
            hierarchy:   { stroke: '#475569', dasharray: 'none', width: 2 },
            dependency:  { stroke: '#ef4444', dasharray: '6 3', width: 1.5 },
            reference:   { stroke: '#3b82f6', dasharray: '3 3', width: 1 },
            temporal:    { stroke: '#8b5cf6', dasharray: 'none', width: 1.5 },
            semantic:    { stroke: '#06b6d4', dasharray: '4 2', width: 1 },
            causal:      { stroke: '#f59e0b', dasharray: 'none', width: 1.5 },
            association: { stroke: '#a78bfa', dasharray: '2 4', width: 1 },
        };

        function initMemoryGraph() {
            const svgEl = document.getElementById('memoryGraphSvg');
            if (!svgEl) return;
            const svg = d3.select(svgEl);
            const rect = svgEl.parentElement.getBoundingClientRect();
            const width = rect.width || 600;
            const height = rect.height || 400;

            svg.selectAll('*').remove();

            // defs - arrowhead marker
            const defs = svg.append('defs');
            defs.append('marker')
                .attr('id', 'mg-arrow')
                .attr('viewBox', '0 -3 6 6')
                .attr('refX', 14).attr('refY', 0)
                .attr('markerWidth', 6).attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path').attr('d', 'M0,-3L6,0L0,3').attr('fill', '#475569');

            const g = svg.append('g').attr('id', 'mgRoot');

            // zoom + pan
            svg.call(d3.zoom()
                .scaleExtent([0.2, 5])
                .on('zoom', (e) => g.attr('transform', e.transform)));

            // 力导向模拟
            mgSimulation = d3.forceSimulation()
                .force('link', d3.forceLink().id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-150))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => (MG_RADIUS[d.type] || 5) + 6))
                .on('tick', mgTick);

            mgInitialized = true;
            console.log('[MemoryGraph] SVG + d3-force 初始化完成（分层折叠模式）');
        }

        // ---- SVG 渲染 ----

        function renderMemoryGraph() {
            if (!mgInitialized) initMemoryGraph();
            if (!mgSimulation) return;

            var nodes = Array.from(mgState.nodes.values());
            var edges = mgState.edges.map(function(e) {
                return {
                    source: typeof e.source === 'object' ? e.source.id : e.source,
                    target: typeof e.target === 'object' ? e.target.id : e.target,
                    type: e.type, weight: e.weight, protected: e.protected
                };
            });

            const g = d3.select('#mgRoot');

            // --- 边 ---
            const linkSel = g.selectAll('.mg-link').data(edges, d => d.source + '-' + d.target + '-' + d.type);
            linkSel.exit().remove();
            const linkEnter = linkSel.enter().append('line').attr('class', 'mg-link');
            const linkMerge = linkEnter.merge(linkSel);
            linkMerge
                .attr('stroke', d => (MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES.reference).stroke)
                .attr('stroke-width', d => (MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES.reference).width)
                .attr('stroke-dasharray', d => (MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES.reference).dasharray)
                .attr('stroke-opacity', d => 0.3 + (d.weight || 0.5) * 0.5)
                .attr('marker-end', 'url(#mg-arrow)');

            // --- 节点 ---
            const nodeSel = g.selectAll('.mg-node').data(nodes, d => d.id);
            nodeSel.exit().remove();
            const nodeEnter = nodeSel.enter().append('g').attr('class', 'mg-node');
            nodeEnter.append('circle');
            nodeEnter.append('text').attr('class', 'mg-node-label');
            // children_count badge 元素
            var badgeG = nodeEnter.append('g').attr('class', 'mg-badge');
            badgeG.append('circle').attr('class', 'mg-badge-circle');
            badgeG.append('text').attr('class', 'mg-badge-text');

            // 拖拽
            nodeEnter.call(d3.drag()
                .on('start', mgDragStarted)
                .on('drag', mgDragged)
                .on('end', mgDragEnded));

            // 单击节点 → 显示详情
            nodeEnter.on('click', function(event, d) {
                event.stopPropagation();
                mgState.selectedNodeId = d.id;
                showMgNodeDetail(d);
                g.selectAll('.mg-node circle').filter('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
                d3.select(this).select('.mg-main-circle').attr('stroke', '#f59e0b').attr('stroke-width', 3);
            });

            // 双击节点 → 展开/折叠
            nodeEnter.on('dblclick', function(event, d) {
                event.stopPropagation();
                event.preventDefault();
                if (mgState.expandedSet.has(d.id)) {
                    mgCollapseNode(d.id);
                } else if ((d.children_count || 0) > 0) {
                    mgExpandNode(d.id);
                }
            });

            const nodeMerge = nodeEnter.merge(nodeSel);

            // 给主圆标记 class 便于选择
            nodeMerge.select('circle:first-child')
                .attr('class', 'mg-main-circle')
                .attr('r', d => MG_RADIUS[d.type] || 5)
                .attr('fill', d => MG_COLORS[d.type] || '#64748b')
                .attr('stroke', d => d.type === 'group' ? '#c4b5fd' : '#1e293b')
                .attr('stroke-width', d => d.type === 'group' ? 2.5 : 1.5)
                .attr('stroke-dasharray', d => d.type === 'group' ? '4 2' : 'none')
                .attr('opacity', d => d.type === 'group' ? 0.85 : 0.6 + (d.activation || 0) * 0.4);

            nodeMerge.select('.mg-node-label')
                .attr('dy', d => -(MG_RADIUS[d.type] || 5) - 4)
                .attr('text-anchor', 'middle')
                .text(d => (d.label || '').substring(0, 14));

            // children_count badge（未展开 + 有子节点）
            nodeMerge.select('.mg-badge').each(function(d) {
                var cc = d.children_count || 0;
                var show = cc > 0 && !mgState.expandedSet.has(d.id);
                var badgeG = d3.select(this);
                badgeG.attr('display', show ? null : 'none');
                if (show) {
                    var r = MG_RADIUS[d.type] || 5;
                    var badgeText = cc > 99 ? '99+' : String(cc);
                    var badgeR = badgeText.length > 2 ? 9 : (badgeText.length > 1 ? 7 : 6);
                    badgeG.select('.mg-badge-circle')
                        .attr('cx', r * 0.7).attr('cy', -r * 0.7)
                        .attr('r', badgeR)
                        .attr('fill', '#ef4444');
                    badgeG.select('.mg-badge-text')
                        .attr('x', r * 0.7).attr('y', -r * 0.7)
                        .attr('text-anchor', 'middle')
                        .attr('dominant-baseline', 'central')
                        .attr('fill', '#fff')
                        .attr('font-size', '8px')
                        .attr('font-weight', 'bold')
                        .text(badgeText);
                }
            });

            // 活跃节点高亮（脉冲动画 CSS class）
            nodeMerge
                .classed('mg-active', function(d) { return mgState.activeNodeIds.has(d.id); })
                .classed('mg-active-dialogue', function(d) { return mgState.activeNodeIds.has(d.id) && d.type === 'dialogue'; })
                .classed('mg-active-task', function(d) { return mgState.activeNodeIds.has(d.id) && d.type === 'task'; });

            // 选中高亮
            if (mgState.selectedNodeId) {
                nodeMerge.select('.mg-main-circle').each(function(d) {
                    if (d.id === mgState.selectedNodeId) {
                        d3.select(this).attr('stroke', '#f59e0b').attr('stroke-width', 3);
                    }
                });
            }

            // 更新模拟
            mgSimulation.nodes(nodes);
            mgSimulation.force('link').links(edges);
            mgSimulation.alpha(0.6).restart();

            // 更新统计
            var statsEl = document.getElementById('mgStats');
            if (statsEl) {
                statsEl.textContent = mgState.nodes.size + ' 节点 | ' + mgState.edges.length + ' 边';
            }
        }

        function mgTick() {
            const g = d3.select('#mgRoot');
            g.selectAll('.mg-link')
                .attr('x1', d => d.source.x || 0)
                .attr('y1', d => d.source.y || 0)
                .attr('x2', d => d.target.x || 0)
                .attr('y2', d => d.target.y || 0);
            g.selectAll('.mg-node')
                .attr('transform', d => 'translate(' + (d.x || 0) + ',' + (d.y || 0) + ')');
        }

        function mgDragStarted(event, d) {
            if (!event.active) mgSimulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        }
        function mgDragged(event, d) {
            d.fx = event.x; d.fy = event.y;
        }
        function mgDragEnded(event, d) {
            if (!event.active) mgSimulation.alphaTarget(0);
            d.fx = null; d.fy = null;
        }

        // ---- simulation 更新（折叠展开后刷新 SVG）----

        function mgUpdateSimulation(alpha) {
            if (!mgSimulation) return;
            renderMemoryGraph();
        }

        // ---- 展开/折叠 ----

        function mgExpandNode(nodeId) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'EXPAND_NODE', node_id: nodeId }));
            }
        }

        function handleMemoryGraphExpandResult(data) {
            if (!data || !data.parent_id) return;
            var parentNode = mgState.nodes.get(data.parent_id);
            if (!parentNode) return;

            var isVirtualGroup = data.parent_id.indexOf('__group:') === 0;
            mgState.expandedSet.add(data.parent_id);

            // 插入子节点（初始位置在父节点附近）
            var newNodes = data.nodes || [];
            for (var i = 0; i < newNodes.length; i++) {
                var nd = newNodes[i];
                if (!mgState.nodes.has(nd.id)) {
                    nd.x = parentNode.x + (Math.random() - 0.5) * 60;
                    nd.y = parentNode.y + (Math.random() - 0.5) * 60;
                    nd.vx = 0;
                    nd.vy = 0;
                    mgState.nodes.set(nd.id, nd);
                }
            }

            // 插入边（去重）
            var newEdges = data.edges || [];
            // 对虚拟分组节点，添加合成 hierarchy 边（group → child），
            // 保证折叠/全量更新时能正确识别后代关系
            if (isVirtualGroup) {
                for (var k = 0; k < newNodes.length; k++) {
                    newEdges.push({
                        source: data.parent_id,
                        target: newNodes[k].id,
                        type: 'hierarchy',
                        weight: 1,
                        protected: false
                    });
                }
            }
            var existingEdgeKeys = new Set();
            for (var j = 0; j < mgState.edges.length; j++) {
                var ex = mgState.edges[j];
                var ek = (typeof ex.source === 'object' ? ex.source.id : ex.source) + '-' +
                         (typeof ex.target === 'object' ? ex.target.id : ex.target) + '-' + ex.type;
                existingEdgeKeys.add(ek);
            }
            for (var j = 0; j < newEdges.length; j++) {
                var ne = newEdges[j];
                var nk = ne.source + '-' + ne.target + '-' + ne.type;
                if (!existingEdgeKeys.has(nk)) {
                    mgState.edges.push(ne);
                }
            }

            mgUpdateSimulation(0.5);
        }

        function mgCollapseNode(nodeId) {
            // 递归查找所有后代
            var descendants = new Set();
            var queue = [nodeId];
            while (queue.length > 0) {
                var current = queue.shift();
                for (var i = 0; i < mgState.edges.length; i++) {
                    var e = mgState.edges[i];
                    if (e.type !== 'hierarchy') continue;
                    var sid = typeof e.source === 'object' ? e.source.id : e.source;
                    var tid = typeof e.target === 'object' ? e.target.id : e.target;
                    if (sid === current && !descendants.has(tid)) {
                        descendants.add(tid);
                        queue.push(tid);
                    }
                }
            }

            descendants.forEach(function(did) {
                mgState.nodes.delete(did);
                mgState.expandedSet.delete(did);
            });

            mgState.edges = mgState.edges.filter(function(e) {
                var sid = typeof e.source === 'object' ? e.source.id : e.source;
                var tid = typeof e.target === 'object' ? e.target.id : e.target;
                return !descendants.has(sid) && !descendants.has(tid);
            });

            mgState.expandedSet.delete(nodeId);

            if (descendants.has(mgState.selectedNodeId)) {
                mgState.selectedNodeId = nodeId;
            }

            mgUpdateSimulation(0.3);
        }

        // ---- 数据加载 ----

        function mgLoadFullData(data) {
            mgState.nodes.clear();
            mgState.edges = [];
            mgState.expandedSet.clear();

            var nodes = data.nodes || [];
            for (var i = 0; i < nodes.length; i++) {
                mgState.nodes.set(nodes[i].id, nodes[i]);
            }

            mgState.edges = (data.edges || []).map(function(e) {
                return {
                    source: typeof e.source === 'object' ? e.source.id : e.source,
                    target: typeof e.target === 'object' ? e.target.id : e.target,
                    type: e.type, weight: e.weight, protected: e.protected
                };
            });

            if (data.active_node_ids) {
                mgState.activeNodeIds = new Set(data.active_node_ids);
            }

            renderMemoryGraph();
        }

        function handleMemoryGraphUpdate(data) {
            if (!data) return;

            if (data.active_node_ids) {
                mgState.activeNodeIds = new Set(data.active_node_ids);
            }

            if (data.update_type === 'full' || !mgInitialized) {
                if (currentGraphTab === 'memory') {
                    if (!mgInitialized) initMemoryGraph();
                    if (mgState.nodes.size === 0) {
                        mgLoadFullData(data);
                    } else {
                        mgMergeFullUpdate(data);
                    }
                } else {
                    mgPendingFullData = data;
                }
            } else if (data.update_type === 'delta' && data.changes) {
                // CRG 流式索引 delta: 仅在记忆图谱 tab 激活时实时应用
                if (mgInitialized && currentGraphTab === 'memory') {
                    mgApplyDelta(data.changes);
                }
            }

            // 更新思维可视化浮动窗口
            if (data.thought_view) {
                updateThoughtView(data.thought_view);
            }
        }

        var codeAnchorCache = new Map(); // anchor_id -> anchor data

        function handleCodeAnchorUpdate(data) {
            if (!data || !data.payload) return;
            var payload = data.payload || data;

            for (var i = 0; i < changes.length; i++) {

        }

        function mgMergeFullUpdate(data) {
            var newNodes = data.nodes || [];
            var newNodeMap = {};
            for (var i = 0; i < newNodes.length; i++) {
                newNodeMap[newNodes[i].id] = newNodes[i];
            }

            mgState.nodes.forEach(function(existing, id) {
                if (newNodeMap[id]) {
                    existing.label = newNodeMap[id].label;
                    existing.activation = newNodeMap[id].activation;
                    existing.metadata = newNodeMap[id].metadata;
                    existing.children_count = newNodeMap[id].children_count || 0;
                }
            });

            var hasParent = new Set();
            var allEdges = data.edges || [];
            for (var j = 0; j < allEdges.length; j++) {
                if (allEdges[j].type === 'hierarchy') {
                    hasParent.add(typeof allEdges[j].target === 'object' ? allEdges[j].target.id : allEdges[j].target);
                }
            }

            for (var i = 0; i < newNodes.length; i++) {
                var nd = newNodes[i];
                if (!mgState.nodes.has(nd.id) && !hasParent.has(nd.id)) {
                    mgState.nodes.set(nd.id, nd);
                }
            }

            var toRemove = [];
            mgState.nodes.forEach(function(existing, id) {
                if (!newNodeMap[id] && !mgState.expandedSet.has(id)) {
                    var isDescendant = false;
                    mgState.edges.forEach(function(e) {
                        if (e.type === 'hierarchy') {
                            var tid = typeof e.target === 'object' ? e.target.id : e.target;
                            if (tid === id) isDescendant = true;
                        }
                    });
                    if (!isDescendant) toRemove.push(id);
                }
            });
            for (var r = 0; r < toRemove.length; r++) {
                mgState.nodes.delete(toRemove[r]);
            }

            renderMemoryGraph();
        }

        function mgApplyDelta(changes) {
            // 先收集本批次新增的 hierarchy 边，判断哪些新节点的父节点已展开
            var newHierarchyEdges = {};
            for (var p = 0; p < changes.length; p++) {
                var ce = changes[p];
                if (ce.action === 'add_edge' && ce.data && ce.data.type === 'hierarchy') {
                    newHierarchyEdges[ce.data.target] = ce.data.source;
                }
            }

            for (var i = 0; i < changes.length; i++) {
                var ch = changes[i];
                if (ch.action === 'add_node') {
                    var nodeData = ch.data;
                    if (nodeData && nodeData.id && !mgState.nodes.has(nodeData.id)) {
                        // 只添加可见节点：父节点已展开，或无层级父边的新根节点
                        var hierParent = newHierarchyEdges[nodeData.id];
                        if (hierParent) {
                            // 有层级父节点 — 仅当父节点已展开时添加
                            if (mgState.expandedSet.has(hierParent)) {
                                mgState.nodes.set(nodeData.id, nodeData);
                            }
                        }
                        // 无层级父边的新节点不直接添加（属于虚拟分组，下次全量更新时体现）
                    }
                } else if (ch.action === 'update_node') {
                    var nd = mgState.nodes.get(ch.data && ch.data.id);
                    if (nd && ch.data) {
                        if (ch.data.label !== undefined) nd.label = ch.data.label;
                        if (ch.data.activation !== undefined) nd.activation = ch.data.activation;
                        if (ch.data.metadata !== undefined) nd.metadata = ch.data.metadata;
                    }
                } else if (ch.action === 'remove_node') {
                    if (ch.data && ch.data.id) {
                        mgState.nodes.delete(ch.data.id);
                        mgState.expandedSet.delete(ch.data.id);
                    }
                } else if (ch.action === 'add_edge') {
                    if (ch.data) {
                        mgState.edges.push(ch.data);
                        if (ch.data.type === 'hierarchy') {
                            var parent = mgState.nodes.get(ch.data.source);
                            if (parent) parent.children_count = (parent.children_count || 0) + 1;
                        }
                    }
                } else if (ch.action === 'remove_edge') {
                    if (ch.data) {
                        mgState.edges = mgState.edges.filter(function(e) {
                            var sid = typeof e.source === 'object' ? e.source.id : e.source;
                            var tid = typeof e.target === 'object' ? e.target.id : e.target;
                            return !(sid === ch.data.source && tid === ch.data.target);
                        });
                        if (ch.data.type === 'hierarchy') {
                            var parent = mgState.nodes.get(ch.data.source);
                            if (parent && parent.children_count > 0) parent.children_count--;
                        }
                    }
                }
            }
            renderMemoryGraph();
        }
