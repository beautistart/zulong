            if (tab === 'memory') {
                taskView.classList.add('hidden');
                memoryView.classList.add('active');
                if (progressBar) progressBar.style.display = 'none';
                if (mgStatsEl) mgStatsEl.style.display = '';
                // 首次切换时初始化 SVG + d3-force
                if (!mgInitialized) {
                    initMemoryGraph();
                }
                // 如果有缓存数据则加载，否则向后端请求
                if (mgPendingFullData) {
                    setTimeout(function() {
                        mgLoadFullData(mgPendingFullData);
                        mgPendingFullData = null;
                    }, 100);
                } else if (mgState.nodes.size > 0) {
                    setTimeout(function() { renderMemoryGraph(); }, 100);
                } else {
                    // 没有缓存数据，主动请求后端推送记忆图谱快照(depth=0)
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'REQUEST_MEMORY_GRAPH' }));
                    }
                }
            } else {
                memoryView.classList.remove('active');
                taskView.classList.remove('hidden');
                if (progressBar) progressBar.style.display = '';
                if (mgStatsEl) mgStatsEl.style.display = 'none';
                if (!graphInitialized) {
                    initTaskGraph();
                    graphInitialized = true;
                }
            }
        }

        // 图谱常量
        const SICO = { completed:'\u2705', in_progress:'\uD83D\uDD35', pending:'\u2B1C', blocked:'\uD83D\uDD34', skipped:'\u23ED\uFE0F', needs_adjust:'\u26A0\uFE0F' };
        const SZH  = { completed:'已完成', in_progress:'进行中', pending:'未开始', blocked:'阻塞', skipped:'已跳过', needs_adjust:'需调整' };
        const TCOLOR = { requirement:'#8b5cf6', analysis:'#6366f1', outline:'#3b82f6', task:'#06b6d4', subtask:'#10b981' };
        const SCOLOR = { completed:'#22c55e', in_progress:'#3b82f6', pending:'#cbd5e1', blocked:'#ef4444', skipped:'#a78bfa', needs_adjust:'#f59e0b' };
        const STBG   = { completed:'#dcfce7', in_progress:'#dbeafe', pending:'#f1f5f9', blocked:'#fee2e2', skipped:'#ede9fe', needs_adjust:'#fef3c7' };
        const STFG   = { completed:'#15803d', in_progress:'#1d4ed8', pending:'#64748b', blocked:'#dc2626', skipped:'#7c3aed', needs_adjust:'#d97706' };

        function gEsc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        // 缓存 window 级事件处理器引用，切换图谱时清理旧的
        var _graphWindowHandlers = { mousemove: null, mouseup: null, wheelHandler: null };

        // 通用图谱渲染函数
        function renderGraphData(G_NODES, G_H_EDGES, G_D_EDGES) {
            const gnodeMap = {}; G_NODES.forEach(function(n) { gnodeMap[n.id] = n; });

            /* ---- Dagre 布局 ---- */
            const NW = 140, NH = 66;
            const gd = new dagre.graphlib.Graph();
            gd.setGraph({ rankdir:'TB', nodesep:36, ranksep:56, marginx:40, marginy:40 });
            gd.setDefaultEdgeLabel(function() { return {}; });
            G_NODES.forEach(function(n) { gd.setNode(n.id, { width:NW, height:NH }); });
            G_H_EDGES.forEach(function(e) { gd.setEdge(e[0], e[1]); });
            dagre.layout(gd);
            const gi = gd.graph();

            /* ---- SVG 渲染 ---- */
            const gsvg = document.getElementById('graphSvg');
            gsvg.innerHTML = '';
            const GW = gi.width + 80, GH = gi.height + 80;
            gsvg.setAttribute('width', GW); gsvg.setAttribute('height', GH);
            gsvg.setAttribute('viewBox', '0 0 ' + GW + ' ' + GH);

            function sE(tag, a) {
                a = a || {};
                const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
                for (const k in a) e.setAttribute(k, a[k]); return e;
            }

            // Defs (markers)
            const defs = sE('defs');
            [['gah','#cbd5e1'],['gad-r','#ef4444'],['gad-g','#22c55e']].forEach(function(arr) {
                const id = arr[0], c = arr[1];
                const m = sE('marker',{id:id, markerWidth:7, markerHeight:7, refX:6, refY:3.5, orient:'auto'});
                m.appendChild(sE('path',{d:'M0 0L7 3.5L0 7Z',fill:c})); defs.appendChild(m);
            });
            gsvg.appendChild(defs);

            const layerHier = sE('g'), layerDep = sE('g'), layerNode = sE('g');
            gsvg.appendChild(layerHier); gsvg.appendChild(layerDep); gsvg.appendChild(layerNode);

            function nP(id){ const n=gd.node(id); return {x:n.x, y:n.y}; }

            // Hierarchy edges
            G_H_EDGES.forEach(function(e) {
                var s = e[0], t = e[1];
                const sp=nP(s), tp=nP(t), sy=sp.y+NH/2, ty=tp.y-NH/2, my=(sy+ty)/2;
                const d='M'+sp.x+' '+sy+' C'+sp.x+' '+my+' '+tp.x+' '+my+' '+tp.x+' '+ty;
                layerHier.appendChild(sE('path',{d:d, class:'edge-hier','marker-end':'url(#gah)','data-s':s,'data-t':t}));
            });

            // Dependency edges
            G_D_EDGES.forEach(function(e) {
                const sp=nP(e.s), tp=nP(e.t);
                const sx=sp.x, sy=sp.y+NH/2, tx=tp.x, ty=tp.y-NH/2;
                const dy=ty-sy, dx=tx-sx;
                const off=e.cross?Math.min(Math.abs(dx)*0.35,60)*(dx>=0?1:-1):0;
                const d='M'+sx+' '+sy+' C'+(sx+off)+' '+(sy+dy*.45)+' '+(tx-off)+' '+(ty-dy*.45)+' '+tx+' '+ty;
                const src=gnodeMap[e.s], sat=src&&(src.status==='completed'||src.status==='skipped');
                const grp=sE('g',{class:'dep-group '+(sat?'satisfied':'unsatisfied'),'data-s':e.s,'data-t':e.t});
                grp.appendChild(sE('path',{d:d, class:'dep-line','marker-end':sat?'url(#gad-g)':'url(#gad-r)'}));
                const mx=(sx+tx)/2+off*0.4, my2=(sy+ty)/2;
                const lb=sE('text',{x:mx, y:my2-7, class:'dep-label','text-anchor':'middle'});
                lb.textContent=e.via; grp.appendChild(lb);
                layerDep.appendChild(grp);
            });

            // Nodes
            G_NODES.forEach(function(n) {
                const p=nP(n.id), x=p.x-NW/2, y=p.y-NH/2;
                const g=sE('g',{class:'gnode status-'+n.status,'data-id':n.id,transform:'translate('+x+','+y+')'});
                g.appendChild(sE('rect',{class:'card',width:NW,height:NH,rx:8}));
                g.appendChild(sE('rect',{width:NW,height:3,rx:2,fill:TCOLOR[n.type]||'#94a3b8'}));
                g.appendChild(sE('rect',{width:4,height:NH,rx:2,fill:SCOLOR[n.status]||'#cbd5e1'}));
                const ico=sE('text',{x:NW-16,y:16,'font-size':'11'}); ico.textContent=SICO[n.status]||''; g.appendChild(ico);
                const lines=n.label.split(/[\uff1a:]/);
                if(lines.length>1){
                    const t1=sE('text',{class:'subtitle',x:NW/2,y:18,'text-anchor':'middle'}); t1.textContent=lines[0]; g.appendChild(t1);
                    const t2=sE('text',{class:'title',x:NW/2,y:33,'text-anchor':'middle'}); t2.textContent=lines[1]; g.appendChild(t2);
                } else {
                    const t=sE('text',{class:'title',x:NW/2,y:26,'text-anchor':'middle'}); t.textContent=n.label; g.appendChild(t);
                }
                const tagLabel=SZH[n.status]||n.status, tagStr='['+tagLabel+']';
                const tagW=tagStr.length*10.5+10, tagX=(NW-tagW)/2, tagY=NH-19;
                g.appendChild(sE('rect',{x:tagX,y:tagY,width:tagW,height:16,rx:4,fill:STBG[n.status]||'#f1f5f9'}));
                const tt=sE('text',{x:NW/2,y:tagY+12,'text-anchor':'middle','font-size':'10','font-weight':'700',fill:STFG[n.status]||'#64748b'});
                tt.textContent=tagStr; g.appendChild(tt);

                // 文件指示器：有关联文件时在节点右下角显示图标
                if(n.files && n.files.length > 0){
                    const fi=sE('text',{x:NW-12,y:NH-6,'font-size':'10','text-anchor':'middle',fill:'#3b82f6',opacity:'0.85'});
                    fi.textContent='\ud83d\udcc4'+n.files.length; g.appendChild(fi);
                }

                g.addEventListener('click', function(ev){ ev.stopPropagation(); onGraphSelect(n.id, gnodeMap, G_D_EDGES); });
                g.addEventListener('contextmenu', function(ev) {
                    ev.preventDefault();
                    ev.stopPropagation();
                    showGraphContextMenu(ev.clientX, ev.clientY, n.id, n.label, n.address);
                });
                layerNode.appendChild(g);
            });

            /* ---- 交互：选中 / 缩放 / 平移 ---- */
            const area = document.getElementById('graphSvgArea');

            area.onclick = function(ev){ if(ev.target===gsvg||ev.target===area) graphDeselect(); };
            gsvg.onclick = function(ev){ if(ev.target===gsvg) graphDeselect(); };

            // Zoom & Pan
            let gScale=1, gPanX=0, gPanY=0;
            let gIsPanning=false, gStartX=0, gStartY=0, gStartPX=0, gStartPY=0;
            const MIN_S=0.25, MAX_S=3;

            function applyGT(){ gsvg.style.transform='translate('+gPanX+'px,'+gPanY+'px) scale('+gScale+')'; }

            // 清理旧的 window 级事件处理器（防止切换图谱时泄漏）
            if (_graphWindowHandlers.mousemove) {
                window.removeEventListener('mousemove', _graphWindowHandlers.mousemove);
            }
            if (_graphWindowHandlers.mouseup) {
                window.removeEventListener('mouseup', _graphWindowHandlers.mouseup);
            }
            if (_graphWindowHandlers.wheelHandler) {
                area.removeEventListener('wheel', _graphWindowHandlers.wheelHandler);
            }

            _graphWindowHandlers.wheelHandler = function(ev){
                ev.preventDefault();
                const r=area.getBoundingClientRect(), mx=ev.clientX-r.left, my=ev.clientY-r.top;
                const old=gScale, delta=ev.deltaY>0?0.9:1.1;
                gScale=Math.min(MAX_S,Math.max(MIN_S,gScale*delta));
                gPanX=mx-(mx-gPanX)*(gScale/old);
                gPanY=my-(my-gPanY)*(gScale/old);
                applyGT();
            };
            area.addEventListener('wheel', _graphWindowHandlers.wheelHandler, {passive:false});

            area.onmousedown = function(ev){
                if(ev.button===1){ev.preventDefault();gIsPanning=true;gStartX=ev.clientX;gStartY=ev.clientY;gStartPX=gPanX;gStartPY=gPanY;area.classList.add('panning');}
            };
            _graphWindowHandlers.mousemove = function(ev){ if(!gIsPanning)return; gPanX=gStartPX+(ev.clientX-gStartX); gPanY=gStartPY+(ev.clientY-gStartY); applyGT(); };
            _graphWindowHandlers.mouseup = function(ev){ if(ev.button===1&&gIsPanning){gIsPanning=false;area.classList.remove('panning');} };
            window.addEventListener('mousemove', _graphWindowHandlers.mousemove);
            window.addEventListener('mouseup', _graphWindowHandlers.mouseup);

            // 自适应视图
            setTimeout(function(){
                const r=area.getBoundingClientRect();
                const fit=Math.min(r.width/GW, r.height/GH, 1)*0.92;
                gScale=fit;
                gPanX=(r.width-GW*gScale)/2;
                gPanY=Math.max(8,(r.height-GH*gScale)/2);
                applyGT();
            }, 100);

            /* ---- 全景文本 ---- */
            function genGFullText(){
                const layers={}, vis=new Set(), q=[{id:G_NODES[0].id,l:0}];
                while(q.length){const item=q.shift();if(vis.has(item.id))continue;vis.add(item.id);(layers[item.l]=layers[item.l]||[]).push(item.id);G_H_EDGES.filter(function(e){return e[0]===item.id;}).forEach(function(e){q.push({id:e[1],l:item.l+1});});}
                var t='\u3010\u4EFB\u52A1\u56FE\u8C31 \u00B7 \u5168\u666F\u89C6\u56FE\u3011\n\n';
                for(var l in layers){
                    t+='Layer '+l+':\n';
                    layers[l].forEach(function(id){var n=gnodeMap[id];var od=G_D_EDGES.filter(function(e){return e.s===id;}).map(function(e){return e.t;});var ind=G_D_EDGES.filter(function(e){return e.t===id;}).map(function(e){return e.s;});
                        t+='  ['+id+' '+SICO[n.status]+' '+SZH[n.status]+'] '+n.label;
                        if(od.length)t+=' \u2500\u2500\u2192 '+od.join(', ');if(ind.length)t+=' \u2190\u2500\u2500 '+ind.join(', ');t+='\n';
                    });t+='\n';
                }
                var tot=G_NODES.length, done=G_NODES.filter(function(n){return n.status==='completed';}).length;
                var ing=G_NODES.filter(function(n){return n.status==='in_progress';}).length;
                var blk=G_NODES.filter(function(n){return n.status==='blocked';}).length;
                var skp=G_NODES.filter(function(n){return n.status==='skipped';}).length;
                var adj=G_NODES.filter(function(n){return n.status==='needs_adjust';}).length;
                t+='\u8FDB\u5EA6: '+done+'/'+tot+' \u5B8C\u6210, '+ing+' \u8FDB\u884C\u4E2D';
                if(blk)t+=', '+blk+' \u963B\u585E';if(skp)t+=', '+skp+' \u5DF2\u8DF3\u8FC7';if(adj)t+=', '+adj+' \u9700\u8C03\u6574';t+='\n';
                return t;
            }
            document.getElementById('gp-fullText').textContent=genGFullText();

            /* ---- 进度条 ---- */
            var gTot=G_NODES.length, gDone=G_NODES.filter(function(n){return n.status==='completed'||n.status==='skipped';}).length;
            document.getElementById('gp-ptext').textContent=gDone+'/'+gTot+' 已完成';
            document.getElementById('gp-pfill').style.width=(gDone/gTot*100).toFixed(0)+'%';

            /* ---- 详情面板 Tab 切换 ---- */
            document.querySelectorAll('.gp-tab').forEach(function(btn){
                btn.onclick = function(){
                    document.querySelectorAll('.gp-tab').forEach(function(b){b.classList.remove('active');});
                    btn.classList.add('active');
                    document.querySelectorAll('.gp-tab-body').forEach(function(b){b.classList.add('hidden');});
                    document.getElementById(btn.getAttribute('data-gptab')).classList.remove('hidden');
                };
            });

            // 重置详情面板
            document.getElementById('gp-detail').innerHTML='<div class="gp-placeholder">点击图谱中的任意节点<br>查看详情和依赖关系</div>';
            document.getElementById('gp-llm').innerHTML='<div class="gp-placeholder">点击节点后<br>此处生成模型聚焦上下文</div>';
        }

        // 图谱选中/取消
        function graphDeselect(){
            document.querySelectorAll('.graph-panel .gnode').forEach(function(el){el.classList.remove('selected','dimmed');});
            document.querySelectorAll('.graph-panel .edge-hier').forEach(function(el){el.classList.remove('dimmed');});
            document.querySelectorAll('.graph-panel .dep-group').forEach(function(el){el.classList.remove('highlighted','dimmed');});
            document.getElementById('gp-detail').innerHTML='<div class="gp-placeholder">点击图谱中的任意节点<br>查看详情和依赖关系</div>';
            document.getElementById('gp-llm').innerHTML='<div class="gp-placeholder">点击节点后<br>此处生成模型聚焦上下文</div>';
        }

        function onGraphSelect(id, gnodeMap, G_D_EDGES){
            var inD=G_D_EDGES.filter(function(e){return e.t===id;}), outD=G_D_EDGES.filter(function(e){return e.s===id;});
            var conn=new Set([id]); inD.forEach(function(e){conn.add(e.s);}); outD.forEach(function(e){conn.add(e.t);});
            document.querySelectorAll('.graph-panel .gnode').forEach(function(el){
                var nid=el.getAttribute('data-id');
                el.classList.toggle('selected',nid===id);
                el.classList.toggle('dimmed',!conn.has(nid));
            });
            document.querySelectorAll('.graph-panel .edge-hier').forEach(function(el){
                var s=el.getAttribute('data-s'),t=el.getAttribute('data-t');
                el.classList.toggle('dimmed',!conn.has(s)&&!conn.has(t));
            });
            document.querySelectorAll('.graph-panel .dep-group').forEach(function(el){
                var s=el.getAttribute('data-s'),t=el.getAttribute('data-t');
                var hit=s===id||t===id;
                el.classList.toggle('highlighted',hit);
                el.classList.toggle('dimmed',!hit);
            });
            renderGraphDetailView(id, gnodeMap, G_D_EDGES);
            renderGraphLLMView(id, gnodeMap, G_D_EDGES);
        }

        function renderGraphDetailView(id, gnodeMap, G_D_EDGES){
            var n=gnodeMap[id]; if(!n)return;
            var inD=G_D_EDGES.filter(function(e){return e.t===id;}), outD=G_D_EDGES.filter(function(e){return e.s===id;});
            var h='<h3>'+SICO[n.status]+' '+n.label+'</h3>';
            h+='<div class="gp-field"><div class="gp-field-label">状态</div><div class="gp-field-value">'+SZH[n.status]+'</div></div>';
            h+='<div class="gp-field"><div class="gp-field-label">描述</div><div class="gp-field-value">'+gEsc(n.desc||'').replace(/\n/g,'<br>')+'</div></div>';
            if(n.result) h+='<div class="gp-field"><div class="gp-field-label">执行结果</div><div class="gp-field-value">'+gEsc(n.result)+'</div></div>';
            
            // 节点完整地址（直接使用后端计算的层级地址）
            var nodeAddress = n.address || id;
            h+='<div class="gp-field"><div class="gp-field-label">节点地址</div><div class="gp-field-value" style="font-family:monospace;font-size:11px;color:#8b5cf6;background:#8b5cf60a;padding:4px 8px;border-radius:4px;word-break:break-all;">'+gEsc(nodeAddress)+'</div></div>';
            
            // 🔥 关联文件区域（始终显示）
            var fileCount = (n.files && n.files.length) ? n.files.length : 0;
            h+='<div class="gp-field"><div class="gp-field-label">关联文件' + (fileCount > 0 ? ' (' + fileCount + '个)' : '') + '</div>';
            if(fileCount > 0){
                n.files.forEach(function(f){
                    h+='<div class="gp-dep-card" style="cursor:pointer;" onclick="openFileInIDE(\''+gEsc(f.path)+'\')">';
                    h+='<div class="dep-id" style="color:#3b82f6;">\ud83d\udcc4 '+gEsc(f.name)+'</div>';
                    h+='<div class="dep-via" style="font-size:9.5px;color:#64748b;">'+gEsc(f.path)+'</div>';
                    h+='</div>';
                });
            } else {
                h+='<div class="gp-field-value" style="color:#64748b;font-style:italic;">暂无关联文件</div>';
            }
            h+='</div>';
            
            if(inD.length){
                h+='<div class="gp-field"><div class="gp-field-label">入边依赖 ('+inD.length+'条)</div>';
                inD.forEach(function(e){var s=gnodeMap[e.s];
                    h+='<div class="gp-dep-card"><div class="dep-id in">\u2190\u2500\u2500 '+SICO[s.status]+' '+s.label+'</div><div class="dep-via">传递: '+gEsc(e.via)+'</div>';
                    if(s.result)h+='<div class="dep-result">'+gEsc(s.result)+'</div>';
                    h+='</div>';
                }); h+='</div>';
            }
            if(outD.length){
                h+='<div class="gp-field"><div class="gp-field-label">出边影响 ('+outD.length+'条)</div>';
                outD.forEach(function(e){var tg=gnodeMap[e.t];
                    h+='<div class="gp-dep-card"><div class="dep-id out">\u2500\u2500\u2192 '+SICO[tg.status]+' '+tg.label+'</div><div class="dep-via">传递: '+gEsc(e.via)+'</div></div>';
                }); h+='</div>';
            }
            // 双向导航：跳转到记忆图谱
            h+='<div class="gp-field" style="margin-top:12px;padding-top:10px;border-top:1px solid #e2e8f0">';
            h+='<button onclick="navigateToMemoryGraphNode(\'task:'+gEsc(id)+'\')" style="padding:6px 14px;font-size:11px;font-weight:600;border-radius:6px;border:1px solid #8b5cf6;background:#8b5cf622;color:#8b5cf6;cursor:pointer;transition:all .2s"';
            h+=' onmouseover="this.style.background=\'#8b5cf644\'" onmouseout="this.style.background=\'#8b5cf622\'">';
            h+='\u{1F9E0} 在记忆图谱中查看</button>';
            h+='</div>';
            document.getElementById('gp-detail').innerHTML=h;
        }

        function renderGraphLLMView(id, gnodeMap, G_D_EDGES){
            var n=gnodeMap[id]; if(!n)return;
            var inD=G_D_EDGES.filter(function(e){return e.t===id;}), outD=G_D_EDGES.filter(function(e){return e.s===id;});
            var t='\u3010\u805A\u7126\u6267\u884C\uFF1A'+n.id+' '+n.label+'\u3011\n\n';
            if(inD.length){
                t+='\u25C6 \u5165\u8FB9\u4F9D\u8D56 ('+inD.length+'\u6761)\uFF1A\n';
                inD.forEach(function(e){var s=gnodeMap[e.s];
                    t+='  \u2190\u2500\u2500 ['+s.id+' '+SICO[s.status]+'] '+s.label+'\n       \u4F20\u9012\uFF1A'+e.via+'\n';
                    if(s.result)t+='       \u7ED3\u679C\uFF1A'+s.result+'\n';t+='\n';
                });
            } else { t+='\u25C6 \u5165\u8FB9\u4F9D\u8D56\uFF1A\u65E0\uFF08\u8D77\u70B9\u4EFB\u52A1\uFF09\n\n'; }
            if(outD.length){
                t+='\u25C6 \u51FA\u8FB9\u5F71\u54CD ('+outD.length+'\u6761)\uFF1A\n';
                outD.forEach(function(e){var tg=gnodeMap[e.t];
                    t+='  \u2500\u2500\u2192 ['+tg.id+' '+SICO[tg.status]+'] '+tg.label+'\uFF08'+(tg.status==='pending'?'\u7B49\u5F85\u672C\u4EFB\u52A1':SZH[tg.status])+'\uFF09\n';
                });t+='\n';
            }

        // ===================================================================
        // 记忆图谱 (Memory Graph) - SVG + d3-force + 分层折叠展开

        let mgSimulation = null;
        let mgInitialized = false;
        var mgPendingFullData = null;

        // 核心状态（分层折叠展开）
        let mgState = {
            nodes: new Map(),        // id -> node data (含 x/y)
            edges: [],               // [{source, target, type, weight, protected}]
            expandedSet: new Set(),  // 已展开的节点 ID

        };

        const MG_COLORS = {
            dialogue: '#8b5cf6', task: '#3b82f6', knowledge: '#22c55e',
            experience: '#f59e0b', episode: '#06b6d4', file: '#64748b',
            concept: '#ec4899', person: '#ef4444', document: '#94a3b8',
            group: '#a78bfa'
        };

        const MG_RADIUS = {
            dialogue: 8, task: 7, knowledge: 5, experience: 5,
            episode: 6, file: 4, concept: 5, person: 7, document: 5,
            group: 14
        };

        const MG_EDGE_STYLES = {
            hierarchy:   { stroke: '#475569', dasharray: 'none', width: 2 },
            dependency:  { stroke: '#ef4444', dasharray: '6 3', width: 1.5 },
            reference:   { stroke: '#3b82f6', dasharray: '3 3', width: 1 },
            temporal:    { stroke: '#8b5cf6', dasharray: 'none', width: 1.5 },
            semantic:    { stroke: '#06b6d4', dasharray: '4 2', width: 1 },
            causal:      { stroke: '#f59e0b', dasharray: 'none', width: 1.5 },
            association: { stroke: '#a78bfa', dasharray: '2 4', width: 1 },
        };

        function initMemoryGraph() {
            const svgEl = document.getElementById('memoryGraphSvg');
            if (!svgEl) return;
            const svg = d3.select(svgEl);
            const rect = svgEl.parentElement.getBoundingClientRect();
            const width = rect.width || 600;
            const height = rect.height || 400;

            svg.selectAll('*').remove();

            // defs - arrowhead marker
            const defs = svg.append('defs');
            defs.append('marker')
                .attr('id', 'mg-arrow')
                .attr('viewBox', '0 -3 6 6')
                .attr('refX', 14).attr('refY', 0)
                .attr('markerWidth', 6).attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path').attr('d', 'M0,-3L6,0L0,3').attr('fill', '#475569');

            const g = svg.append('g').attr('id', 'mgRoot');

            // zoom + pan
            svg.call(d3.zoom()
                .scaleExtent([0.2, 5])
                .on('zoom', (e) => g.attr('transform', e.transform)));

            // 力导向模拟
            mgSimulation = d3.forceSimulation()
                .force('link', d3.forceLink().id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-150))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => (MG_RADIUS[d.type] || 5) + 6))
                .on('tick', mgTick);

            mgInitialized = true;
            console.log('[MemoryGraph] SVG + d3-force 初始化完成（分层折叠模式）');
        }

        // ---- SVG 渲染 ----

        function renderMemoryGraph() {
            if (!mgInitialized) initMemoryGraph();
            if (!mgSimulation) return;

            var nodes = Array.from(mgState.nodes.values());
            var edges = mgState.edges.map(function(e) {
                return {
                    source: typeof e.source === 'object' ? e.source.id : e.source,
                    target: typeof e.target === 'object' ? e.target.id : e.target,
                    type: e.type, weight: e.weight, protected: e.protected
                };
            });

            const g = d3.select('#mgRoot');

            // --- 边 ---
            const linkSel = g.selectAll('.mg-link').data(edges, d => d.source + '-' + d.target + '-' + d.type);
            linkSel.exit().remove();
            const linkEnter = linkSel.enter().append('line').attr('class', 'mg-link');
            const linkMerge = linkEnter.merge(linkSel);
            linkMerge
                .attr('stroke', d => (MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES.reference).stroke)
                .attr('stroke-width', d => (MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES.reference).width)
                .attr('stroke-dasharray', d => (MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES.reference).dasharray)
                .attr('stroke-opacity', d => 0.3 + (d.weight || 0.5) * 0.5)
                .attr('marker-end', 'url(#mg-arrow)');

            // --- 节点 ---
            const nodeSel = g.selectAll('.mg-node').data(nodes, d => d.id);
            nodeSel.exit().remove();
            const nodeEnter = nodeSel.enter().append('g').attr('class', 'mg-node');
            nodeEnter.append('circle');
            nodeEnter.append('text').attr('class', 'mg-node-label');
            // children_count badge 元素
            var badgeG = nodeEnter.append('g').attr('class', 'mg-badge');
            badgeG.append('circle').attr('class', 'mg-badge-circle');
            badgeG.append('text').attr('class', 'mg-badge-text');

            // 拖拽
            nodeEnter.call(d3.drag()
                .on('start', mgDragStarted)
                .on('drag', mgDragged)
                .on('end', mgDragEnded));

            // 单击节点 → 显示详情
            nodeEnter.on('click', function(event, d) {
                event.stopPropagation();
                mgState.selectedNodeId = d.id;
                showMgNodeDetail(d);
                g.selectAll('.mg-node circle').filter('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
                d3.select(this).select('.mg-main-circle').attr('stroke', '#f59e0b').attr('stroke-width', 3);
            });

            // 双击节点 → 展开/折叠
            nodeEnter.on('dblclick', function(event, d) {
                event.stopPropagation();
                event.preventDefault();
                if (mgState.expandedSet.has(d.id)) {
                    mgCollapseNode(d.id);
                } else if ((d.children_count || 0) > 0) {
                    mgExpandNode(d.id);
                }
            });

            const nodeMerge = nodeEnter.merge(nodeSel);

            // 给主圆标记 class 便于选择
            nodeMerge.select('circle:first-child')
                .attr('class', 'mg-main-circle')
                .attr('r', d => MG_RADIUS[d.type] || 5)
                .attr('fill', d => MG_COLORS[d.type] || '#64748b')
                .attr('stroke', d => d.type === 'group' ? '#c4b5fd' : '#1e293b')
                .attr('stroke-width', d => d.type === 'group' ? 2.5 : 1.5)
                .attr('stroke-dasharray', d => d.type === 'group' ? '4 2' : 'none')
                .attr('opacity', d => d.type === 'group' ? 0.85 : 0.6 + (d.activation || 0) * 0.4);

            nodeMerge.select('.mg-node-label')
                .attr('dy', d => -(MG_RADIUS[d.type] || 5) - 4)
                .attr('text-anchor', 'middle')
                .text(d => (d.label || '').substring(0, 14));

            // children_count badge（未展开 + 有子节点）
            nodeMerge.select('.mg-badge').each(function(d) {
                var cc = d.children_count || 0;
                var show = cc > 0 && !mgState.expandedSet.has(d.id);
                var badgeG = d3.select(this);
                badgeG.attr('display', show ? null : 'none');
                if (show) {
                    var r = MG_RADIUS[d.type] || 5;
                    var badgeText = cc > 99 ? '99+' : String(cc);
                    var badgeR = badgeText.length > 2 ? 9 : (badgeText.length > 1 ? 7 : 6);
                    badgeG.select('.mg-badge-circle')
                        .attr('cx', r * 0.7).attr('cy', -r * 0.7)
                        .attr('r', badgeR)
                        .attr('fill', '#ef4444');
                    badgeG.select('.mg-badge-text')
                        .attr('x', r * 0.7).attr('y', -r * 0.7)
                        .attr('text-anchor', 'middle')
                        .attr('dominant-baseline', 'central')
                        .attr('fill', '#fff')
                        .attr('font-size', '8px')
                        .attr('font-weight', 'bold')
                        .text(badgeText);
                }
            });

            // 活跃节点高亮（脉冲动画 CSS class）
            nodeMerge
                .classed('mg-active', function(d) { return mgState.activeNodeIds.has(d.id); })
                .classed('mg-active-dialogue', function(d) { return mgState.activeNodeIds.has(d.id) && d.type === 'dialogue'; })
                .classed('mg-active-task', function(d) { return mgState.activeNodeIds.has(d.id) && d.type === 'task'; });

            // 选中高亮
            if (mgState.selectedNodeId) {
                nodeMerge.select('.mg-main-circle').each(function(d) {
                    if (d.id === mgState.selectedNodeId) {
                        d3.select(this).attr('stroke', '#f59e0b').attr('stroke-width', 3);
                    }
                });
            }

            // 更新模拟
            mgSimulation.nodes(nodes);
            mgSimulation.force('link').links(edges);
            mgSimulation.alpha(0.6).restart();

            // 更新统计
            var statsEl = document.getElementById('mgStats');
            if (statsEl) {
                statsEl.textContent = mgState.nodes.size + ' 节点 | ' + mgState.edges.length + ' 边';
            }
        }

            const g = d3.select('#mgRoot');
            g.selectAll('.mg-link')
                .attr('x1', d => d.source.x || 0)

        function mgDragStarted(event, d) {
            if (!event.active) mgSimulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        }
        function mgDragged(event, d) {

        // ---- simulation 更新（折叠展开后刷新 SVG）----

        function mgUpdateSimulation(alpha) {
            if (!mgSimulation) return;
            renderMemoryGraph();
        }

        // ---- 展开/折叠 ----

        function mgExpandNode(nodeId) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'EXPAND_NODE', node_id: nodeId }));
            }
        }

        function handleMemoryGraphExpandResult(data) {
            if (!data || !data.parent_id) return;
            var parentNode = mgState.nodes.get(data.parent_id);
            if (!parentNode) return;

            var isVirtualGroup = data.parent_id.indexOf('__group:') === 0;
            mgState.expandedSet.add(data.parent_id);

            // 插入子节点（初始位置在父节点附近）
            var newNodes = data.nodes || [];
            for (var i = 0; i < newNodes.length; i++) {
                var nd = newNodes[i];
                if (!mgState.nodes.has(nd.id)) {
                    nd.x = parentNode.x + (Math.random() - 0.5) * 60;
                    nd.y = parentNode.y + (Math.random() - 0.5) * 60;
                    nd.vx = 0;
                    nd.vy = 0;
                    mgState.nodes.set(nd.id, nd);
                }
            }

            // 插入边（去重）
            var newEdges = data.edges || [];
            // 对虚拟分组节点，添加合成 hierarchy 边（group → child），
            // 保证折叠/全量更新时能正确识别后代关系
            if (isVirtualGroup) {
                for (var k = 0; k < newNodes.length; k++) {
                    newEdges.push({
                        source: data.parent_id,
                        target: newNodes[k].id,
                        type: 'hierarchy',
                        weight: 1,
                        protected: false
                    });
                }
            }
            var existingEdgeKeys = new Set();
            for (var j = 0; j < mgState.edges.length; j++) {
                var ex = mgState.edges[j];
                var ek = (typeof ex.source === 'object' ? ex.source.id : ex.source) + '-' +
                         (typeof ex.target === 'object' ? ex.target.id : ex.target) + '-' + ex.type;
                existingEdgeKeys.add(ek);
            }
            for (var j = 0; j < newEdges.length; j++) {
                var ne = newEdges[j];
                var nk = ne.source + '-' + ne.target + '-' + ne.type;
                if (!existingEdgeKeys.has(nk)) {
                    mgState.edges.push(ne);
                }
            }

            mgUpdateSimulation(0.5);
        }

        function mgCollapseNode(nodeId) {
            // 递归查找所有后代
            var descendants = new Set();
            var queue = [nodeId];
            while (queue.length > 0) {
                var current = queue.shift();
                for (var i = 0; i < mgState.edges.length; i++) {
                    var e = mgState.edges[i];
                    if (e.type !== 'hierarchy') continue;
                    var sid = typeof e.source === 'object' ? e.source.id : e.source;
                    var tid = typeof e.target === 'object' ? e.target.id : e.target;
                    if (sid === current && !descendants.has(tid)) {
                        descendants.add(tid);
                        queue.push(tid);
                    }
                }
            }

            descendants.forEach(function(did) {
                mgState.nodes.delete(did);
                mgState.expandedSet.delete(did);
            });

            mgState.edges = mgState.edges.filter(function(e) {
                var sid = typeof e.source === 'object' ? e.source.id : e.source;
                var tid = typeof e.target === 'object' ? e.target.id : e.target;
                return !descendants.has(sid) && !descendants.has(tid);
            });

            mgState.expandedSet.delete(nodeId);

            if (descendants.has(mgState.selectedNodeId)) {
                mgState.selectedNodeId = nodeId;
            }

            mgUpdateSimulation(0.3);
        }

        // ---- 数据加载 ----

        function mgLoadFullData(data) {
            mgState.nodes.clear();
            mgState.edges = [];
            mgState.expandedSet.clear();

            var nodes = data.nodes || [];
            for (var i = 0; i < nodes.length; i++) {
                mgState.nodes.set(nodes[i].id, nodes[i]);
            }

            mgState.edges = (data.edges || []).map(function(e) {
                return {
                    source: typeof e.source === 'object' ? e.source.id : e.source,
                    target: typeof e.target === 'object' ? e.target.id : e.target,
                    type: e.type, weight: e.weight, protected: e.protected
                };
            });

            if (data.active_node_ids) {
                mgState.activeNodeIds = new Set(data.active_node_ids);
            }

            renderMemoryGraph();
        }

        function handleMemoryGraphUpdate(data) {
            if (!data) return;

            if (data.active_node_ids) {
                mgState.activeNodeIds = new Set(data.active_node_ids);
            }

            if (data.update_type === 'full' || !mgInitialized) {
                if (currentGraphTab === 'memory') {
                    if (!mgInitialized) initMemoryGraph();
                    if (mgState.nodes.size === 0) {
                        mgLoadFullData(data);
                    } else {
                        mgMergeFullUpdate(data);
                    }
                } else {
                    mgPendingFullData = data;
                }
            } else if (data.type === 'delta' && data.changes) {
                mgApplyDelta(data.changes);
            }

            // 更新思维可视化浮动窗口
            if (data.thought_view) {
                updateThoughtView(data.thought_view);
            }
        }

        function mgMergeFullUpdate(data) {
            var newNodes = data.nodes || [];
            var newNodeMap = {};
            for (var i = 0; i < newNodes.length; i++) {
                newNodeMap[newNodes[i].id] = newNodes[i];
            }

            mgState.nodes.forEach(function(existing, id) {
                if (newNodeMap[id]) {
                    existing.label = newNodeMap[id].label;
                    existing.activation = newNodeMap[id].activation;
                    existing.metadata = newNodeMap[id].metadata;
                    existing.children_count = newNodeMap[id].children_count || 0;
                }
            });

            var hasParent = new Set();
            var allEdges = data.edges || [];
            for (var j = 0; j < allEdges.length; j++) {
                if (allEdges[j].type === 'hierarchy') {
                    hasParent.add(typeof allEdges[j].target === 'object' ? allEdges[j].target.id : allEdges[j].target);
                }
            }

            for (var i = 0; i < newNodes.length; i++) {
                var nd = newNodes[i];
                if (!mgState.nodes.has(nd.id) && !hasParent.has(nd.id)) {
                    mgState.nodes.set(nd.id, nd);
                }
            }

            var toRemove = [];
            mgState.nodes.forEach(function(existing, id) {
                if (!newNodeMap[id] && !mgState.expandedSet.has(id)) {
                    var isDescendant = false;
                    mgState.edges.forEach(function(e) {
                        if (e.type === 'hierarchy') {
                            var tid = typeof e.target === 'object' ? e.target.id : e.target;
                            if (tid === id) isDescendant = true;
                        }
                    });
                    if (!isDescendant) toRemove.push(id);
                }
            });
            for (var r = 0; r < toRemove.length; r++) {
                mgState.nodes.delete(toRemove[r]);
            }

            renderMemoryGraph();
        }

        function mgApplyDelta(changes) {
            // 先收集本批次新增的 hierarchy 边，判断哪些新节点的父节点已展开
            var newHierarchyEdges = {};
            for (var p = 0; p < changes.length; p++) {
                var ce = changes[p];
                if (ce.action === 'add_edge' && ce.data && ce.data.type === 'hierarchy') {
                    newHierarchyEdges[ce.data.target] = ce.data.source;
                }
            }

            for (var i = 0; i < changes.length; i++) {
                var ch = changes[i];
                if (ch.action === 'add_node') {
                    var nodeData = ch.data;
                    if (nodeData && nodeData.id && !mgState.nodes.has(nodeData.id)) {
                        // 只添加可见节点：父节点已展开，或无层级父边的新根节点
                        var hierParent = newHierarchyEdges[nodeData.id];
                        if (hierParent) {
                            // 有层级父节点 — 仅当父节点已展开时添加
                            if (mgState.expandedSet.has(hierParent)) {
                                mgState.nodes.set(nodeData.id, nodeData);
                            }
                        }
                        // 无层级父边的新节点不直接添加（属于虚拟分组，下次全量更新时体现）
                    }
                } else if (ch.action === 'update_node') {
                    var nd = mgState.nodes.get(ch.data && ch.data.id);
                    if (nd && ch.data) {
                        if (ch.data.label !== undefined) nd.label = ch.data.label;
                        if (ch.data.activation !== undefined) nd.activation = ch.data.activation;
                        if (ch.data.metadata !== undefined) nd.metadata = ch.data.metadata;
                    }
                } else if (ch.action === 'remove_node') {
                    if (ch.data && ch.data.id) {
                        mgState.nodes.delete(ch.data.id);
                        mgState.expandedSet.delete(ch.data.id);
                    }
                } else if (ch.action === 'add_edge') {
                    if (ch.data) {
                        mgState.edges.push(ch.data);
                        if (ch.data.type === 'hierarchy') {
                            var parent = mgState.nodes.get(ch.data.source);
                            if (parent) parent.children_count = (parent.children_count || 0) + 1;
                        }
                    }
                } else if (ch.action === 'remove_edge') {
                    if (ch.data) {
                        mgState.edges = mgState.edges.filter(function(e) {
                            var sid = typeof e.source === 'object' ? e.source.id : e.source;
                            var tid = typeof e.target === 'object' ? e.target.id : e.target;
                            return !(sid === ch.data.source && tid === ch.data.target);
                        });
                        if (ch.data.type === 'hierarchy') {
                            var parent = mgState.nodes.get(ch.data.source);
                            if (parent && parent.children_count > 0) parent.children_count--;
                        }
                    }
                }
            }
            renderMemoryGraph();
        }

        function closeMgDetail() {
            const panel = document.getElementById('mgDetailPanel');
            if (panel) panel.classList.add('collapsed');
            mgSelectedNodeId = null;
            mgState.selectedNodeId = null;
            // 取消高亮
            const g = d3.select('#mgRoot');
            if (g) g.selectAll('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
        }

        function findMgNeighbors(nodeId) {
            var edges = mgState.edges;
            var result = [];
            for (var i = 0; i < edges.length; i++) {
                var e = edges[i];
                var sid = typeof e.source === 'object' ? e.source.id : e.source;
                var tid = typeof e.target === 'object' ? e.target.id : e.target;
                if (sid === nodeId) {
                    var nd = mgState.nodes.get(tid);
                    if (nd) result.push(Object.assign({}, nd, { edgeType: e.type || 'ref' }));
                } else if (tid === nodeId) {
                    var nd = mgState.nodes.get(sid);
                    if (nd) result.push(Object.assign({}, nd, { edgeType: e.type || 'ref' }));
                }
            }
            return result;
        }

        function navigateToMgNode(nodeId) {
            var target = mgState.nodes.get(nodeId);
            if (target) {
                mgState.selectedNodeId = nodeId;
                showMgNodeDetail(target);
                // 高亮目标节点
                var g = d3.select('#mgRoot');
                g.selectAll('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
                g.selectAll('.mg-node').each(function(d) {
                    if (d.id === nodeId) {
                        d3.select(this).select('.mg-main-circle').attr('stroke', '#f59e0b').attr('stroke-width', 3);
                    }
                });
            }
        }

        // ===== 思维可视化浮动窗口 (Thought View) =====

        let tvSimulation = null;
        let tvInitialized = false;
        let tvMinimized = false;
        let tvVisible = true;
        let tvState = { nodes: new Map(), edges: [], centerIds: new Set() };
        let tvUpdateTimer = null;

        function initThoughtView() {
            if (tvInitialized) return;
            tvInitialized = true;

            var svgEl = document.getElementById('thoughtViewSvg');
            if (!svgEl) return;
            var svg = d3.select(svgEl);
            svg.selectAll('*').remove();

            // defs - arrowhead
            var defs = svg.append('defs');
            defs.append('marker')
                .attr('id', 'tv-arrow')
                .attr('viewBox', '0 -3 6 6')
                .attr('refX', 12).attr('refY', 0)
                .attr('markerWidth', 5).attr('markerHeight', 5)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M0,-3L6,0L0,3')
                .attr('fill', '#475569');

            var g = svg.append('g').attr('id', 'tvRoot');

            var body = document.getElementById('tvBody');
            var rect = body.getBoundingClientRect();
            var w = rect.width || 300;
            var h = rect.height || 220;

            tvSimulation = d3.forceSimulation()
                .force('charge', d3.forceManyBody().strength(-60))
                .force('center', d3.forceCenter(w / 2, h / 2))
                .force('collision', d3.forceCollide().radius(function(d) {
                    return d.is_center ? 8 + (d.activation || 0) * 10 : 6;
                }))
                .force('link', d3.forceLink().id(function(d) { return d.id; }).distance(50))
                .on('tick', tvTick)
                .stop();

            setupTvDrag();
            setupTvResize();
        }

        function updateThoughtView(data) {
            if (!data) return;
            // 节流 150ms
            if (tvUpdateTimer) clearTimeout(tvUpdateTimer);
            tvUpdateTimer = setTimeout(function() {
                _doUpdateThoughtView(data);
            }, 150);
        }

        function _doUpdateThoughtView(data) {
            if (!tvInitialized) initThoughtView();

            var nodes = data.nodes || [];
            var edges = data.edges || [];
            var centerIds = new Set(data.center_ids || []);

            // 更新状态
            tvState.nodes.clear();
            nodes.forEach(function(n) {
                n.is_center = centerIds.has(n.id);
                tvState.nodes.set(n.id, n);
            });
            tvState.edges = edges;
            tvState.centerIds = centerIds;

            // 更新节点计数
            var countEl = document.getElementById('tvNodeCount');
            if (countEl) countEl.textContent = '(' + nodes.length + ')';

            // 空态处理
            var hint = document.getElementById('tvEmptyHint');
            var svgEl = document.getElementById('thoughtViewSvg');
            if (nodes.length === 0) {
                if (hint) hint.style.display = 'flex';
                if (svgEl) svgEl.style.display = 'none';
                return;
            } else {
                if (hint) hint.style.display = 'none';
                if (svgEl) svgEl.style.display = '';
            }

            renderThoughtView();
        }

        function renderThoughtView() {
            var g = d3.select('#tvRoot');
            if (g.empty()) return;

            var nodes = Array.from(tvState.nodes.values());
            var edges = tvState.edges.map(function(e) {
                return {
                    source: e.source,
                    target: e.target,
                    type: e.type,
                    weight: e.weight || 0.5,
                };
            });

            // 边
            var linkSel = g.selectAll('.tv-link').data(edges, function(d) {
                var s = typeof d.source === 'object' ? d.source.id : d.source;
                var t = typeof d.target === 'object' ? d.target.id : d.target;
                return s + '->' + t;
            });
            linkSel.exit().remove();
            var linkEnter = linkSel.enter().append('line')
                .attr('class', 'tv-link')
                .attr('marker-end', 'url(#tv-arrow)');
            var linkMerge = linkEnter.merge(linkSel);
            linkMerge.each(function(d) {
                var style = MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES['reference'] || { stroke: '#475569', width: 1 };
                d3.select(this)
                    .attr('stroke', style.stroke)
                    .attr('stroke-width', Math.max(style.width * 0.7, 0.5));
            });

            // 节点
            var nodeSel = g.selectAll('.tv-node').data(nodes, function(d) { return d.id; });
            nodeSel.exit().remove();
            var nodeEnter = nodeSel.enter().append('g')
                .attr('class', function(d) { return 'tv-node' + (d.is_center ? ' tv-node-center' : ''); });

            nodeEnter.append('circle');
            nodeEnter.append('text').attr('class', 'tv-node-label');
            // tooltip on hover for neighbor nodes
            nodeEnter.append('title');

            var nodeMerge = nodeEnter.merge(nodeSel);

            nodeMerge.attr('class', function(d) { return 'tv-node' + (d.is_center ? ' tv-node-center' : ''); });

            nodeMerge.select('circle')
                .attr('r', function(d) {
                    return d.is_center ? 6 + (d.activation || 0) * 10 : 4;
                })
                .attr('fill', function(d) {
                    var color = MG_COLORS[d.type] || '#94a3b8';
                    return color;
                })
                .attr('opacity', function(d) { return d.is_center ? 1 : 0.5; })
                .attr('stroke', function(d) {
                    if (!d.is_center) return 'none';
                    return MG_COLORS[d.type] || '#f59e0b';
                })
                .attr('stroke-width', function(d) { return d.is_center ? 2 : 0; })
                .style('filter', function(d) {
                    if (!d.is_center) return 'none';
                    var intensity = Math.round((d.activation || 0) * 12);
                    var color = MG_COLORS[d.type] || '#f59e0b';
                    return 'drop-shadow(0 0 ' + intensity + 'px ' + color + ')';
                });

            // 标签：活跃节点始终显示，邻居节点隐藏
            nodeMerge.select('text.tv-node-label')
                .attr('dy', function(d) {
                    var r = d.is_center ? 6 + (d.activation || 0) * 10 : 4;
                    return -(r + 3);
                })
                .attr('text-anchor', 'middle')
                .attr('display', function(d) { return d.is_center ? null : 'none'; })
                .text(function(d) { return (d.label || '').substring(0, 8); });

            // tooltip
            nodeMerge.select('title')
                .text(function(d) {
                    var act = d.activation ? ' (act: ' + d.activation.toFixed(2) + ')' : '';
                    return (d.label || d.id) + act;
                });

            // 更新 simulation
            tvSimulation.nodes(nodes);
            tvSimulation.force('link').links(edges);
            tvSimulation.alpha(0.6).restart();
        }

        function tvTick() {
            var g = d3.select('#tvRoot');
            g.selectAll('.tv-link')
                .attr('x1', function(d) { return d.source.x || 0; })
                .attr('y1', function(d) { return d.source.y || 0; })
                .attr('x2', function(d) { return d.target.x || 0; })
                .attr('y2', function(d) { return d.target.y || 0; });
            g.selectAll('.tv-node')
                .attr('transform', function(d) { return 'translate(' + (d.x || 0) + ',' + (d.y || 0) + ')'; });
        }

        // 拖拽移动
        function setupTvDrag() {
            var header = document.getElementById('tvHeader');
            var win = document.getElementById('thoughtViewWindow');
            if (!header || !win) return;

            var startX, startY, startLeft, startTop;

            header.addEventListener('mousedown', function(e) {
                if (e.target.closest('.tv-btn')) return;
                e.preventDefault();
                var rect = win.getBoundingClientRect();
                startX = e.clientX;
                startY = e.clientY;
                startLeft = rect.left;
                startTop = rect.top;

                function onMove(ev) {
                    var dx = ev.clientX - startX;
                    var dy = ev.clientY - startY;
                    var newLeft = Math.max(0, Math.min(window.innerWidth - 40, startLeft + dx));
                    var newTop = Math.max(0, Math.min(window.innerHeight - 40, startTop + dy));
                    win.style.left = newLeft + 'px';
                    win.style.top = newTop + 'px';
                    win.style.right = 'auto';
                    win.style.bottom = 'auto';
                }
                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        // Resize
        function setupTvResize() {
            var handle = document.getElementById('tvResizeHandle');
            var win = document.getElementById('thoughtViewWindow');
            if (!handle || !win) return;

            handle.addEventListener('mousedown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var startX = e.clientX;
                var startY = e.clientY;
                var startW = win.offsetWidth;
                var startH = win.offsetHeight;

                function onMove(ev) {
                    var newW = Math.max(200, Math.min(600, startW + (ev.clientX - startX)));
                    var newH = Math.max(160, Math.min(500, startH + (ev.clientY - startY)));
                    win.style.width = newW + 'px';
                    win.style.height = newH + 'px';
                    // 更新 force center
                    if (tvSimulation) {
                        var body = document.getElementById('tvBody');
                        if (body) {
                            var rect = body.getBoundingClientRect();
                            tvSimulation.force('center', d3.forceCenter(rect.width / 2, rect.height / 2));
                            tvSimulation.alpha(0.3).restart();
                        }
                    }
                }
                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        function toggleTvMinimize() {
            var win = document.getElementById('thoughtViewWindow');
            if (!win) return;
            tvMinimized = !tvMinimized;
            win.classList.toggle('tv-minimized', tvMinimized);
            if (!tvMinimized && tvSimulation && tvState.nodes.size > 0) {
                tvSimulation.alpha(0.3).restart();
            }
        }

        function toggleTvVisible(show) {
            var win = document.getElementById('thoughtViewWindow');
            if (!win) return;
            if (typeof show === 'boolean') {
                tvVisible = show;
            } else {
                tvVisible = !tvVisible;
            }
            win.classList.toggle('tv-hidden', !tvVisible);
            if (tvVisible && tvSimulation && tvState.nodes.size > 0) {
                tvSimulation.alpha(0.3).restart();
            }
        }

        // 页面 resize 时检查浮动窗口位置
        window.addEventListener('resize', function() {
            var win = document.getElementById('thoughtViewWindow');
            if (!win || !tvVisible) return;
            var rect = win.getBoundingClientRect();
            if (rect.left > window.innerWidth - 40) {
                win.style.left = (window.innerWidth - 60) + 'px';
                win.style.right = 'auto';
            }
            if (rect.top > window.innerHeight - 40) {
                win.style.top = (window.innerHeight - 60) + 'px';
                win.style.bottom = 'auto';
            }
        });

        // ── 双向导航：记忆图谱 <-> 任务图谱 ──

        function navigateToTaskGraphNode(taskNodeId) {
            switchGraphTab('task');
            setTimeout(function() {
                var gnodeEl = document.querySelector('.gnode[data-id="' + taskNodeId + '"]');
                if (gnodeEl) {
                    gnodeEl.dispatchEvent(new Event('click', { bubbles: true }));
                    gnodeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                if (typeof onGraphSelect === 'function' && typeof gnodeMap !== 'undefined') {
                    try { onGraphSelect(taskNodeId, gnodeMap, G_D_EDGES); } catch(e) {}
                }
            }, 200);
        }

        function navigateToMemoryGraphNode(memNodeId) {
            switchGraphTab('memory');
            setTimeout(function() {
                var target = mgState.nodes.get(memNodeId);
                if (target && target.x !== undefined) {
                    mgState.selectedNodeId = memNodeId;
                    showMgNodeDetail(target);
                    // 平移 SVG 视图到目标节点位置
                    var svg = d3.select('#memoryGraphSvg');
                    var rect = svg.node().parentElement.getBoundingClientRect();
                    var cx = rect.width / 2;
                    var cy = rect.height / 2;
                    var transform = d3.zoomIdentity.translate(cx - target.x, cy - target.y);
                    svg.transition().duration(500).call(
                        d3.zoom().transform, transform
                    );
                    // 高亮节点
                    var g = d3.select('#mgRoot');
                    g.selectAll('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
                    g.selectAll('.mg-node').each(function(d) {
                        if (d.id === memNodeId) {
                            d3.select(this).select('.mg-main-circle').attr('stroke', '#f59e0b').attr('stroke-width', 3);
                        }
                    });
                }
            }, 200);
        }

        function escHtml(str) {
            return escapeHtml(str);
        }

    </script>
</body>
</html>
