<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祖龙对话</title>
    <!-- dagre布局算法核心库 -->
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <!-- Cytoscape.js 核心（使用3.26.0稳定版） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <!-- Cytoscape dagre布局扩展 -->
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <!-- 保留d3用于其他功能 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* === App Wrapper: 控制整体布局与分屏 === */
        .app-wrapper {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            display: flex;
            gap: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-wrapper.split-mode {
            width: 98%;
            max-width: 100%;
            height: 96vh;
            gap: 12px;
        }

        .chat-container {
            flex: 1;
            min-width: 0;
            height: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: flex 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-wrapper.split-mode .chat-container {
            flex: 0 0 30%;
            max-width: 30%;
            border-radius: 16px;
        }

        /* === 图谱 Tab 切换 === */
        .graph-tabs {
            display: flex;
            gap: 0;
            margin-right: auto;
        }
        .graph-tab-btn {
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            background: none;
            border: 1px solid #e2e8f0;
            border-bottom: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .graph-tab-btn:first-child { border-radius: 6px 0 0 0; }
        .graph-tab-btn:last-child { border-radius: 0 6px 0 0; }
        .graph-tab-btn.active {
            color: #1e293b;
            background: #fff;
            border-bottom: 2px solid #3b82f6;
        }
        .graph-tab-btn:hover:not(.active) { color: #3b82f6; background: #f1f5f9; }

        /* 视图容器 */
        .graph-view-task {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }
        .graph-view-task.hidden { display: none; }
        .graph-view-memory {
            display: none;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
            background: #0f172a;
        }
        .graph-view-memory.active { display: flex; }

        .mg-content-row {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 记忆图谱内部样式 */
        .mg-toolbar {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #334155;
            background: #1e293b;
            flex-shrink: 0;
        }
        .mg-stats {
            font-size: 11px;
            color: #94a3b8;
        }
        .mg-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .mg-body svg {
            width: 100%;
            height: 100%;
        }
        .mg-legend {
            padding: 6px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid #334155;
            background: #1e293b;
            flex-shrink: 0;
        }
        .mg-leg {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #94a3b8;
        }
        .mg-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .mg-node-label {
            font-size: 9px;
            fill: #94a3b8;
            pointer-events: none;
        }
        .mg-link {
            stroke-opacity: 0.5;
        }

        /* 记忆图谱节点详情面板 */
        .mg-detail-panel {
            width: 320px;
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
            transition: width 0.3s ease;
        }
        .mg-detail-panel.collapsed {
            width: 0;
            border-left: none;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }
        .mg-detail-header {
            padding: 10px 14px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .mg-detail-header h3 {
            font-size: 13px;
            font-weight: 700;
            color: #e2e8f0;
            margin: 0;
        }
        .mg-detail-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .mg-detail-close:hover { color: #e2e8f0; background: #334155; }
        .mg-detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
        }
        .mg-detail-placeholder {
            color: #64748b;
            font-size: 12px;
            text-align: center;
            padding: 40px 20px;
            line-height: 1.8;
        }
        .mg-detail-field {
            margin-bottom: 12px;
        }
        .mg-detail-field-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .mg-detail-field-value {
            font-size: 12px;
            color: #cbd5e1;
            line-height: 1.6;
            word-break: break-all;
        }
        .mg-detail-content-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            font-size: 12px;
            color: #e2e8f0;
            line-height: 1.7;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .mg-detail-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }
        .mg-detail-neighbors {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .mg-detail-neighbors li {
            padding: 6px 8px;
            border-bottom: 1px solid #1e293b;
            font-size: 11px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .mg-detail-neighbors li:hover {
            background: #334155;
            color: #e2e8f0;
        }
        .mg-neighbor-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        /* 记忆图谱 - 文件卡片 */
        .mg-detail-file-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color .2s;
        }
        .mg-detail-file-card:hover {
            border-color: #3b82f6;
            background: #1e293b;
        }
        .mg-detail-file-name {
            font-size: 12px;
            color: #3b82f6;
            font-weight: 600;
        }
        .mg-detail-file-path {
            font-size: 10px;
            color: #64748b;
            word-break: break-all;
            margin-top: 2px;
        }
        .mg-detail-img-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            border: 1px solid #334155;
            margin-top: 8px;
            overflow: hidden;
        }
        .mg-detail-img-preview img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            display: block;
        }
        .mg-detail-file-btn {
            padding: 4px 10px;
            font-size: 10px;
            border-radius: 4px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
        }
        .mg-detail-file-btn:hover {
            background: #334155;
            color: #e2e8f0;
        }

        /* === 拖拽分隔条 + 图谱折叠按钮 === */
        .resize-handle {
            display: none;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            position: relative;
            flex-shrink: 0;
            transition: background 0.2s;
            z-index: 10;
        }
        .resize-handle:hover, .resize-handle.dragging {
            background: #3b82f6;
        }
        .app-wrapper.split-mode .resize-handle {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .graph-collapse-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 48px;
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
        }
        .resize-handle:hover .graph-collapse-btn {
            opacity: 1;
        }
        .graph-collapse-btn:hover {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }

        /* === 图谱面板 === */
        .graph-panel {
            display: none;
            flex: 1;
            min-width: 0;
            height: 100%;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            flex-direction: column;
            overflow: hidden;
            animation: graphSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-wrapper.split-mode .graph-panel {
            display: flex;
        }

        @keyframes graphSlideIn {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* 图谱面板内部结构 */
        .graph-header {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .graph-header h2 {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
        }
        .graph-header h2 .accent { color: #3b82f6; }
        .graph-progress { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #64748b; }
        .graph-progress-bar { width: 140px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .graph-progress-fill { height: 100%; background: linear-gradient(90deg,#22c55e,#16a34a); border-radius: 3px; transition: width .4s; }
        .graph-body { flex: 1; display: flex; overflow: hidden; }
        .graph-svg-area { flex: 1; overflow: hidden; background: #f8fafc; position: relative; cursor: grab; min-height: 200px; }
        .graph-svg-area.panning { cursor: grabbing; }
        .graph-svg-area svg { display: block; transform-origin: 0 0; will-change: transform; }

        /* 图谱节点 */
        .graph-panel .gnode { cursor: pointer; }
        .graph-panel .gnode .card { fill: #fff; stroke: #e2e8f0; stroke-width: 1.5; }
        .graph-panel .gnode:hover .card { stroke: #3b82f6; stroke-width: 2.5; }
        .graph-panel .gnode.selected .card { stroke: #3b82f6; stroke-width: 3; }
        .graph-panel .gnode .title { font-size: 11.5px; font-weight: 600; fill: #1e293b; }
        .graph-panel .gnode .subtitle { font-size: 10px; fill: #64748b; }
        .graph-panel .gnode.dimmed { opacity: .18; }
        .graph-panel .dep-group { }

        /* 图谱边 */
        .graph-panel .edge-hier { fill: none; stroke: #cbd5e1; stroke-width: 1.4; }
        .graph-panel .edge-hier.dimmed { opacity: .1; }
        .graph-panel .dep-group { transition: opacity .3s; }
        .graph-panel .dep-group .dep-line { fill: none; stroke-width: 2; stroke-dasharray: 7 4; }
        .graph-panel .dep-group .dep-label { font-size: 9.5px; font-weight: 600; }
        .graph-panel .dep-group.satisfied .dep-line { stroke: #22c55e; }
        .graph-panel .dep-group.unsatisfied .dep-line { stroke: #ef4444; }
        .graph-panel .dep-group.satisfied .dep-label { fill: #16a34a; }
        .graph-panel .dep-group.unsatisfied .dep-label { fill: #dc2626; }
        .graph-panel .dep-group.dimmed { opacity: .08; }
        .graph-panel .dep-group.highlighted .dep-line { stroke-width: 3; }
        .graph-panel .dep-group.highlighted.satisfied .dep-line { stroke-width: 3; }
        @keyframes dash { to { stroke-dashoffset: -22; } }
        .graph-panel .dep-group:hover .dep-line { animation: dash .8s linear infinite; }

        /* 图谱右侧详情面板 */
        .graph-detail-panel {
            width: 320px;
            background: #fff;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: visible;
            position: relative;
        }
        .gp-tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #f8fafc; flex-shrink: 0; }
        .gp-tab {
            flex: 1; padding: 8px 4px; font-size: 11.5px; font-weight: 600;
            color: #94a3b8; background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s;
        }
        .gp-tab:hover { color: #3b82f6; }
        .gp-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; background: #fff; }
        .gp-collapse-btn {
            flex: 0 0 auto;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: 700;
            color: #94a3b8;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all .2s;
        }
        .gp-collapse-btn:hover { color: #3b82f6; background: #eff6ff; }
        .gp-tab-body { flex: 1; overflow-y: auto; padding: 14px; }
        .gp-tab-body.hidden { display: none; }
        .gp-tab-body h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .gp-field { margin-bottom: 10px; }
        .gp-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #94a3b8; letter-spacing: .5px; margin-bottom: 2px; }
        .gp-field-value { font-size: 12px; color: #334155; line-height: 1.6; }
        .gp-dep-card {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
            padding: 8px; margin-bottom: 5px;
        }
        .gp-dep-card .dep-id { font-size: 11px; font-weight: 700; }
        .gp-dep-card .dep-id.in { color: #dc2626; }
        .gp-dep-card .dep-id.out { color: #3b82f6; }
        .gp-dep-card .dep-via { font-size: 10px; color: #64748b; margin-top: 2px; }
        .gp-dep-card .dep-result { font-size: 11px; color: #334155; margin-top: 4px; padding-top: 4px; border-top: 1px dashed #e2e8f0; }
        .gp-llm-box {
            background: #1e293b; color: #e2e8f0; font-family: Consolas, Monaco, Menlo, monospace;
            font-size: 11px; line-height: 1.6; padding: 12px; border-radius: 8px;
            white-space: pre-wrap; word-break: break-all;
        }
        .gp-placeholder { text-align: center; color: #94a3b8; padding: 30px 14px; font-size: 12px; line-height: 1.8; }

        /* 图谱底部图例 */
        .graph-legend {
            display: flex; gap: 14px; padding: 6px 16px; background: #fff;
            border-top: 1px solid #e2e8f0; font-size: 11px; color: #64748b;
            flex-shrink: 0; align-items: center; flex-wrap: wrap;
        }
        .graph-legend .gl-item { display: flex; align-items: center; gap: 4px; }
        .graph-legend .gl-line { width: 18px; height: 0; border-top: 2px solid; }
        .graph-legend .gl-dash { width: 18px; height: 0; border-top: 2px dashed; }
        .graph-legend .gl-dot { width: 8px; height: 8px; border-radius: 2px; }

        /* 图谱关闭按钮 */
        .graph-close-btn {
            background: none; border: 1px solid #e2e8f0; border-radius: 6px;
            padding: 4px 12px; font-size: 12px; color: #64748b; cursor: pointer;
            transition: all 0.2s;
        }
        .graph-close-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

        /* 对话框里的图谱开关按钮 */
        .graph-toggle-btn {
            background: rgba(255,255,255,0.2);
            border: none; border-radius: 8px;
            padding: 5px 12px; color: white; cursor: pointer;
            font-size: 13px; font-weight: 600;
            transition: background 0.3s;
        }
        .graph-toggle-btn:hover { background: rgba(255,255,255,0.35); }

        /* === 会话列表 === */
        .session-list {
            background: #f8f8fc;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            max-height: 180px;
            overflow: hidden;
        }
        .session-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            flex-shrink: 0;
        }
        .session-list-header span {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .new-session-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .new-session-btn:hover { opacity: 0.85; }
        .session-items {
            flex: 1;
            overflow-y: auto;
            padding: 0 6px 6px;
        }
        .session-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #475569;
            transition: background 0.15s;
            position: relative;
        }
        .session-item:hover { background: #eef2ff; }
        .session-item.active {
            background: linear-gradient(135deg, rgba(102,126,234,0.12), rgba(118,75,162,0.1));
            color: #4338ca;
            font-weight: 600;
        }
        .session-item .session-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .session-item .session-title-input {
            flex: 1;
            min-width: 0;
            border: 1px solid #667eea;
            border-radius: 4px;
            padding: 1px 6px;
            font-size: 13px;
            outline: none;
            background: white;
        }
        .session-item .session-delete {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #94a3b8;
            padding: 0 2px;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .session-item:hover .session-delete { display: block; }
        .session-item .session-delete:hover { color: #ef4444; }

        /* === 图谱列表（类似会话列表） === */
        .graph-list {
            background: #f8f8fc;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            max-height: 150px;
            overflow: hidden;
        }
        .graph-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 12px;
            flex-shrink: 0;
        }
        .graph-list-header span {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .graph-list-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: #94a3b8;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .graph-list-toggle:hover { background: #e2e8f0; color: #475569; }
        .graph-items {
            flex: 1;
            overflow-y: auto;
            padding: 0 6px 6px;
        }
        .graph-list.collapsed .graph-items { display: none; }
        .graph-list.collapsed { max-height: none; }
        .graph-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #475569;
            transition: background 0.15s;
            position: relative;
        }
        .graph-item:hover { background: #eef2ff; }
        .graph-item.active {
            background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(6,182,212,0.1));
            color: #1d4ed8;
            font-weight: 600;
        }
        .graph-item .graph-item-icon {
            flex-shrink: 0;
            font-size: 11px;
        }
        .graph-item .graph-item-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .graph-item .graph-item-status {
            flex-shrink: 0;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            background: #f1f5f9;
            color: #64748b;
        }
        .graph-item .graph-item-delete {

        .mc-indicator.running { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

        .mc-indicator.stopped { background: #64748b; }
        .mc-indicator.error { background: #ef4444; box-shadow: 0 0 6px #ef4444; }

            font-size: 12px;

        .module-card .mc-state {

        .module-card .mc-switch {
            position: relative;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }
        .module-card .mc-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .module-card .mc-switch .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #475569;
            border-radius: 10px;
            transition: background 0.3s;
        }
        .module-card .mc-switch .slider::before {
            content: "";
            position: absolute;
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .module-card .mc-switch input:checked + .slider {
            background: #22c55e;
        }
        .module-card .mc-switch input:checked + .slider::before {
            transform: translateX(16px);
        }
        .module-card .mc-switch input:disabled + .slider {

        .module-section-title {

        /* === 设置面板 === */

<body>
    <div class="app-wrapper" id="appWrapper">
    <div class="chat-container">
        <div class="chat-header">
            <button class="dark-mode-toggle" id="darkModeToggle" onclick="toggleDarkMode()" title="暗夜模式">&#127769;</button>
            <span class="status-indicator disconnected" id="statusIndicator"></span>
            <span style="margin-left:4px;">祖龙</span>
            <div class="header-actions">
                <button class="settings-toggle-btn" id="settingsToggleBtn" onclick="toggleSettingsPanel()" title="模型设置">设置</button>
                <button class="module-toggle-btn" id="moduleToggleBtn" onclick="toggleModulePanel()" title="模块管理">模块</button>
                <button class="graph-toggle-btn" id="graphToggleBtn" onclick="toggleTaskGraph()" title="任务图谱">图谱</button>
                <div class="connection-status" id="connectionStatus">连接中...</div>
            </div>
        </div>
        
        <div class="session-list">
            <div class="session-list-header">
                <span>会话列表</span>
                <button class="new-session-btn" onclick="createNewSession()">+ 新会话</button>
            </div>
            <div class="session-items" id="sessionItems">
                <!-- 会话列表项将动态渲染 -->
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- 消息将动态添加到这里 -->
        </div>
        
        <div class="chat-input-container">
            <button class="voice-input-btn" id="voiceInputBtn" title="语音输入">🎤</button>
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="输入消息..."
                autocomplete="off"
            />
            <button class="send-button" id="sendButton">发送</button>
        </div>
    </div><!-- chat-container end -->

    <!-- ===== 拖拽分隔条 + 图谱面板折叠按钮 ===== -->
    <div class="resize-handle" id="resizeHandle">
        <button class="graph-collapse-btn" id="graphCollapseBtn" onclick="toggleTaskGraph()" title="收起图谱面板">◀</button>
    </div>

    <!-- ===== 图谱面板（Tab 切换：记忆图谱 / 任务图谱） ===== -->
    <div class="graph-panel" id="graphPanel">
        <div class="graph-header">
            <div class="graph-tabs">
                <button class="graph-tab-btn active" data-view="task" onclick="switchGraphTab('task')">任务图谱</button>
                <button class="graph-tab-btn" data-view="memory" onclick="switchGraphTab('memory')">记忆图谱</button>
            </div>
            <div class="graph-progress" id="graphProgressBar">
                <span id="gp-ptext">0/0</span>
                <div class="graph-progress-bar"><div class="graph-progress-fill" id="gp-pfill" style="width:0%"></div></div>
            </div>
            <div class="mg-stats" id="mgStats" style="display:none;">0 节点 | 0 边</div>
            <button class="tv-reopen-btn" id="tvReopenBtn" onclick="toggleTvVisible(true)" title="打开思维视图">思维</button>
            <button class="graph-close-btn" onclick="toggleTaskGraph()">收起 ✕</button>
        </div>

        <!-- 任务图谱视图 -->
        <div class="graph-view-task" id="graphViewTask">
            <div class="graph-list" id="graphList">

                    <span>图谱列表</span>

            </div>

        <div class="gcm-item" data-action="detail">查看详情</div>
    </div>

    </div><!-- app-wrapper end -->

            <span class="tv-node-count" id="tvNodeCount">(0)</span>
            <button class="tv-btn" onclick="toggleTvMinimize()" title="最小化">&#x2500;</button>
            <button class="tv-btn" onclick="toggleTvVisible(false)" title="关闭">&#x2715;</button>
        </div>
        <div class="tv-body" id="tvBody">
            <svg id="thoughtViewSvg"></svg>
            <div class="tv-empty-hint" id="tvEmptyHint">暂无活跃思维节点</div>
        </div>
        <div class="tv-resize-handle" id="tvResizeHandle"></div>
    </div>

    <!-- ===== 模块管理浮动面板 ===== -->
    <div class="module-panel" id="modulePanel">
        <div class="module-panel-header">
            <h3>模块管理</h3>
            <span class="mp-mode" id="mpMode">--</span>
            <button class="module-panel-close" onclick="toggleModulePanel()">&times;</button>
        </div>
        <div class="module-panel-body" id="modulePanelBody">
            <div style="color:#64748b;font-size:12px;text-align:center;padding:30px;">加载中...</div>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-panel-header">
            <h3>模型设置</h3>
            <button class="settings-panel-close" onclick="toggleSettingsPanel()">&times;</button>
        </div>
        <div class="settings-panel-body" id="settingsPanelBody">
            <div style="color:#64748b;font-size:12px;text-align:center;padding:30px;">加载中...</div>
        </div>
    </div>

    <!-- 右键上下文菜单（会话列表） -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="rename">重命名</div>
        <div class="context-menu-item danger" data-action="delete">删除</div>
    </div>

    <!-- 右键上下文菜单（聊天消息） -->
    <div class="context-menu" id="msgContextMenu">
        <div class="context-menu-item danger" data-action="delete-msg">删除此消息</div>
        <div class="context-menu-item danger" data-action="delete-below">删除此消息及以下</div>
    </div>
    
    <script>
        // WebSocket 连接
        let ws = null;
        const reconnectDelay = 3000; // 3 秒后重连
        
        // DOM 元素
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const voiceInputBtn = document.getElementById('voiceInputBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const connectionStatus = document.getElementById('connectionStatus');

        // ===== 语音录音功能 =====
        let isRecording = false;

        voiceInputBtn.addEventListener('click', async function() {
            if (isRecording) {
                // 停止录音
                isRecording = false;
                voiceInputBtn.classList.remove('recording');
                voiceInputBtn.textContent = '🎤';
                console.log('[Voice] 停止录音');

                // 发送 audio_end
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'audio_end',
                        session_id: currentSessionId
                    }));
                }
            } else {
                // 发送 audio_start
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'audio_start',
                        session_id: currentSessionId
                    }));
                    
                    isRecording = true;
                    voiceInputBtn.classList.add('recording');
                    voiceInputBtn.textContent = '⏹';
                    console.log('[Voice] 开始录音（后端采集）');
                } else {
                    console.error('[Voice] WebSocket 未连接');
                    alert('WebSocket 未连接，无法录音');
                }
            }
        });
        
        // ===== 多会话管理 =====
        const STORAGE_KEY = 'zulong_sessions';
        let currentSessionId = null;
        
        // 思考过程面板管理
        let currentRequestId = null;
        const thinkingPanelMap = {};
        const pendingThinkingSteps = {};
        
        // 生成唯一 ID
        function generateId() {
            if (crypto && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }
        
        // 读取全部会话数据
        function loadSessionStore() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) return JSON.parse(raw);
            } catch (e) {
                console.error('[Session] 加载失败:', e);
            }
            return { activeSessionId: null, sessions: [] };
        }
        
        // 写入全部会话数据
        function saveSessionStore(store) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
            } catch (e) {
                console.error('[Session] 保存失败:', e);
            }
            // 异步同步到服务端（防止端口/浏览器变更导致丢失）
            _syncToServer(store);
        }
        
        // 异步同步到服务端
        function _syncToServer(store) {
            fetch('/api/chat/sessions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(store)
            }).catch(e => console.warn('[Session] 服务端同步失败:', e));
        }
        
        // 获取当前会话对象
        function getCurrentSession() {
            const store = loadSessionStore();
            return store.sessions.find(s => s.id === currentSessionId) || null;
        }
        
        // 创建新会话
        function createNewSession() {
            const store = loadSessionStore();
            const newSession = {
                id: generateId(),
                title: '新会话',
                messages: [],
                createdAt: Date.now()
            };
            store.sessions.unshift(newSession);
            store.activeSessionId = newSession.id;
            saveSessionStore(store);
            switchToSession(newSession.id);
        }
        
        // 切换到指定会话
        function switchToSession(sessionId) {
            currentSessionId = sessionId;
            const store = loadSessionStore();
            store.activeSessionId = sessionId;
            saveSessionStore(store);
            
            // 清空当前聊天区
            chatMessages.innerHTML = '';
            
            // 恢复该会话的消息
            const session = store.sessions.find(s => s.id === sessionId);
            if (session && session.source === 'memory_graph') {
                // 后端会话：通过 WebSocket 从 MemoryGraph 加载消息
                if (ws && ws.readyState === WebSocket.OPEN) {
                    // 显示加载提示
                    const loadingDiv = document.createElement('div');
                    loadingDiv.className = 'message system';
                    loadingDiv.id = 'session-loading';
                    loadingDiv.innerHTML = '<div class="message-content"><em>正在加载对话记录...</em></div>';
                    chatMessages.appendChild(loadingDiv);
                    
                    ws.send(JSON.stringify({
                        type: "GET_SESSION_MESSAGES",
                        session_id: sessionId
                    }));
                } else {
                    const offDiv = document.createElement('div');
                    offDiv.className = 'message system';
                    offDiv.innerHTML = '<div class="message-content"><em>WebSocket 未连接，无法加载对话记录</em></div>';
                    chatMessages.appendChild(offDiv);
                }
            } else if (session && session.messages) {
                // 本地会话：从 localStorage 恢复
                session.messages.forEach(msg => {
                    addMessage(msg.text, msg.sender, false, null, msg.id);
                });
            }
            
            renderSessionList();
            
            // 如果图谱面板已打开，刷新图谱列表
            refreshGraphListIfVisible();
            
            console.log('[Session] 切换到会话:', sessionId);
        }
        
        // 删除会话（仅Web端，不删系统端记忆）
        function deleteSession(sessionId, ev) {
            if (ev) ev.stopPropagation();

            // 判断是否为后端 MemoryGraph 会话
            const store = loadSessionStore();
            const session = store.sessions.find(s => s.id === sessionId);
            
            if (session && session.source === 'memory_graph') {
                // 后端会话：通过 WebSocket 删除 MemoryGraph 节点
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: "DELETE_DIALOGUE_SESSION",
                        session_id: sessionId
                    }));
                    // handleSessionDeleted 回调会处理前端列表更新
                } else {
                    console.warn('[Session] WebSocket 未连接，无法删除后端会话');
                }
            } else {
                // 本地会话：调用 REST API 级联删除
                fetch('/api/chat/sessions/' + sessionId + '?cascade=true', {
                    method: 'DELETE',
                }).then(function(r) { return r.json(); }).then(function(result) {
                    if (result.mg_nodes_deleted > 0) {
                        console.log('[Session] 级联删除了', result.mg_nodes_deleted, '个图谱节点');
                    }
                }).catch(function(e) {
                    console.warn('[Session] 级联删除请求失败:', e);
                });

                // 前端立即删除（不等后端响应）
                store.sessions = store.sessions.filter(s => s.id !== sessionId);
                
                if (currentSessionId === sessionId) {
                    if (store.sessions.length > 0) {
                        store.activeSessionId = store.sessions[0].id;
                        saveSessionStore(store);
                        switchToSession(store.sessions[0].id);
                    } else {
                        saveSessionStore(store);
                        createNewSession();
                    }
                } else {
                    saveSessionStore(store);
                    renderSessionList();
                }
            }
            console.log('[Session] 已删除会话:', sessionId);
        }
        
        // 开始重命名会话
        function startRenameSession(sessionId, ev) {
            if (ev) ev.stopPropagation();
            const item = document.querySelector(`.session-item[data-sid="${sessionId}"]`);
            if (!item) return;
            
            const titleEl = item.querySelector('.session-title');
            const currentTitle = titleEl.textContent;
            
            // 替换为输入框
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'session-title-input';
            input.value = currentTitle;
            titleEl.replaceWith(input);
            input.focus();
            input.select();
            
            function finishRename() {
                const newTitle = input.value.trim() || currentTitle;
                const store = loadSessionStore();
                const session = store.sessions.find(s => s.id === sessionId);
                if (session) {
                    session.title = newTitle;
                    saveSessionStore(store);
                }
                renderSessionList();
            }
            
            input.addEventListener('blur', finishRename);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { input.blur(); }
                if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
            });
        }
        
        // 渲染会话列表
        function renderSessionList() {
            const store = loadSessionStore();
            const container = document.getElementById('sessionItems');
            container.innerHTML = '';
            
            store.sessions.forEach(s => {
                const div = document.createElement('div');
                div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                div.setAttribute('data-sid', s.id);
                div.onclick = function() { switchToSession(s.id); };
                // 右键菜单
                div.oncontextmenu = function(e) { showSessionContextMenu(e, s.id); };
                
                const title = document.createElement('span');
                title.className = 'session-title';
                title.textContent = s.title + (s.source === 'ide' ? ' [IDE]' : '') + (s.source === 'memory_graph' ? ' [记忆]' : '');
                title.ondblclick = function(e) { startRenameSession(s.id, e); };
                
                const del = document.createElement('button');
                del.className = 'session-delete';
                del.textContent = '\u2715';
                del.title = '删除会话';
                del.onclick = function(e) { deleteSession(s.id, e); };
                
                div.appendChild(title);
                div.appendChild(del);
                container.appendChild(div);
            });
        }
        
        // 保存消息到当前会话
        function saveMessageToSession(message) {
            const store = loadSessionStore();
            const session = store.sessions.find(s => s.id === currentSessionId);
            if (!session) return;
            
            session.messages.push(message);
            
            // 自动标题：用第一条用户消息
            if (session.title === '新会话' && message.sender === 'user') {
                const text = message.text;
                session.title = text.length > 20 ? text.substring(0, 20) + '...' : text;
                renderSessionList();
            }
            
            // 限制每个会话最多100条消息
            if (session.messages.length > 100) {
                session.messages.shift();
            }
            
            saveSessionStore(store);
        }
        
        // 初始化会话系统
        function initSessionManager() {
            // 先从服务端拉取持久化数据，合并到 localStorage
            fetch('/api/chat/sessions')
                .then(r => r.json())
                .then(serverStore => {
                    const localStore = loadSessionStore();
                    const merged = _mergeSessionStores(serverStore, localStore);
                    // 保存合并结果到 localStorage（不再触发服务端同步，避免循环）
                    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(merged)); } catch(e) {}
                    _applySessionStore(merged);
                })
                .catch(e => {
                    console.warn('[Session] 服务端加载失败，使用本地数据:', e);
                    _applySessionStore(loadSessionStore());
                });
        }
        
        // 合并服务端和本地会话数据（以会话 ID 去重，本地优先更新）
        function _mergeSessionStores(serverStore, localStore) {
            const allSessions = [...(serverStore.sessions || [])];
            const existingIds = new Set(allSessions.map(s => s.id));
            // 本地有但服务端没有的会话，追加进去
            for (const ls of (localStore.sessions || [])) {
                if (!existingIds.has(ls.id)) {
                    allSessions.push(ls);
                } else {
                    // 如果本地版本消息更多，用本地版本覆盖
                    const idx = allSessions.findIndex(s => s.id === ls.id);
                    if (idx >= 0 && ls.messages && ls.messages.length > (allSessions[idx].messages || []).length) {
                        allSessions[idx] = ls;
                    }
                }
            }
            const activeId = localStore.activeSessionId || serverStore.activeSessionId;
            const merged = { activeSessionId: activeId, sessions: allSessions };
            // 合并后同步到服务端
            _syncToServer(merged);
            return merged;
        }
        
        // 根据会话数据初始化 UI
        function _applySessionStore(store) {
            // 检查 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            const sessionIdFromUrl = urlParams.get('session_id');
            
            if (sessionIdFromUrl && store.sessions.find(s => s.id === sessionIdFromUrl)) {
                switchToSession(sessionIdFromUrl);
            } else if (store.activeSessionId && store.sessions.find(s => s.id === store.activeSessionId)) {
                switchToSession(store.activeSessionId);
            } else if (store.sessions.length > 0) {
                switchToSession(store.sessions[0].id);
            } else {
                createNewSession();
            }
        }
        
        // 兼容旧代码的函数
        function clearChatHistory() {
            if (currentSessionId) {
                deleteSession(currentSessionId);
            }
        }
        
        // ===== 后端 MemoryGraph 对话会话整合 =====
        
        // 合并后端对话会话到本地会话列表
        function mergeBackendSessions(backendSessions) {
            if (!backendSessions || backendSessions.length === 0) return;
            
            const store = loadSessionStore();
            const existingDialogueIds = new Set(
                store.sessions
                    .filter(s => s.dialogue_session_id)
                    .map(s => s.dialogue_session_id)
            );
            
            let added = 0;
            for (const bs of backendSessions) {
                // 跳过已经通过 dialogue_session_id 关联的
                if (existingDialogueIds.has(bs.id)) continue;
                // 跳过已经以 source=memory_graph 存在的
                if (store.sessions.find(s => s.id === bs.id)) continue;
                
                store.sessions.push({
                    id: bs.id,
                    title: bs.title || '对话记录',
                    messages: [],  // 消息按需从后端加载
                    createdAt: (bs.created_at || 0) * 1000,
                    source: 'memory_graph',
                    dialogue_session_id: bs.id,
                    round_count: bs.round_count || 0,
                    preview: bs.preview || '',
                    last_active_at: bs.last_active_at || bs.created_at || 0,
                    bound_task_id: bs.bound_task_id || '',
                });
                added++;
            }
            
            if (added > 0) {
                // 重新排序：按 last_active_at 降序
                store.sessions.sort((a, b) => {
                    const ta = a.last_active_at || (a.createdAt / 1000) || 0;
                    const tb = b.last_active_at || (b.createdAt / 1000) || 0;
                    return tb - ta;
                });
                saveSessionStore(store);
                renderSessionList();
                console.log('[Session] 合并了', added, '个后端对话会话');
            }
        }
        
        // 渲染后端会话的完整消息列表
        function renderSessionMessages(sessionId, messages) {
            // 只在当前会话匹配时渲染
            if (sessionId !== currentSessionId) return;
            
            chatMessages.innerHTML = '';
            
            if (messages.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'message system';
                emptyDiv.innerHTML = '<div class="message-content"><em>该会话暂无消息记录</em></div>';
                chatMessages.appendChild(emptyDiv);
                return;
            }
            
            for (const msg of messages) {
                if (msg.role === 'user') {
                    addMessage(msg.content, 'user', false, null, msg.node_id);
                } else if (msg.role === 'assistant') {
                    addMessage(msg.content, 'assistant', false, null, msg.node_id);
                } else if (msg.role === 'tool') {
                    // 工具消息以折叠卡片形式
                    addToolMessage(msg.content, msg.node_id);
                } else {
                    addMessage(msg.content, 'assistant', false, null, msg.node_id);
                }
            }
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 添加工具消息（折叠卡片形式）
        function addToolMessage(content, nodeId) {
            const div = document.createElement('div');
            div.className = 'message assistant';
            if (nodeId) div.setAttribute('data-node-id', nodeId);
            
            // 提取工具名
            const toolMatch = content.match(/^\[([^\]]+)\]\s*/);
            const toolName = toolMatch ? toolMatch[1] : '工具调用';
            const toolContent = toolMatch ? content.slice(toolMatch[0].length) : content;
            
            div.innerHTML = `
                <div class="message-content tool-card" style="font-size:12px; opacity:0.8; border-left:3px solid #6366f1; padding-left:8px;">
                    <details>
                        <summary style="cursor:pointer; font-weight:500; color:#6366f1;">🔧 ${toolName}</summary>
                        <pre style="margin-top:4px; white-space:pre-wrap; font-size:11px; max-height:200px; overflow-y:auto;">${escapeHtml(toolContent.slice(0, 500))}</pre>
                    </details>
                </div>`;
            chatMessages.appendChild(div);
        }
        
        // 处理会话删除确认
        function handleSessionDeleted(sessionId, nodesDeleted) {
            console.log('[Session] 后端会话已删除:', sessionId, '节点数:', nodesDeleted);
            // 从本地列表移除
            const store = loadSessionStore();
            store.sessions = store.sessions.filter(s => s.id !== sessionId);
            if (currentSessionId === sessionId) {
                if (store.sessions.length > 0) {
                    store.activeSessionId = store.sessions[0].id;
                    saveSessionStore(store);
                    switchToSession(store.sessions[0].id);
                } else {
                    saveSessionStore(store);
                    createNewSession();
                }
            } else {
                saveSessionStore(store);
                renderSessionList();
            }
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const el = document.createElement('div');
            el.textContent = text;
            return el.innerHTML;
        }
        
        // 连接 WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            console.log('[WebSocket] 正在连接到:', wsUrl);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('[WebSocket] ✅ 连接成功');
                updateStatus(true);
                // 重连后自动同步后端状态（图谱+会话）
                syncBackendState();
            };
            
            ws.onclose = () => {
                console.log('[WebSocket] ❌ 连接关闭');
                updateStatus(false);
                setTimeout(connect, reconnectDelay);
            };
            
            ws.onerror = (error) => {
                console.error('[WebSocket] 错误:', error);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }
        
        // 更新连接状态
        function updateStatus(connected) {
            if (connected) {
                statusIndicator.className = 'status-indicator connected';
                connectionStatus.textContent = '已连接';
                sendButton.disabled = false;
            } else {
                statusIndicator.className = 'status-indicator disconnected';
                connectionStatus.textContent = '断开连接';
                sendButton.disabled = true;
            }
        }
        
        // 处理收到的消息
        function handleMessage(data) {
            console.log('[WebSocket] 收到消息:', data.type);
            
            switch (data.type) {
                case 'audio_transcript':
                    // 语音转录结果
                    if (data.payload && data.payload.text) {
                        chatInput.value += data.payload.text;
                        console.log('[Voice] 转录结果:', data.payload.text);
                    }
                    break;

                case 'WELCOME':
                    console.log('[WebSocket] 欢迎消息:', data.message);
                    // 预填充已有活跃 IDE 会话映射
                    if (data.payload && data.payload.active_sessions) {
                        data.payload.active_sessions.forEach(function(s) {
                            if (s.session_id && !_ideSessionMap[s.session_id]) {
                                _ideSessionMap[s.session_id] = s.session_id;
                            }
                        });
                    }
                    // 自动重建：恢复后端已有的任务图谱
                    if (data.payload && data.payload.task_graph) {
                        addTaskGraph(data.payload.task_graph);
                        console.log('[WebSocket] 已从WELCOME恢复任务图谱');
                    }
                    // 连接建立后请求后端对话会话列表
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({type: "LIST_DIALOGUE_SESSIONS"}));
                    }
                    break;
                
                case 'THINKING_STEP':
                    handleThinkingStep(data);
                    break;
                
                case 'CHAT_RESPONSE':
                    removeTypingIndicator();
                    // 如果有流式消息在进行中，将其定稿为最终消息
                    finalizeStreamingMessage(data.text, data.request_id);
                    switchToSendMode();
                    break;
                
                case 'STREAMING_RESPONSE':
                    removeTypingIndicator();
                    updateStreamingMessage(data.text, data.chunk, data.request_id);
                    break;
                
                case 'MEMORY_GRAPH_UPDATE':
                    handleMemoryGraphUpdate(data);
                    break;

                case 'MEMORY_GRAPH_EXPAND_RESULT':
                    handleMemoryGraphExpandResult(data);
                    break;

                case 'CODE_ANCHOR_UPDATE':
                    handleCodeAnchorUpdate(data);
                    break;

                case 'USER_MESSAGE':
                    // 来自 API/测试脚本的用户消息，添加到聊天窗口
                    addMessage(data.text, 'user');
                    break;

                // ── IDE 会话事件（来自 broadcast_monitor_event 广播） ──
                case 'FC_START':
                    handleFCStart(data);
                    break;
                case 'MODEL_RESPONSE':
                    handleModelResponse(data);
                    break;
                case 'TOOL_CALL':
                case 'IDE_TOOL_REQUEST':
                    handleIdeToolCall(data);
                    break;
                case 'IDE_TOOL_RESULT':
                    handleIdeToolResult(data);
                    break;
                case 'IDE_TOOL_EXEC':
                    handleIdeToolExec(data);
                    break;
                case 'CALLING_MODEL':
                case 'TURN_COMPLETE':
                    // 轻量事件，仅日志
                    console.log('[IDE]', data.type, data.payload);
                    break;
                case 'DISPLAY_TEXT':
                    handleDisplayText(data);
                    break;
                case 'TASK_COMPLETE':
                    handleTaskComplete(data);
                    break;
                case 'FC_DONE':
                    handleFCDone(data);
                    break;
                case 'IDE_SESSION_START':
                    handleIdeSessionStart(data);
                    break;
                case 'IDE_SESSION_END':
                    handleIdeSessionEnd(data);
                    break;
                case 'IDE_SESSION_CANCEL':
                    handleIdeSessionCancel(data);
                    break;
                case 'IDE_SESSION_LINKED':
                    handleIdeSessionLinked(data);
                    break;
                case 'TASK_GRAPH_UPDATE':
                    if (data.payload && data.payload.graph) {
                        addTaskGraph(data.payload.graph);
                    }
                    break;
                case 'TASK_GRAPH_DELETED':
                    handleTaskGraphDeleted(data);
                    break;

                case 'CRG_INDEX_UPDATE':
                    handleCrgIndexUpdate(data);
                    break;
                case 'CRG_INDEX_COMPLETE':
                    handleCrgIndexComplete(data);
                    break;

                case 'PROGRESS_REPORT':
                    handleProgressReport(data);
                    break;

                case 'STOP_ACK':
                    addIdeSystemMessage('[系统] 停止指令已确认，任务正在终止...');
                    break;

                // ── 对话会话管理（后端 MemoryGraph 重建） ──
                case 'SESSION_LIST':
                    mergeBackendSessions(data.sessions || []);
                    break;
                case 'SESSION_MESSAGES':
                    renderSessionMessages(data.session_id, data.messages || []);
                    break;
                case 'SESSION_DELETED':
                    handleSessionDeleted(data.session_id, data.nodes_deleted || 0);
                    break;

                default:
                    console.log('[WebSocket] 未知消息类型:', data.type);
            }
        }

        // ── IDE 会话事件处理函数 ──────────────────────────────

        // FC_START: 显示用户发送的任务（来自 IDE 插件）
        function handleFCStart(data) {

            if (p.user_input) {
                addMessage(p.user_input, 'user');
            }

            showTypingIndicator();

        // MODEL_RESPONSE: 显示模型回复（复用 finalizeStreamingMessage）
        function handleModelResponse(data) {
            var p = data.payload || {};
            var text = p.text || p.text_preview || '';
            if (!text) return;
            removeTypingIndicator();
            finalizeStreamingMessage(text, null);
        }

        // TOOL_CALL / IDE_TOOL_REQUEST: 显示工具调用
        function handleIdeToolCall(data) {
            var p = data.payload || {};
            var tools = p.tools || [];
            var names = tools.map(function(t) { return t.name || t; });
            if (names.length === 0 && p.count) names = ['(' + p.count + ' 个工具)'];
            var text = '[Turn ' + (p.turn || '?') + '] 调用工具: ' + names.join(', ');
            tools.forEach(function(t) {
                if (t.arguments_preview) {
                    text += '\n  ' + t.name + ': ' + t.arguments_preview.substring(0, 200);
                }
            });
            addIdeSystemMessage(text);
        }

        // IDE_TOOL_RESULT: 显示工具结果
        function handleIdeToolResult(data) {
            var p = data.payload || {};
            var results = p.results || [];
            results.forEach(function(r) {
                var prefix = r.is_error ? '[错误] ' : '';
                var text = '[Turn ' + (p.turn || '?') + '] ' + prefix + (r.tool_name || '工具') + ' 结果: ' + (r.result_preview || '(空)');
                addIdeSystemMessage(text);

        // IDE_TOOL_EXEC: 显示内部工具执行
        function handleIdeToolExec(data) {

            var text = '[Turn ' + (p.turn || '?') + '] 内部工具 ' + (p.tool_name || '') + ': ' + (p.result_preview || '').substring(0, 200);
            addIdeSystemMessage(text);
        }

        // DISPLAY_TEXT: 任务最终文本结果
        function handleDisplayText(data) {
            var p = data.payload || {};
            removeTypingIndicator();
            if (p.text) {
                finalizeStreamingMessage(p.text, null);
            }
        }

        // TASK_COMPLETE: 任务完成（含最终结果）
        function handleTaskComplete(data) {
            var p = data.payload || {};
            removeTypingIndicator();
            switchToSendMode();
            var turns = p.total_turns || '?';
            var resultPreview = (p.result || '').substring(0, 200);
            addIdeSystemMessage('✅ 任务完成 (共 ' + turns + ' 轮)' + (resultPreview ? ' — ' + resultPreview : ''));
            // 如果有结果文本，渲染到聊天窗口
            if (p.result) {
                finalizeStreamingMessage(p.result, null);
            }

        // FC_DONE: FC 循环结束
        function handleFCDone(data) {
            var p = data.payload || {};
            removeTypingIndicator();
            addIdeSystemMessage('IDE 任务完成 (共 ' + (p.total_turns || '?') + ' 轮)');
        }

        // IDE_SESSION_START: 会话启动 + 自动绑定 Web 会话
        var _ideSessionMap = {};
        function handleIdeSessionStart(data) {
            var p = data.payload || {};
            var ideSessionId = p.session_id;
            var taskTitle = p.task_title || (p.task_preview || '').substring(0, 40) || '新任务';
            var isResume = p.is_resume === true;
            var taskGraphId = p.task_graph_id || null;

            // 恢复模式：优先查找已有的同 task_graph_id 会话，在其上继续
            if (isResume && taskGraphId) {
                var store = loadSessionStore();
                var existingSession = store.sessions.find(function(s) {
                    return s.task_graph_id === taskGraphId;
                });
                if (existingSession) {
                    // 复用已有会话，更新 ide_session_id 映射
                    _ideSessionMap[ideSessionId] = existingSession.id;
                    existingSession.ide_session_id = ideSessionId;
                    store.activeSessionId = existingSession.id;
                    saveSessionStore(store);
                    currentSessionId = existingSession.id;
                    renderSessionList();
                    addIdeSystemMessage('任务恢复: ' + cleanDisplayText((p.task_preview || '').substring(0, 100)));
                    return;
                }
            }

            // 新会话：在 Web 端创建/绑定
            if (ideSessionId && !_ideSessionMap[ideSessionId]) {
                var store = loadSessionStore();
                var newId = _generateIdForSession();
                var newSession = {
                    id: newId,
                    title: taskTitle.length > 20 ? taskTitle.substring(0, 20) + '...' : taskTitle,
                    messages: [],
                    createdAt: Date.now(),
                    source: 'ide',
                    ide_session_id: ideSessionId,
                    dialogue_session_id: p.dialogue_session_id || null,
                    project_id: p.project_id || null,
                    task_graph_id: taskGraphId,
                    cwd: p.cwd || null,
                };
                store.sessions.unshift(newSession);
                store.activeSessionId = newId;
                saveSessionStore(store);
                _ideSessionMap[ideSessionId] = newId;
                currentSessionId = newId;
                document.getElementById('chatMessages').innerHTML = '';
                renderSessionList();
            }
            // 显示系统消息
            addIdeSystemMessage('IDE 会话启动: ' + cleanDisplayText((p.task_preview || '').substring(0, 100)));
        }

        // IDE_SESSION_END: 会话结束
        function handleIdeSessionEnd(data) {
            var p = data.payload || {};
            var statusMap = {completed: '已完成', cancelled: '已取消', error: '异常'};
            addIdeSystemMessage('IDE 会话结束 (' + (statusMap[p.status] || p.status) + ')');
            switchToSendMode();

        // IDE_SESSION_LINKED: 会话关联到任务图谱
        function handleIdeSessionLinked(data) {

            var ideSessionId = p.session_id;
            var localId = _ideSessionMap[ideSessionId];

        // 辅助: 添加 IDE 系统消息（不保存到会话历史）
        function addIdeSystemMessage(text) {
            var messageDiv = document.createElement('div');
            messageDiv.className = 'message ide-system';

        // ── IDE 会话事件处理函数 END ─────────────────────────
        
        // 清洗显示文本：移除 <task> 标签、task_progress 系统指令等噪声
        function cleanDisplayText(text) {
            if (!text) return '';
            // 提取 <task>...</task> 内容（如果有）
            var taskMatch = text.match(/<task>\s*([\s\S]*?)\s*<\/task>/);
            if (taskMatch) {
                text = taskMatch[1].trim();
            }
            // 截断 # task_progress 及之后的系统指令
            var noiseIdx = text.search(/\n#\s*task_progress|<task_progress>|\n====|\n#\s*(?:When starting a new task|Benefits of)/i);
            if (noiseIdx > 0) {
                text = text.substring(0, noiseIdx).trim();
            }
            // 移除行首的 # task_progress ... 整行（如果出现在开头）
            text = text.replace(/^#\s*task_progress\s+RECOMMENDED[\s\S]*/i, '').trim();
            return text;
        }

        // 添加消息到聊天窗口
        function addMessage(text, sender, shouldSave = true, requestId = null, existingId = null) {
            const msgId = existingId || generateId();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.setAttribute('data-msg-id', msgId);
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            // 为 assistant 消息附加思考过程面板
            if (sender === 'assistant') {
                const rid = requestId || currentRequestId;
                if (rid && pendingThinkingSteps[rid] && pendingThinkingSteps[rid].length > 0) {
                    const panel = createThinkingPanel(rid);
                    // 将缓存的步骤渲染到面板
                    const steps = pendingThinkingSteps[rid];
                    steps.forEach(function(step) {
                        appendStepToPanel(panel, step);
                    });
                    // 标记面板为已完成（移除活跃脉动）
                    panel.classList.remove('active');
                    contentDiv.appendChild(panel);
                    thinkingPanelMap[rid] = panel;
                    delete pendingThinkingSteps[rid];
                }
            }
            
            messageDiv.appendChild(contentDiv);
            // 右键删除菜单
            messageDiv.addEventListener('contextmenu', function(e) {
                showMsgContextMenu(e, msgId, messageDiv);
            });
            chatMessages.appendChild(messageDiv);
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // 保存到当前会话
            if (shouldSave) {
                saveMessageToSession({
                    id: msgId,
                    text: text,
                    sender: sender,
                    timestamp: Date.now()
                });
            }
        }
        
        // 显示打字指示器
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            
            const indicatorDiv = document.createElement('div');

        // 移除打字指示器
        function removeTypingIndicator() {

            if (typingIndicator) {
                typingIndicator.remove();
            }
        }
        
        // 更新流式消息
        function updateStreamingMessage(text, chunk, requestId) {
            let streamingMessage = document.getElementById('streamingMessage');
            var displayText = cleanDisplayText(text);
            
            if (!streamingMessage) {
                // 创建流式消息容器
                streamingMessage = document.createElement('div');
                streamingMessage.className = 'message assistant';
                streamingMessage.id = 'streamingMessage';
                if (requestId) {
                    streamingMessage.setAttribute('data-request-id', requestId);
                }
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = displayText;
                
                streamingMessage.appendChild(contentDiv);
                chatMessages.appendChild(streamingMessage);
            } else {
                // 更新现有流式消息
                const contentDiv = streamingMessage.querySelector('.message-content');
                if (contentDiv) {
                    contentDiv.textContent = displayText;
                }
            }
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 将流式消息定稿为最终消息（附加思考面板 + 保存历史）
        function finalizeStreamingMessage(text, requestId) {
            let streamingMessage = document.getElementById('streamingMessage');
            var displayText = cleanDisplayText(text);
            
            if (streamingMessage) {
                // 流式消息已存在，直接更新文本并定稿
                const contentDiv = streamingMessage.querySelector('.message-content');
                if (contentDiv) {
                    contentDiv.textContent = displayText;
                }
                
                // 附加思考面板
                const rid = requestId || currentRequestId;
                if (rid && pendingThinkingSteps[rid] && pendingThinkingSteps[rid].length > 0) {
                    const panel = createThinkingPanel(rid);
                    pendingThinkingSteps[rid].forEach(function(step) {
                        appendStepToPanel(panel, step);
                    });
                    panel.classList.remove('active');
                    contentDiv.appendChild(panel);
                    thinkingPanelMap[rid] = panel;
                    delete pendingThinkingSteps[rid];
                }
                
                // 移除 streaming ID，防止后续流式消息干扰
                streamingMessage.removeAttribute('id');
                
                // 保存到当前会话
                saveMessageToSession({
                    id: generateId(),
                    text: displayText,
                    sender: 'assistant',
                    timestamp: Date.now()
                });
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } else {
                // 没有流式消息（直接出最终结果），走正常添加路径
                addMessage(displayText, 'assistant', true, requestId);
            }
        }
        
        // 发送消息
        function sendMessage() {
            const text = chatInput.value.trim();
            
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }
            
            // 移除现有的流式消息容器
            const streamingMessage = document.getElementById('streamingMessage');
            if (streamingMessage) {
                streamingMessage.remove();
            }
            
            // 添加到聊天窗口
            addMessage(text, 'user');
            
            // 发送到服务器（包含测试信息）
            const requestId = generateId();
            currentRequestId = requestId;
            
            // 解析引用标记 @[名称#地址]（地址即节点完整路径，可用于模型定位）
            var refPattern = /@\[(.+?)#(.+?)\]/g;
            var match, referencedNodes = [];
            while ((match = refPattern.exec(text)) !== null) {
                referencedNodes.push({label: match[1], address: match[2]});
            }

            const messageData = {
                type: 'CHAT_MESSAGE',
                text: text,
                session_id: currentSessionId,  // 会话 ID
                request_id: requestId,          // 请求 ID（关联思考过程）
                referenced_nodes: referencedNodes  // 引用的节点 {label, address} 列表
            };
            
            console.log('[WebSocket] 📤 发送消息:', messageData);
            ws.send(JSON.stringify(messageData));
            
            // 清空输入框
            chatInput.value = '';
            
            // 显示打字指示器
            showTypingIndicator();

            // 切换到停止模式
            switchToStopMode();
        }

        // 停止/发送按钮模式切换
        var _currentSendMode = 'send'; // 'send' | 'stop'
        var _isGenerating = false; // 是否正在生成中

        function switchToStopMode() {
            _isGenerating = true;
            // 只有输入框为空时才显示停止按钮
            if (!chatInput.value.trim()) {
                _currentSendMode = 'stop';
                sendButton.textContent = '停止';
                sendButton.classList.add('stop-mode');
            }
        }

        function switchToSendMode() {
            _isGenerating = false;
            _currentSendMode = 'send';
            sendButton.textContent = '发送';
            sendButton.classList.remove('stop-mode');
        }

        function stopGeneration() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                // 发送 STOP_GENERATION（附带 session_id 实现精准停止）
                if (currentRequestId) {
                    ws.send(JSON.stringify({
                        type: 'STOP_GENERATION',
                        request_id: currentRequestId,
                        session_id: currentSessionId || undefined
                    }));
                }
                // 同时发送 STOP_TASK（兼容 monitor WebSocket）
                ws.send(JSON.stringify({ type: 'STOP_TASK', session_id: currentSessionId || undefined }));
                console.log('[WebSocket] 发送停止请求:', currentRequestId, 'session:', currentSessionId);
            }
            removeTypingIndicator();
            switchToSendMode();
        }

        // ===== 右键菜单功能 =====

        function showGraphContextMenu(x, y, nodeId, nodeLabel, nodeAddress) {
