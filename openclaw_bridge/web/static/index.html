                    html += '<div class="mg-detail-field">';
                    html += '<div class="mg-detail-field-label">描述</div>';
                    html += '<div class="mg-detail-content-box">' + escHtml(meta.desc) + '</div>';
                    html += '</div>';
                }
                if (meta.result_preview) {
                    html += '<div class="mg-detail-field">';
                    html += '<div class="mg-detail-field-label">结果预览</div>';
                    html += '<div class="mg-detail-content-box">' + escHtml(meta.result_preview) + '</div>';
                    html += '</div>';
                }
                // 导航按钮：跳转到任务图谱
                var taskNodeId = nodeData.id.replace(/^task:/, '');
                html += '<div style="margin-top:8px">';
                html += '<span class="mg-detail-file-btn" onclick="navigateToTaskGraphNode(\'' + escHtml(taskNodeId) + '\')" style="color:#3b82f6;border-color:#3b82f6">';
                html += '&#x1F517; 在任务图谱中查看</span>';
                html += '</div>';
                // 任务节点 - 关联文件展示
                var fileNeighbors = findMgNeighbors(nodeData.id).filter(function(nb){ return nb.type === 'file'; });
                if (fileNeighbors.length > 0) {
                    html += '<div class="mg-detail-field">';
                    html += '<div class="mg-detail-field-label">关联文件 (' + fileNeighbors.length + ')</div>';
                    for (var fi = 0; fi < fileNeighbors.length; fi++) {
                        var fn = fileNeighbors[fi];
                        var fPath = (fn.metadata && fn.metadata.path) || fn.label || '';
                        html += '<div class="mg-detail-file-card" onclick="navigateToMgNode(\'' + escHtml(fn.id) + '\')">';
                        html += '<div class="mg-detail-file-name">' + getFileIcon(fPath) + ' ' + escHtml(fn.label || '') + '</div>';
                        html += '<div class="mg-detail-file-path">' + escHtml(fPath) + '</div>';
                        if (isImageFile(fPath)) {
                            html += '<div class="mg-detail-img-preview"><img src="' + getFileServeUrl(fPath) + '" onerror="this.style.display=\'none\'"></div>';
                        }
                        html += '</div>';
                    }
                    html += '</div>';
                }
            }

            // 文件类型节点
            if (nodeData.type === 'file') {
                var filePath = meta.path || nodeData.label || '';
                html += '<div class="mg-detail-field">';
                html += '<div class="mg-detail-field-label">文件路径</div>';
                html += '<div class="mg-detail-file-path">' + escHtml(filePath) + '</div>';
                html += '</div>';
                if (isImageFile(filePath)) {
                    html += '<div class="mg-detail-field">';
                    html += '<div class="mg-detail-field-label">图片预览</div>';
                    html += '<div class="mg-detail-img-preview">';
                    html += '<img src="' + getFileServeUrl(filePath) + '" onerror="this.parentElement.innerHTML=\'<span style=color:#64748b>预览不可用</span>\'">';
                    html += '</div></div>';
                }
                html += '<div style="margin-top:8px">';
                html += '<span class="mg-detail-file-btn" onclick="openFileInIDE(\'' + escHtml(filePath) + '\')">在 IDE 中打开</span>';
                html += '</div>';
            }

            // 通用 metadata 展示（排除已显示的字段）
            const shownKeys = new Set(['sub_type', 'request_id', 'goal', 'total_turns', 'status',
                'completed_at', 'turn', 'tool_name', 'content', 'role', 'type', 'desc', 'result_preview', 'path',
                'graph_id', 'graph_address', 'task_graph_address']);
            const extraMeta = Object.entries(meta).filter(([k]) => !shownKeys.has(k));
            if (extraMeta.length > 0) {
                html += '<div class="mg-detail-field">';
                html += '<div class="mg-detail-field-label">其他属性</div>';
                html += '<div class="mg-detail-content-box">';
                for (const [k, v] of extraMeta) {
                    const val = typeof v === 'object' ? JSON.stringify(v) : String(v);
                    html += '<div><span style="color:#64748b">' + escHtml(k) + ':</span> ' + escHtml(val) + '</div>';
                }
                html += '</div></div>';
            }

            // 邻居节点列表
            const neighbors = findMgNeighbors(nodeData.id);
            if (neighbors.length > 0) {
                html += '<div class="mg-detail-field">';
                html += '<div class="mg-detail-field-label">关联节点 (' + neighbors.length + ')</div>';
                html += '<ul class="mg-detail-neighbors">';
                for (const nb of neighbors) {
                    const nbColor = MG_COLORS[nb.type] || '#64748b';
                    html += '<li onclick="navigateToMgNode(\'' + escHtml(nb.id) + '\')">';
                    html += '<span class="mg-neighbor-dot" style="background:' + nbColor + '"></span>';
                    html += '<span>' + escHtml((nb.label || nb.id).substring(0, 30)) + '</span>';
                    html += '<span style="margin-left:auto;font-size:9px;color:#475569">' + nb.edgeType + '</span>';
                    html += '</li>';
                }
                html += '</ul></div>';
            }

            // 代码锚点占位容器
            var anchorIds = (meta.code_anchors && Array.isArray(meta.code_anchors)) ? meta.code_anchors : [];
            if (anchorIds.length > 0) {
                html += '<div id="mg-code-anchors-container"></div>';
            }

            body.innerHTML = html;

            // 渲染代码锚点（DOM 已就绪后）
            if (anchorIds.length > 0) {
                renderCodeAnchorsSection(anchorIds, 'mg-code-anchors-container');
            }
        }

        function closeMgDetail() {
            const panel = document.getElementById('mgDetailPanel');
            if (panel) panel.classList.add('collapsed');
            mgSelectedNodeId = null;
            mgState.selectedNodeId = null;
            // 取消高亮
            const g = d3.select('#mgRoot');
            if (g) g.selectAll('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
        }

        function findMgNeighbors(nodeId) {
            var edges = mgState.edges;
            var result = [];
            for (var i = 0; i < edges.length; i++) {
                var e = edges[i];
                var sid = typeof e.source === 'object' ? e.source.id : e.source;
                var tid = typeof e.target === 'object' ? e.target.id : e.target;
                if (sid === nodeId) {
                    var nd = mgState.nodes.get(tid);
                    if (nd) result.push(Object.assign({}, nd, { edgeType: e.type || 'ref' }));
                } else if (tid === nodeId) {
                    var nd = mgState.nodes.get(sid);
                    if (nd) result.push(Object.assign({}, nd, { edgeType: e.type || 'ref' }));
                }
            }
            return result;
        }

        function navigateToMgNode(nodeId) {
            var target = mgState.nodes.get(nodeId);
            if (target) {
                mgState.selectedNodeId = nodeId;
                showMgNodeDetail(target);
                // 高亮目标节点
                var g = d3.select('#mgRoot');
                g.selectAll('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
                g.selectAll('.mg-node').each(function(d) {
                    if (d.id === nodeId) {
                        d3.select(this).select('.mg-main-circle').attr('stroke', '#f59e0b').attr('stroke-width', 3);
                    }
                });
            }
        }

        // ===== 思维可视化浮动窗口 (Thought View) =====

        let tvSimulation = null;
        let tvInitialized = false;
        let tvMinimized = false;
        let tvVisible = true;
        let tvState = { nodes: new Map(), edges: [], centerIds: new Set() };
        let tvUpdateTimer = null;

        function initThoughtView() {
            if (tvInitialized) return;
            tvInitialized = true;

            var svgEl = document.getElementById('thoughtViewSvg');
            if (!svgEl) return;
            var svg = d3.select(svgEl);
            svg.selectAll('*').remove();

            // defs - arrowhead
            var defs = svg.append('defs');
            defs.append('marker')
                .attr('id', 'tv-arrow')
                .attr('viewBox', '0 -3 6 6')
                .attr('refX', 12).attr('refY', 0)
                .attr('markerWidth', 5).attr('markerHeight', 5)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M0,-3L6,0L0,3')
                .attr('fill', '#475569');

            var g = svg.append('g').attr('id', 'tvRoot');

            var body = document.getElementById('tvBody');
            var rect = body.getBoundingClientRect();
            var w = rect.width || 300;
            var h = rect.height || 220;

            tvSimulation = d3.forceSimulation()
                .force('charge', d3.forceManyBody().strength(-60))
                .force('center', d3.forceCenter(w / 2, h / 2))
                .force('collision', d3.forceCollide().radius(function(d) {
                    return d.is_center ? 8 + (d.activation || 0) * 10 : 6;
                }))
                .force('link', d3.forceLink().id(function(d) { return d.id; }).distance(50))
                .on('tick', tvTick)
                .stop();

            setupTvDrag();
            setupTvResize();
        }

        function updateThoughtView(data) {
            if (!data) return;
            // 节流 150ms
            if (tvUpdateTimer) clearTimeout(tvUpdateTimer);
            tvUpdateTimer = setTimeout(function() {
                _doUpdateThoughtView(data);
            }, 150);
        }

        function _doUpdateThoughtView(data) {
            if (!tvInitialized) initThoughtView();

            var nodes = data.nodes || [];
            var edges = data.edges || [];
            var centerIds = new Set(data.center_ids || []);

            // 更新状态
            tvState.nodes.clear();
            nodes.forEach(function(n) {
                n.is_center = centerIds.has(n.id);
                tvState.nodes.set(n.id, n);
            });
            tvState.edges = edges;
            tvState.centerIds = centerIds;

            // 更新节点计数
            var countEl = document.getElementById('tvNodeCount');
            if (countEl) countEl.textContent = '(' + nodes.length + ')';

            // 空态处理
            var hint = document.getElementById('tvEmptyHint');
            var svgEl = document.getElementById('thoughtViewSvg');
            if (nodes.length === 0) {
                if (hint) hint.style.display = 'flex';
                if (svgEl) svgEl.style.display = 'none';
                return;
            } else {
                if (hint) hint.style.display = 'none';
                if (svgEl) svgEl.style.display = '';
            }

            renderThoughtView();
        }

        function renderThoughtView() {
            var g = d3.select('#tvRoot');
            if (g.empty()) return;

            var nodes = Array.from(tvState.nodes.values());
            var edges = tvState.edges.map(function(e) {
                return {
                    source: e.source,
                    target: e.target,
                    type: e.type,
                    weight: e.weight || 0.5,
                };
            });

            // 边
            var linkSel = g.selectAll('.tv-link').data(edges, function(d) {
                var s = typeof d.source === 'object' ? d.source.id : d.source;
                var t = typeof d.target === 'object' ? d.target.id : d.target;
                return s + '->' + t;
            });
            linkSel.exit().remove();
            var linkEnter = linkSel.enter().append('line')
                .attr('class', 'tv-link')
                .attr('marker-end', 'url(#tv-arrow)');
            var linkMerge = linkEnter.merge(linkSel);
            linkMerge.each(function(d) {
                var style = MG_EDGE_STYLES[d.type] || MG_EDGE_STYLES['reference'] || { stroke: '#475569', width: 1 };
                d3.select(this)
                    .attr('stroke', style.stroke)
                    .attr('stroke-width', Math.max(style.width * 0.7, 0.5));
            });

            // 节点
            var nodeSel = g.selectAll('.tv-node').data(nodes, function(d) { return d.id; });
            nodeSel.exit().remove();
            var nodeEnter = nodeSel.enter().append('g')
                .attr('class', function(d) { return 'tv-node' + (d.is_center ? ' tv-node-center' : ''); });

            nodeEnter.append('circle');
            nodeEnter.append('text').attr('class', 'tv-node-label');
            // tooltip on hover for neighbor nodes
            nodeEnter.append('title');

            var nodeMerge = nodeEnter.merge(nodeSel);

            nodeMerge.attr('class', function(d) { return 'tv-node' + (d.is_center ? ' tv-node-center' : ''); });

            nodeMerge.select('circle')
                .attr('r', function(d) {
                    return d.is_center ? 6 + (d.activation || 0) * 10 : 4;
                })
                .attr('fill', function(d) {
                    var color = MG_COLORS[d.type] || '#94a3b8';
                    return color;
                })
                .attr('opacity', function(d) { return d.is_center ? 1 : 0.5; })
                .attr('stroke', function(d) {
                    if (!d.is_center) return 'none';
                    return MG_COLORS[d.type] || '#f59e0b';
                })
                .attr('stroke-width', function(d) { return d.is_center ? 2 : 0; })
                .style('filter', function(d) {
                    if (!d.is_center) return 'none';
                    var intensity = Math.round((d.activation || 0) * 12);
                    var color = MG_COLORS[d.type] || '#f59e0b';
                    return 'drop-shadow(0 0 ' + intensity + 'px ' + color + ')';
                });

            // 标签：活跃节点始终显示，邻居节点隐藏
            nodeMerge.select('text.tv-node-label')
                .attr('dy', function(d) {
                    var r = d.is_center ? 6 + (d.activation || 0) * 10 : 4;
                    return -(r + 3);
                })
                .attr('text-anchor', 'middle')
                .attr('display', function(d) { return d.is_center ? null : 'none'; })
                .text(function(d) { return (d.label || '').substring(0, 8); });

            // tooltip
            nodeMerge.select('title')
                .text(function(d) {
                    var act = d.activation ? ' (act: ' + d.activation.toFixed(2) + ')' : '';
                    return (d.label || d.id) + act;
                });

            // 更新 simulation
            tvSimulation.nodes(nodes);
            tvSimulation.force('link').links(edges);
            tvSimulation.alpha(0.6).restart();
        }

        function tvTick() {
            var g = d3.select('#tvRoot');
            g.selectAll('.tv-link')
                .attr('x1', function(d) { return d.source.x || 0; })
                .attr('y1', function(d) { return d.source.y || 0; })
                .attr('x2', function(d) { return d.target.x || 0; })
                .attr('y2', function(d) { return d.target.y || 0; });
            g.selectAll('.tv-node')
                .attr('transform', function(d) { return 'translate(' + (d.x || 0) + ',' + (d.y || 0) + ')'; });
        }

        // 拖拽移动
        function setupTvDrag() {
            var header = document.getElementById('tvHeader');
            var win = document.getElementById('thoughtViewWindow');
            if (!header || !win) return;

            var startX, startY, startLeft, startTop;

            header.addEventListener('mousedown', function(e) {
                if (e.target.closest('.tv-btn')) return;
                e.preventDefault();
                var rect = win.getBoundingClientRect();
                startX = e.clientX;
                startY = e.clientY;
                startLeft = rect.left;
                startTop = rect.top;

                function onMove(ev) {
                    var dx = ev.clientX - startX;
                    var dy = ev.clientY - startY;
                    var newLeft = Math.max(0, Math.min(window.innerWidth - 40, startLeft + dx));
                    var newTop = Math.max(0, Math.min(window.innerHeight - 40, startTop + dy));
                    win.style.left = newLeft + 'px';
                    win.style.top = newTop + 'px';
                    win.style.right = 'auto';
                    win.style.bottom = 'auto';
                }
                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        // Resize
        function setupTvResize() {
            var handle = document.getElementById('tvResizeHandle');
            var win = document.getElementById('thoughtViewWindow');
            if (!handle || !win) return;

            handle.addEventListener('mousedown', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var startX = e.clientX;
                var startY = e.clientY;
                var startW = win.offsetWidth;
                var startH = win.offsetHeight;

                function onMove(ev) {
                    var newW = Math.max(200, Math.min(600, startW + (ev.clientX - startX)));
                    var newH = Math.max(160, Math.min(500, startH + (ev.clientY - startY)));
                    win.style.width = newW + 'px';
                    win.style.height = newH + 'px';
                    // 更新 force center
                    if (tvSimulation) {
                        var body = document.getElementById('tvBody');
                        if (body) {
                            var rect = body.getBoundingClientRect();
                            tvSimulation.force('center', d3.forceCenter(rect.width / 2, rect.height / 2));
                            tvSimulation.alpha(0.3).restart();
                        }
                    }
                }
                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                }
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        }

        function toggleTvMinimize() {
            var win = document.getElementById('thoughtViewWindow');
            if (!win) return;
            tvMinimized = !tvMinimized;
            win.classList.toggle('tv-minimized', tvMinimized);
            if (!tvMinimized && tvSimulation && tvState.nodes.size > 0) {
                tvSimulation.alpha(0.3).restart();
            }
        }

        function toggleTvVisible(show) {
            var win = document.getElementById('thoughtViewWindow');
            if (!win) return;
            if (typeof show === 'boolean') {
                tvVisible = show;
            } else {
                tvVisible = !tvVisible;
            }
            win.classList.toggle('tv-hidden', !tvVisible);
            if (tvVisible && tvSimulation && tvState.nodes.size > 0) {
                tvSimulation.alpha(0.3).restart();
            }
        }

        // 页面 resize 时检查浮动窗口位置
        window.addEventListener('resize', function() {
            var win = document.getElementById('thoughtViewWindow');
            if (!win || !tvVisible) return;
            var rect = win.getBoundingClientRect();
            if (rect.left > window.innerWidth - 40) {
                win.style.left = (window.innerWidth - 60) + 'px';
                win.style.right = 'auto';
            }
            if (rect.top > window.innerHeight - 40) {
                win.style.top = (window.innerHeight - 60) + 'px';
                win.style.bottom = 'auto';
            }
        });

        // ── 双向导航：记忆图谱 <-> 任务图谱 ──

        function navigateToTaskGraphNode(taskNodeId) {
            switchGraphTab('task');
            setTimeout(function() {
                var gnodeEl = document.querySelector('.gnode[data-id="' + taskNodeId + '"]');
                if (gnodeEl) {
                    gnodeEl.dispatchEvent(new Event('click', { bubbles: true }));
                    gnodeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                if (typeof onGraphSelect === 'function' && typeof gnodeMap !== 'undefined') {
                    try { onGraphSelect(taskNodeId, gnodeMap, G_D_EDGES); } catch(e) {}
                }
            }, 200);
        }

        function navigateToMemoryGraphNode(memNodeId) {
            switchGraphTab('memory');
            setTimeout(function() {
                var target = mgState.nodes.get(memNodeId);
                if (target && target.x !== undefined) {
                    mgState.selectedNodeId = memNodeId;
                    showMgNodeDetail(target);
                    // 平移 SVG 视图到目标节点位置
                    var svg = d3.select('#memoryGraphSvg');
                    var rect = svg.node().parentElement.getBoundingClientRect();
                    var cx = rect.width / 2;
                    var cy = rect.height / 2;
                    var transform = d3.zoomIdentity.translate(cx - target.x, cy - target.y);
                    svg.transition().duration(500).call(
                        d3.zoom().transform, transform
                    );
                    // 高亮节点
                    var g = d3.select('#mgRoot');
                    g.selectAll('.mg-main-circle').attr('stroke', '#1e293b').attr('stroke-width', 1.5);
                    g.selectAll('.mg-node').each(function(d) {
                        if (d.id === memNodeId) {
                            d3.select(this).select('.mg-main-circle').attr('stroke', '#f59e0b').attr('stroke-width', 3);
                        }
                    });
                }
            }, 200);
        }

        function escHtml(str) {
            return escapeHtml(str);
        }

    </script>
</body>
