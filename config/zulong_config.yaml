audio:
  microphone:
    channels: 1
    chunk_size: 1024
    device_index: null
    enabled: true
    sample_rate: 16000
  speaker:
    channels: 2
    device_index: null
    enabled: true
    sample_rate: 44100
  tts:
    backend: cosyvoice
    device: cuda
    model_path: iic/CosyVoice2-0.5B
    voice: 中文女声
environments:
  development:
    llm:
      backend: siliconflow
    monitoring:
      performance:
        enabled: true
    system:
      debug_mode: true
      log_level: DEBUG
    vision:
      camera:
        enabled: false
  production:
    llm:
      backend: siliconflow
    monitoring:
      performance:
        enabled: true
    system:
      debug_mode: false
      log_level: INFO
    vision:
      camera:
        enabled: false
  testing:
    llm:
      backend: siliconflow
      ollama:
        model_id: tinyllama:latest
    memory:
      rag:
        enabled: false
    system:
      debug_mode: true
      log_level: DEBUG
    vision:
      camera:
        enabled: false
event_bus:
  dispatch:
    async_mode: true
    background_thread: true
    batch_size: 10
  websocket:
    enable_logging: true
    host: localhost
    port: 5555
    queue_size: 1000
ide:
  enabled: true
  fc_limits:
    hard_limit: 100
    max_fc_turns: 100
    soft_limit: 50
  host: 127.0.0.1
  port: 8090
  session:
    max_sessions: 50
    ttl_seconds: 7200
l2_inference:
  backup_model: qwen3.5:cloud
  circuit_breaker:
    bfs_min_interval: 3
    content_overlap_threshold: 0.8
    context_red_ratio: 0.9
    context_window_size: 131072
    context_yellow_ratio: 0.75
    enabled: true
    info_gain_window: 3
    max_yellow_before_red: 2
    pattern_red_count: 7
    pattern_window: 6
    pattern_yellow_count: 5
    query_similarity_threshold: 0.7
    repetition_window: 3
    safety_hard_cap: 100
    time_red_seconds: 120
    time_yellow_seconds: 60
  core_model: qwen3.5:cloud
  fc_loop:
    api_timeout_seconds: 30
    checkpointer_db_path: ./data/fc_loop_checkpoints.db
    circuit_breaker_enabled: true
    max_fc_turns: 50
    use_langgraph_checkpointer: false
  generation:
    frequency_penalty: 0.0
    max_tokens: 1024
    presence_penalty: 0.0
    repetition_penalty: 1.2
    temperature: 0.3
    top_p: 0.85
  orchestrator:
    checkpoint_dir: ./data/orchestrator_checkpoints
    checkpointer_db_path: ./data/orchestrator_checkpoints.db
    enable_streaming: true
    enabled: true
    large_project_threshold: 10
    max_redo_per_subtask: 3
    max_replan_count: 2
    reflection_max_tokens: 512
    subtask_fc_budget: 30
    use_langgraph: true
    use_langgraph_checkpointer: false
  request_interval: 1.0
  retry:
    backoff_factor: 2.0
    delay: 1.0
    max_attempts: 3
  step_limits:
    enabled: true
    hard_limit: 100
    max_fc_turns: 100
    soft_limit: 50
    warning_interval: 10
  task_suspension:
    auto_suspend_on_time_limit: true
    enabled: true
    max_age_hours: 72
    max_suspended_tasks: 20
    persistence_path: ./data/suspended_tasks
  timeout:
    backup: 120
    core: 600
    fc_loop: 600
  visual_keywords_strong:
  - 摄像头
  - 镜头
  - 画面
  - 视频
  - 图像
  - 图片
  - 视觉
  - 看到
  - 看见
  - 眼前
  visual_keywords_weak:
  - 周围
  - 环境
  - 外观
  - 样子
  - 颜色
  - 形状
  - 屏幕
  - 显示
  - 场景
  - 物体
  - 动作
  - 手势
launcher:
  auto_open_browser: true
  default_mode: null
  host: 127.0.0.1
  port: 8090
llm:
  backend: siliconflow
  llamaccp:
    api_key: EMPTY
    backend: llamaccp
    base_url: http://localhost:8080/v1
    model_id: qwen3.5-4b
    n_ctx: 4096
    n_gpu_layers: -1
    n_threads: 8
  lmstudio:
    api_key: EMPTY
    backend: lmstudio
    base_url: http://localhost:1234/v1
    model_id: qwen3.5-4b
  ollama:
    api_key: EMPTY
    backend: ollama
    backup_model_id: qwen3.5:4b
    base_url: http://localhost:11434/v1
    model_id: qwen3.5:9b
    num_ctx: 131072
    num_predict: 1024
  openai:
    api_key: ${OPENAI_API_KEY}
    backend: openai
    base_url: https://api.openai.com/v1
    fallback_models:
    - gpt-3.5-turbo
    - gpt-4-turbo
    model_id: gpt-4o-mini
  preload:
    enabled: true
    timeout: 300
    warmup_prompt: 你好
  sglang:
    api_key: EMPTY
    backend: sglang
    base_url: http://localhost:30000/v1
    mem_fraction_static: 0.8
    model_id: /mnt/d/AI/project/zulong_beta4/models/Qwen/Qwen3___5-0.8B-AWQ
    schedule_conservativeness: 1.0
    schedule_policy: lpm
    tp_size: 1
  siliconflow:
    api_key: sk-aannnlesdgfgwpwwdkobkvrvqjlacmayteudkmfcjlctqddk
    backend: siliconflow
    base_url: https://api.siliconflow.cn/v1
    model_id: Qwen/Qwen3.6-27B
    num_ctx: 131072
  transformer:
    backend: transformer
    cpu_offload: false
    device: cuda
    dtype: float16
    max_length: 4096
    max_memory: 0.8
    model_path: Qwen/Qwen3___5-0.8B-AWQ
    use_cache: true
    use_flash_attention: true
  vllm:
    api_key: EMPTY
    backend: vllm
    base_url: http://localhost:8000/v1
    enable_auto_tool_choice: true
    enforce_eager: false
    gpu_memory_utilization: 0.5
    max_model_len: 4096
    max_num_batched_tokens: 2048
    max_num_seqs: 256
    model_id: /mnt/d/AI/project/zulong_beta4/models/Qwen/Qwen3___5-0.8B-AWQ
    tensor_parallel_size: 1
    tool_call_parser: qwen3_xml
memory:
  episodic:
    consolidation_threshold: 0.5
    max_episodes: 10
    review_enabled: true
  experience:
    db_path: ./data/experience_db/experiences.db
    enabled: true
    max_experiences: 1000
    vector_index_path: ./data/experience_db/vectors.index
  rag:
    data_dir: ./data/rag
    embedding_dim: 512
    embedding_model: BAAI/bge-small-zh-v1.5
    enabled: true
    hybrid_search_enabled: true
    top_k: 5
    vector_index_type: faiss_flat
  short_term:
    max_turns: 100
    persistence_enabled: true
    persistence_path: ./data/short_term_memory
    ttl: 3600
monitoring:
  debug:
    backup_count: 5
    console_enabled: true
    log_rotation: true
    max_log_size_mb: 100
    save_logs: true
  performance:
    enabled: true
    log_threshold_ms: 100
    metrics_dir: ./data/metrics
security:
  api_keys:
    default: ${ZULONG_API_KEY}
  cors:
    allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    allowed_origins:
    - http://localhost:8080
    - http://localhost:3000
  rate_limit:
    enabled: false
    requests_per_minute: 60
system:
  cache_dir: ./cache
  data_dir: ./data
  debug_mode: false
  environment: production
  log_level: INFO
  models_dir: ./models
  name: ZULONG
  version: 2.0.0
tools:
  engine:
    max_workers: 5
    timeout: 60
  openclaw:
    api_url: http://localhost:3000
    enabled: true
    timeout: 30
    websocket_url: ws://localhost:5555
  pipeline:
    workspace_dir: ./agent_workspace
  skill_packs:
    disabled_packs:
    - ide_coder
    - complex_task
    enabled: true
    enabled_packs: []
    packs_dir: ./zulong/skill_packs/packs
  web_search:
    enabled: true
    engine: searxng
    max_results: 5
    searxng_url: http://localhost:8101
vision:
  analysis:
    keyframes_count: 10
    min_frames_required: 10
    short_term_duration: 5
  camera:
    device_index: 1
    enabled: false
    fps: 30
    resolution:
    - 1280
    - 720
  mediapipe:
    device: cpu
    face_tracking: false
    hand_tracking: true
    pose_tracking: true
  yolo:
    confidence_threshold: 0.25
    device: cuda
    iou_threshold: 0.45
    model_path: models/yolov10n.pt
web:
  api:
    cors_enabled: true
    docs_enabled: true
    enabled: true
    host: localhost
    port: 3000
  ui:
    auto_open_browser: true
    enabled: true
    host: localhost
    port: 8080
    static_dir: ./web/static
